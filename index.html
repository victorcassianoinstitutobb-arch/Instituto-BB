<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instituto Bruna Braga · Sistema de Gestão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  /* DARK (padrão) — grafite quente, menos preto puro, mais suave à vista */
  --black:#1E1B18; --ink:#F2EEE6; --gold:#D8B468; --gold-l:#EAD49A; --gold-d:#C09A4C;
  --ivory:#1A1815; --ivory2:#252119; --cream:#221F1A; --paper:#252220;
  --grey:#B0A899; --grey-l:#332E27; --line:#383229;
  --sage:#93A48F; --sage-bg:#202519;
  --green:#74B98C; --green-bg:#1B2A20; --red:#D9928A; --red-bg:#2E2019;
  --amber:#DAB163; --amber-bg:#2E2517;
  --shadow:0 1px 3px rgba(0,0,0,.25), 0 8px 28px rgba(0,0,0,.28);
  --shadow-sm:0 1px 2px rgba(0,0,0,.2);
  --radius:18px; --radius-sm:12px;
}
body.light{
  /* CLARO — off-white quente, dourado suave, sage; descansado e elegante */
  --black:#2B2620; --ink:#33302A; --gold:#B8923F; --gold-l:#D9BE7E; --gold-d:#8F6E2C;
  --ivory:#FBF9F5; --ivory2:#F1ECE3; --cream:#F6F2EA; --paper:#FFFFFF;
  --grey:#8A8175; --grey-l:#EDE8DF; --line:#E7E0D4;
  --sage:#6F8270; --sage-bg:#EDF1EC;
  --green:#4E7C5C; --green-bg:#EAF1EC; --red:#B5685F; --red-bg:#F6EBE9;
  --amber:#B0852F; --amber-bg:#F7EFDD;
  --shadow:0 1px 3px rgba(58,53,46,.05), 0 6px 20px rgba(58,53,46,.07);
  --shadow-sm:0 1px 2px rgba(58,53,46,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--ivory);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.55;transition:background .25s,color .25s}
.serif{font-family:'Cormorant Garamond',Georgia,serif}

/* ---------- App shell ---------- */
.app{display:flex;min-height:100vh}
.sidebar{width:248px;background:var(--black);color:var(--ivory);flex-shrink:0;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden}
.brand{padding:28px 24px 20px;border-bottom:1px solid rgba(201,162,75,.22);flex-shrink:0}
.brand .mark{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:700;
  color:var(--gold);line-height:1.05;letter-spacing:.3px}
.brand .sub{font-size:10px;letter-spacing:2.4px;color:var(--gold-l);margin-top:6px;text-transform:uppercase}
.nav{padding:16px 14px;display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
.nav::-webkit-scrollbar{width:6px}
.nav::-webkit-scrollbar-thumb{background:rgba(201,162,75,.3);border-radius:3px}
.nav::-webkit-scrollbar-track{background:transparent}
.nav button{display:flex;align-items:center;gap:13px;width:100%;padding:11px 14px;
  background:none;border:none;color:#CFC6B6;font-family:inherit;font-size:14px;
  border-radius:11px;cursor:pointer;transition:.18s;text-align:left}
.nav button svg{width:18px;height:18px;stroke-width:1.7;flex-shrink:0}
.nav button:hover{background:rgba(212,175,90,.14);color:#FFF8EC}
.nav button.active{background:var(--gold);color:var(--black);font-weight:600}
.nav .nav-label{font-size:10px;letter-spacing:1.8px;color:#6E6657;text-transform:uppercase;
  padding:14px 14px 6px}
.side-foot{padding:18px 22px;border-top:1px solid rgba(201,162,75,.18);font-size:11px;color:#7A7164;flex-shrink:0}
.side-foot b{color:var(--gold-l);font-weight:500}

/* ---------- Main ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:20px 36px;background:var(--paper);border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:20}
.topbar .title{font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:600;color:var(--ink)}
.topbar .crumb{font-size:11px;letter-spacing:1.5px;color:var(--grey);text-transform:uppercase;margin-bottom:1px}
.period{display:flex;align-items:center;gap:10px}
.period select{font-family:inherit;font-size:13px;padding:9px 16px;border:1px solid var(--line);
  background:var(--cream);border-radius:10px;color:var(--ink);cursor:pointer;font-weight:500}
.content{padding:30px 36px 48px;max-width:1280px;width:100%}
.page{display:none;animation:fade .4s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ---------- KPI cards ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:26px}
.kpi{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px 22px;position:relative;overflow:hidden;box-shadow:var(--shadow);
  opacity:0;animation:rise .5s ease forwards}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold)}
.kpi.green::before{background:var(--green)} .kpi.ink::before{background:var(--ink)}
.kpi .label{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--grey);font-weight:500}
.kpi .val{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;line-height:1.1;margin:8px 0 4px}
.kpi.green .val{color:var(--green)} .kpi.neg .val{color:var(--red)}
.kpi .meta{font-size:12px;color:var(--grey);display:flex;align-items:center;gap:6px}
.kpi .meta .tag{font-weight:600}
.kpi .meta .tag.up{color:var(--green)} .kpi .meta .tag.down{color:var(--red)}
.kpi .meta .tag.gold{color:var(--gold-d)}

/* ---------- Panels ---------- */
.row{display:grid;gap:18px;margin-bottom:18px}
.row.two{grid-template-columns:1.15fr .85fr}
.row.two-eq{grid-template-columns:1fr 1fr}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 24px;box-shadow:var(--shadow)}
.panel h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;margin-bottom:2px}
.panel .ph-sub{font-size:12px;color:var(--grey);margin-bottom:18px}
.panel-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.panel-head .ph-sub{margin-bottom:0}

/* ---------- Metas (progress) ---------- */
.meta-row{margin-bottom:16px}
.meta-row:last-child{margin-bottom:0}
.meta-row .mr-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.meta-row .mr-name{font-size:13px;font-weight:500;color:var(--ink)}
.meta-row .mr-vals{font-size:12px;color:var(--grey)}
.meta-row .mr-vals b{color:var(--ink);font-weight:600}
.bar{height:9px;background:var(--grey-l);border-radius:6px;overflow:hidden;position:relative}
.bar i{position:absolute;left:0;top:0;bottom:0;border-radius:6px;background:var(--gold);
  width:0;transition:width 1s cubic-bezier(.22,1,.36,1)}
.bar i.hit{background:var(--green)} .bar i.low{background:var(--red)}
.mr-pct{font-size:12px;font-weight:600;margin-left:8px}

/* ---------- DRE ---------- */
.dre-line{display:flex;justify-content:space-between;align-items:center;padding:11px 0;
  border-bottom:1px solid var(--grey-l);font-size:14px}
.dre-line:last-child{border-bottom:none}
.dre-line.total{border-top:2px solid var(--gold);margin-top:4px;font-weight:600;font-size:15px}
.dre-line .amt{font-variant-numeric:tabular-nums;font-weight:600}
.dre-line .amt.neg{color:var(--red)} .dre-line .amt.pos{color:var(--green)}

/* ---------- Charts ---------- */
.chart-wrap{position:relative;width:100%;height:260px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px;font-size:12px;color:var(--grey)}
.legend span{display:flex;align-items:center;gap:6px}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

/* ---------- Tables ---------- */
table.data{width:100%;border-collapse:collapse;font-size:13px}
table.data th{text-align:left;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;
  color:var(--grey);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line)}
table.data th.num,table.data td.num{text-align:right;font-variant-numeric:tabular-nums}
table.data th.ctr,table.data td.ctr{text-align:center}
table.data td{padding:11px 12px;border-bottom:1px solid var(--grey-l)}
table.data tr:last-child td{border-bottom:none}
table.data tbody tr{transition:.12s}
table.data tbody tr:hover{background:var(--cream)}
.pill{display:inline-block;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600}
.pill.ok{background:var(--green-bg);color:var(--green)}
.pill.warn{background:var(--amber-bg);color:var(--amber)}
.pill.pend{background:var(--red-bg);color:var(--red)}
.minibar{height:6px;border-radius:4px;background:var(--gold);display:inline-block;vertical-align:middle}

/* ---------- Add row form ---------- */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.btn{font-family:inherit;font-size:13px;font-weight:500;padding:10px 18px;border-radius:10px;
  border:1px solid var(--gold-d);background:var(--gold);color:var(--black);cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;transition:.16s}
.btn:hover{background:var(--gold-d);color:var(--ivory)}
.btn.ghost{background:none;color:var(--ink);border-color:var(--line)}
.btn.ghost:hover{background:var(--cream);color:var(--ink)}
.btn svg{width:15px;height:15px;stroke-width:2}
.form-row{display:none;background:var(--cream);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:16px;margin-bottom:16px;gap:10px;flex-wrap:wrap;align-items:flex-end}
.form-row.open{display:flex;animation:fade .25s}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--grey);font-weight:600}
.field input,.field select{font-family:inherit;font-size:13px;padding:8px 11px;border:1px solid var(--line);
  border-radius:8px;background:var(--paper);color:var(--ink);min-width:120px}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,75,.15)}

.health{display:flex;align-items:center;gap:14px;background:var(--cream);border-radius:var(--radius-sm);
  padding:16px 20px;margin-bottom:18px;border:1px solid var(--line)}
.health .big{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:var(--green)}
.health .txt{font-size:13px;color:var(--grey)}
.health .txt b{color:var(--ink);font-weight:600}

@media(max-width:1080px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.row.two,.row.two-eq{grid-template-columns:1fr}}
@media(max-width:760px){
  .app{flex-direction:column}.sidebar{width:100%;height:auto;position:static;flex-direction:row;
    overflow-x:auto;align-items:center}.brand{border-bottom:none;border-right:1px solid rgba(201,162,75,.2);white-space:nowrap}
  .nav{flex-direction:row;padding:10px;flex:none}.nav .nav-label,.side-foot{display:none}
  .nav button span.t{display:none}.nav button{padding:11px}
  .content{padding:20px 16px}.topbar{padding:16px 18px}.kpi-grid{grid-template-columns:1fr 1fr;gap:12px}
}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
/* ---------- CRM trend cards ---------- */
.trend-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:22px}
.tcard{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px 22px 16px;box-shadow:var(--shadow);opacity:0;animation:rise .5s ease forwards;position:relative;overflow:hidden}
.tcard .tc-head{display:flex;align-items:center;gap:10px;color:var(--grey);font-size:13px;font-weight:500;margin-bottom:10px}
.tcard .tc-ic{width:34px;height:34px;border-radius:9px;background:var(--cream);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tcard .tc-ic svg{width:17px;height:17px;stroke:var(--gold-d);stroke-width:1.8;fill:none}
.tcard .tc-val{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;line-height:1;margin-bottom:4px}
.tcard .tc-sub{font-size:12px;color:var(--grey);margin-bottom:10px}
.tcard .tc-spark{height:48px;margin:6px -4px 10px;position:relative}
.tcard .tag-cmp{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;
  padding:4px 11px;border-radius:20px}
.tag-cmp.up{background:var(--green-bg);color:var(--green)}
.tag-cmp.down{background:var(--red-bg);color:var(--red)}
.tag-cmp svg{width:12px;height:12px;stroke-width:2.5}

/* ---------- internal tabs ---------- */
.itabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:20px}
.itabs button{font-family:inherit;font-size:14px;font-weight:500;color:var(--grey);background:none;
  border:none;padding:11px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.16s}
.itabs button:hover{color:var(--ink)}
.itabs button.active{color:var(--gold-d);border-bottom-color:var(--gold)}
.itab-pane{display:none}.itab-pane.active{display:block;animation:fade .3s}

/* ---------- ranking ---------- */
.rank-list{display:flex;flex-direction:column;gap:2px}
.rank-row{display:flex;align-items:center;gap:13px;padding:10px 8px;border-radius:10px;transition:.12s}
.rank-row:hover{background:var(--cream)}
.rank-pos{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;background:var(--grey-l);color:var(--grey)}
.rank-row:nth-child(1) .rank-pos{background:var(--gold);color:var(--black)}
.rank-row:nth-child(2) .rank-pos{background:var(--gold-l);color:var(--gold-d)}
.rank-row:nth-child(3) .rank-pos{background:var(--ivory2);color:var(--gold-d)}
.rank-name{flex:1;font-size:13.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-val{font-size:13px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.rank-sub{font-size:11px;color:var(--grey)}

/* ---------- sidebar groups (collapsible) ---------- */
.nav-group>.ng-head{display:flex;align-items:center;gap:13px;width:100%;padding:11px 14px;background:none;
  border:none;color:#CFC6B6;font-family:inherit;font-size:14px;border-radius:11px;cursor:pointer;text-align:left;transition:.18s}
.nav-group>.ng-head:hover{background:rgba(212,175,90,.14);color:#FFF8EC}
.nav-group>.ng-head svg.ic{width:18px;height:18px;stroke-width:1.7;flex-shrink:0}
.nav-group>.ng-head .chev{margin-left:auto;width:14px;height:14px;transition:.2s;stroke-width:2}
.nav-group.open>.ng-head .chev{transform:rotate(90deg)}
.ng-items{max-height:0;overflow:hidden;transition:max-height .25s ease}
.nav-group.open .ng-items{max-height:300px}
.ng-items button{display:block;width:100%;padding:9px 14px 9px 45px;background:none;border:none;
  color:#A89E8E;font-family:inherit;font-size:13px;border-radius:9px;cursor:pointer;text-align:left;transition:.14s}
.ng-items button:hover{background:rgba(212,175,90,.12);color:#FFF8EC}
.ng-items button.active{background:var(--gold);color:var(--black);font-weight:600}
.new-btn{margin:6px 14px 10px;padding:10px;background:var(--gold);color:#0E0D0C;border:none;border-radius:11px;
  font-family:inherit;font-weight:600;font-size:13.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:.16s}
.new-btn:hover{background:var(--gold-l)}
.new-btn svg{width:16px;height:16px;stroke-width:2.5}
</style>
</head>
<body>
<div id="loginScreen" style="display:none;position:fixed;inset:0;z-index:1000;background:var(--ivory);align-items:center;justify-content:center">
  <div style="width:380px;max-width:90vw;background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:38px 34px;box-shadow:var(--shadow)">
    <div style="text-align:center;margin-bottom:26px">
      <div class="serif" style="font-size:26px;font-weight:700;color:var(--gold);line-height:1.1">Instituto<br>Bruna Braga</div>
      <div style="font-size:10px;letter-spacing:2.4px;color:var(--gold-l);margin-top:8px;text-transform:uppercase">Sistema de Gestão</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div>
        <label style="font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--grey);font-weight:600;display:block;margin-bottom:6px">E-mail</label>
        <input id="loginEmail" type="email" placeholder="seu@email.com" style="width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;background:var(--paper);color:var(--ink)">
      </div>
      <div>
        <label style="font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--grey);font-weight:600;display:block;margin-bottom:6px">Senha</label>
        <input id="loginSenha" type="password" placeholder="••••••••" style="width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-family:inherit;font-size:14px;background:var(--paper);color:var(--ink)" onkeydown="if(event.key==='Enter')fazerLogin()">
      </div>
      <div id="loginErro" style="display:none;font-size:13px;color:var(--red);background:var(--red-bg);padding:9px 12px;border-radius:8px"></div>
      <button onclick="fazerLogin()" id="loginBtn" style="width:100%;padding:12px;background:var(--gold);color:#0E0D0C;border:none;border-radius:10px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;margin-top:4px">Entrar</button>
      <div style="font-size:11.5px;color:var(--grey);text-align:center;line-height:1.5;margin-top:4px">Acesso restrito à equipe do Instituto Bruna Braga.</div>
    </div>
  </div>
</div>
<div class="app" id="appRoot" style="display:none">
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">Instituto<br>Bruna Braga</div>
      <div class="sub">Harmonização Facial</div>
    </div>
    <nav class="nav" id="nav">
      <button class="new-btn" onclick="go('atendimentos')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Novo</button>
      <button class="active" data-page="painel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg><span class="t">Principal</span></button>
      <div class="nav-group" data-group="financeiro">
        <button class="ng-head"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9.5 9.5h4a1.5 1.5 0 0 1 0 3h-3a1.5 1.5 0 0 0 0 3h4"/></svg><span class="t">Financeiro</span><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 6 15 12 9 18"/></svg></button>
        <div class="ng-items">
          <button data-page="custos">Custos & Despesas</button>
          <button data-page="caixa">Livro-Caixa</button>
          <button data-page="comissoes">Metas & Bonificações</button>
        </div>
      </div>
      <div class="nav-group" data-group="cadastros">
        <button class="ng-head"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span class="t">Cadastros</span><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 6 15 12 9 18"/></svg></button>
        <div class="ng-items">
          <button data-page="funcionarios">Funcionários</button>
          <button data-page="pacientes">Pacientes</button>
          <button data-page="atendimentos">Atendimentos</button>
        </div>
      </div>
      <div class="nav-group" data-group="marketing">
        <button class="ng-head"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 11l18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg><span class="t">Marketing</span><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 6 15 12 9 18"/></svg></button>
        <div class="ng-items">
          <button data-page="leads">Captação de Leads</button>
        </div>

function realizadoMeta(meta){
  const k = window.__lastCalc || calc();
  const tipo = meta.tipo;
  if(meta.escopo==='geral'){
    if(tipo==='faturamento') return k.faturamento;
    if(tipo==='leads') return k.nLeads;
    if(tipo==='agendamentos') return k.nAtend;
    return 0;
  }
  // individual: filtra pelo funcionário que realizou
  const nome = funcNome(meta.funcId);
  const at = DATA.atendimentos.filter(a=>a.func===nome && a.agenda==='Compareceu');
  if(tipo==='faturamento') return at.reduce((s,a)=>s+a.valor,0);
  if(tipo==='agendamentos') return at.length;
  if(tipo==='leads'){
    // leads atribuídos ao funcionário (se houver campo func em leads); senão, 0 individual
    return DATA.leads.filter(l=>l.func===nome).length;
  }
  return 0;
}

// dada uma meta, retorna a faixa mais alta atingida (ou null) e o bônus em R$
function avaliarMeta(meta){
  const real = realizadoMeta(meta);
  // faixas em ordem crescente de alvo; pega a mais alta cujo alvo foi atingido
  const ordenadas = [...meta.faixas].sort((a,b)=>a.alvo-b.alvo);
  let atingida = null;
  ordenadas.forEach(f=>{ if(real>=f.alvo) atingida=f; });
  let bonus = 0;
  if(atingida){
    bonus = atingida.bonus.tipo==='fixo'
      ? atingida.bonus.valor
      : real * (atingida.bonus.valor/100);
  }
  // próxima faixa (para mostrar "falta X para...")
  const proxima = ordenadas.find(f=>real<f.alvo) || null;
  return {real, atingida, bonus, proxima, ordenadas};
}

  const nAtend = compareceu.length;
  const totAgenda = at.length;
  const txComp = totAgenda ? nAtend/totAgenda : 0;
  const noShows = at.filter(a=>a.agenda==='No-show').length;
  const leadsAg = ld.filter(l=>l.agendou).length;
  const leadsFec = ld.filter(l=>l.fechou).length;
  const txConv = leadsAg ? leadsFec/leadsAg : 0;
  const investMkt = ld.reduce((s,l)=>s+l.custo,0);
  const cac = leadsFec ? investMkt/leadsFec : 0;
  const horasUsadas = nAtend*META.duracaoMedia;
  const txOcup = META.horasMes ? horasUsadas/META.horasMes : 0;
  const porCanal = CANAIS.map(c=>({
    canal:c,
    leads:ld.filter(l=>l.canal===c).length,
    fechados:ld.filter(l=>l.canal===c&&l.fechou).length,
    receita:at.filter(a=>a.canal===c&&a.agenda==='Compareceu').reduce((s,a)=>s+a.valor,0),
  })).map(x=>({...x,conv:x.leads?x.fechados/x.leads:0}));
  const porProc = PROCS.map(p=>({
    proc:p,
    qtd:compareceu.filter(a=>a.proc===p).length,
    receita:compareceu.filter(a=>a.proc===p).reduce((s,a)=>s+a.valor,0),
  })).map(x=>({...x,share:faturamento?x.receita/faturamento:0})).filter(x=>x.qtd>0);
  const cats = [...new Set(cs.map(c=>c.cat))];
  const porCat = cats.map(ca=>({cat:ca,valor:cs.filter(c=>c.cat===ca).reduce((s,c)=>s+c.valor,0)}))
    .sort((a,b)=>b.valor-a.valor);
  const confOK = DATA.conformidade.filter(c=>c.status==='OK').length;

  // ---- série diária (gráfico de tendência) ----
  const dias = [...new Set(at.map(a=>a.data))].sort();
  const serieReceita = dias.map(d=>({
    dia:d,
    valor:compareceu.filter(a=>a.data===d).reduce((s,a)=>s+a.valor,0),
    atend:compareceu.filter(a=>a.data===d).length
  }));
  // ---- comparação vs período anterior (simulado a partir de PREV) ----
  const prev = DATA.periodoAnterior || {faturamento:faturamento*0.8,nAtend:Math.round(nAtend*0.85),leads:ld.length*0.9,comandas:Math.round(nAtend*0.8)};
  const vs = (atual,ant)=> ant? (atual-ant)/ant : 0;
  const comp = {
    faturamento: vs(faturamento,prev.faturamento),
    atend: vs(nAtend,prev.nAtend),
    leads: vs(ld.length,prev.leads),
    comandas: vs(compareceu.filter(a=>a.valor>0).length,prev.comandas),
  };
  const comandas = compareceu.filter(a=>a.valor>0).length;
  // ---- ranking de procedimentos por nº de atendimentos ----
  const ranking = PROCS.map(p=>({
    nome:p,
    qtd:compareceu.filter(a=>a.proc===p).length,
    receita:compareceu.filter(a=>a.proc===p).reduce((s,a)=>s+a.valor,0)
  })).filter(x=>x.qtd>0).sort((a,b)=>b.qtd-a.qtd);
  // ranking de pacientes por valor
  const rankPac = [...new Set(compareceu.map(a=>a.paciente))].map(nome=>({
    nome, valor:compareceu.filter(a=>a.paciente===nome).reduce((s,a)=>s+a.valor,0),
    visitas:compareceu.filter(a=>a.paciente===nome).length
  })).sort((a,b)=>b.valor-a.valor);

  // ---- comissões (sobre valor bruto dos procedimentos realizados) ----
  const comissaoBaseTotal = compareceu.reduce((s,a)=>s+a.valor,0);
  const comissaoTotal = comissaoBaseTotal * META.comissaoPercent;
  const comissaoPorProc = PROCS.map(p=>{
    const itens=compareceu.filter(a=>a.proc===p);
    const base=itens.reduce((s,a)=>s+a.valor,0);
    return {proc:p, qtd:itens.length, base, comissao:base*META.comissaoPercent};
  }).filter(x=>x.qtd>0).sort((a,b)=>b.comissao-a.comissao);

  // ---- base de pacientes (consolida atendimentos por pessoa) ----
  const nomes=[...new Set(at.map(a=>a.paciente))];
  const pacientes = nomes.map(nome=>{
    const hist=at.filter(a=>a.paciente===nome);
    const realizados=hist.filter(a=>a.agenda==='Compareceu');
    const valorTotal=realizados.reduce((s,a)=>s+a.valor,0);
    const datas=realizados.map(a=>a.data).sort();
    const ultima=datas[datas.length-1]||'';
    const canal=hist[0]?hist[0].canal:'';
    return {nome, visitas:realizados.length, valorTotal, ultima, canal,
      procedimentos:[...new Set(realizados.map(a=>a.proc))],
      recorrente:realizados.length>1};
  }).sort((a,b)=>b.valorTotal-a.valorTotal);
  const totalPacientes=pacientes.length;
  const pacRecorrentes=pacientes.filter(p=>p.recorrente).length;
  const txRecompra= totalPacientes? pacRecorrentes/totalPacientes : 0;
  const ltv = totalPacientes? pacientes.reduce((s,p)=>s+p.valorTotal,0)/totalPacientes : 0;

  // ---- documentos ----
  const docPend = DOCS.filter(d=>d.status==='Pendente').length;
  const docVencer = DOCS.filter(d=>d.status==='A vencer').length;
  const docOk = DOCS.filter(d=>d.status==='Arquivado'||d.status==='Vigente').length;

  // ---- evolução mensal: calculada a partir dos atendimentos reais ----
  const mesesNomes=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const porMes={};
  compareceu.forEach(a=>{
    const ym=a.data.slice(0,7); // AAAA-MM
    if(!porMes[ym]) porMes[ym]={ym, fat:0, custo:0};
    porMes[ym].fat += a.valor;
    porMes[ym].custo += (a.custo||0);
  });
  const evolucao = Object.values(porMes).sort((a,b)=>a.ym.localeCompare(b.ym)).map(m=>{
    const mm=parseInt(m.ym.slice(5,7),10)-1;
    return {mes:mesesNomes[mm]||m.ym, fat:m.fat, lucro:m.fat-m.custo};
  });

  const out = {faturamento,ticket,custoInsumo,custoTotal,imposto,lucro,margem,nAtend,txComp,noShows,
    txConv,investMkt,cac,txOcup,porCanal,porProc,porCat,confOK,confTotal:DATA.conformidade.length,
    serieReceita,comp,comandas,ranking,rankPac,nLeads:ld.length,
    comissaoTotal,comissaoBaseTotal,comissaoPorProc,comissaoPercent:META.comissaoPercent,
    pacientes,totalPacientes,pacRecorrentes,txRecompra,ltv,
    docPend,docVencer,docOk,docTotal:DOCS.length,evolucao};
  window.__lastCalc = out;
  return out;
}

      sb.from('atendimentos').select('*').order('data'),
      sb.from('captacao').select('*').order('data'),
      sb.from('metas').select('*').order('criado_em'),
      sb.from('conformidade').select('*').order('criado_em'),
      sb.from('documentos').select('*').order('criado_em'),
    ]);
    // MODO NUVEM: o estado do app é exatamente o que está no banco (vazio = vazio).
    // Os dados de exemplo NÃO são usados aqui — só existem no modo local de teste.
    FUNCIONARIOS = (func.data||[]).map(f=>({id:f.id,nome:f.nome,funcao:f.funcao,tipo:f.tipo,atende:f.atende,registro:f.registro,contato:f.contato,admissao:f.admissao,ativo:f.ativo}));
    CARTEIRAS = (cart.data||[]).map(c=>({id:c.id,nome:c.nome,saldoInicial:+c.saldo_inicial}));
    CAT_RECEITA = (cat.data||[]).filter(c=>c.tipo==='receita').map(c=>c.nome);
    CAT_DESPESA = (cat.data||[]).filter(c=>c.tipo==='despesa').map(c=>c.nome);
    CAIXA = (lanc.data||[]).map(l=>({id:l.id,data:l.data,tipo:l.tipo,categoria:l.categoria,desc:l.descricao,valor:+l.valor,carteira:l.carteira_id,carteiraDest:l.carteira_dest}));
    DATA.atendimentos = (atend.data||[]).map(a=>({id:a.id,data:a.data,paciente:a.paciente,proc:a.procedimento,func:a.funcionario,canal:a.canal,valor:+a.valor,custo:+a.custo,pag:a.pagamento,agenda:a.agenda}));
    CAPTACAO = (capt.data||[]).map(c=>({id:c.id,data:c.data,plataforma:c.plataforma,seguidores:c.seguidores,leads:c.leads,agendadas:c.agendadas,investido:+c.investido,gasto:+c.gasto,campanhas:c.campanhas}));

    // leads e custos antigos (exemplo) não são usados na nuvem — zera para o painel refletir a realidade
    DATA.leads = [];
    DATA.custos = [];
    while(DOCS.length)DOCS.pop(); (docs.data||[]).forEach(d=>DOCS.push({id:d.id,nome:d.nome,cat:d.categoria,data:d.data,validade:d.validade,status:d.status,ref:d.referencia}));
    // zera o período anterior (não há histórico real ainda)
    DATA.periodoAnterior = {faturamento:0,nAtend:0,leads:0,comandas:0};
    // configurações (listas customizáveis) — só sobrescreve se houver no banco
    const cfg = await sb.from('configuracoes').select('*');
    if (cfg.data) cfg.data.forEach(row=>{
      if(CONFIG_LISTAS[row.chave] && Array.isArray(row.valores)) CONFIG_LISTAS[row.chave].set(row.valores);
      if(row.chave==='metas_gerais' && row.valores && typeof row.valores==='object'){
        META.faturamento=row.valores.faturamento||0; META.ticket=row.valores.ticket||0;
        META.comparecimento=row.valores.comparecimento||0; META.conversao=row.valores.conversao||0; META.ocupacao=row.valores.ocupacao||0;
      }
    });
    window.__lastCalc=null;
  } catch(e){ console.error('Erro ao carregar dados:', e); }
}

/* ---- helpers de persistência (chamados pelas funções de salvar) ---- */
async function sbInsert(tabela, registro){
  if(!MODO_NUVEM) return null;
  const { data:{ user } } = await sb.auth.getUser();
  const { data, error } = await sb.from(tabela).insert({...registro, user_id:user.id}).select().single();
  if(error){ console.error('insert '+tabela, error); alert('Erro ao salvar: '+error.message); return null; }
  return data;
}
async function sbUpdate(tabela, id, registro){
  if(!MODO_NUVEM) return null;
  const { error } = await sb.from(tabela).update(registro).eq('id', id);
  if(error){ console.error('update '+tabela, error); alert('Erro ao atualizar: '+error.message); }
}
async function sbDelete(tabela, id){
  if(!MODO_NUVEM) return;
  const { error } = await sb.from(tabela).delete().eq('id', id);
  if(error){ console.error('delete '+tabela, error); alert('Erro ao excluir: '+error.message); }
}

function metasBlock(k){
  const metas=[
    {n:'Faturamento',r:k.faturamento,m:META.faturamento,f:BRL},
    {n:'Ticket médio',r:k.ticket,m:META.ticket,f:BRL},
    {n:'Comparecimento',r:k.txComp,m:META.comparecimento,f:PCT},
    {n:'Conversão de leads',r:k.txConv,m:META.conversao,f:PCT},
    {n:'Ocupação',r:k.txOcup,m:META.ocupacao,f:PCT},
  ];
  const algumaMeta = metas.some(x=>x.m>0);
  if(!algumaMeta){
    return `<div style="color:var(--grey);font-size:13px;line-height:1.6;padding:6px 0">
      Você ainda não definiu as metas gerais da clínica.<br>
      Defina-as em <b>Controle → Configurações → Metas gerais da clínica</b> para acompanhar o realizado x objetivo aqui.
    </div>`;
  }
  return metas.filter(x=>x.m>0).map(x=>{
    const p=x.m?x.r/x.m:0, w=Math.min(p,1.15)/1.15*100;
    const cls=p>=1?'hit':(p<0.7?'low':'');
    const col=p>=1?'var(--green)':p<0.7?'var(--red)':'var(--gold-d)';
    return `<div class="meta-row"><div class="mr-top"><span class="mr-name">${x.n}</span>
      <span class="mr-vals"><b>${x.f(x.r)}</b> / ${x.f(x.m)}<span class="mr-pct" style="color:${col}">${PCT0(p)}</span></span></div>
      <div class="bar"><i class="${cls}" data-w="${w}"></i></div></div>`;
  }).join('');
}

function renderLeads(pg){
  const grao=window.__captGrao||'dia';

  CAPTACAO.forEach(c=>{

    p.seguidores+=c.seguidores||0; p.leads+=c.leads||0; p.agendadas+=c.agendadas||0;

async function salvarCapt(id){
  const num=i=>{const v=document.getElementById(i).value;return v===''?0:+v;};
  const dados={data:document.getElementById('cp_data').value,plataforma:document.getElementById('cp_plat').value,
    seguidores:num('cp_seg'),leads:num('cp_leads'),agendadas:num('cp_agend'),
    investido:num('cp_inv'),gasto:num('cp_gasto'),campanhas:num('cp_camp')};
  if(MODO_NUVEM){
    if(id && id!=='0') await sbUpdate('captacao',id,dados); else await sbInsert('captacao',dados);
    await carregarTudo(); go('leads'); return;
  }
  if(id && id!=='0'){const c=CAPTACAO.find(x=>x.id==id);Object.assign(c,dados);}
  else{CAPTACAO.push({id:CAPT_SEQ++,...dados});}
  go('leads');
}
async function delCapt(id){ if(MODO_NUVEM){await sbDelete('captacao',id);await carregarTudo();} else {CAPTACAO=CAPTACAO.filter(c=>c.id!=id);} go('leads');}
function analisarCaptacao(){
  const porPlat={};
  CAPTACAO.forEach(c=>{if(!porPlat[c.plataforma])porPlat[c.plataforma]={plataforma:c.plataforma,leads:0,agendadas:0,gasto:0};
    porPlat[c.plataforma].leads+=c.leads||0;porPlat[c.plataforma].agendadas+=c.agendadas||0;porPlat[c.plataforma].gasto+=c.gasto||0;});
  const plats=Object.values(porPlat).filter(p=>p.leads>0);
  if(!plats.length){document.getElementById('analiseBox').innerHTML='<div style="padding:16px;color:var(--grey)">Sem dados suficientes.</div>';return;}
  const melhorConv=[...plats].sort((a,b)=>(b.agendadas/b.leads)-(a.agendadas/a.leads))[0];
  const maisLeads=[...plats].sort((a,b)=>b.leads-a.leads)[0];
  const ins=[];
  ins.push(`<b>${maisLeads.plataforma}</b> trouxe mais leads (${maisLeads.leads}).`);
  ins.push(`<b>${melhorConv.plataforma}</b> tem a melhor conversão: ${PCT0(melhorConv.agendadas/melhorConv.leads)} dos leads agendaram.`);
  plats.forEach(p=>{if(p.gasto>0){const cpl=p.gasto/p.leads;ins.push(`${p.plataforma}: custo de ${BRL(cpl)} por lead (gasto ${BRL(p.gasto)}).`);}});
  const orgClose=plats.find(p=>p.gasto===0&&p.leads>0);
  if(orgClose)ins.push(`<b style="color:var(--green)">${orgClose.plataforma}</b> gera leads sem custo de mídia — vale potencializar conteúdo orgânico e indicação.`);
  document.getElementById('analiseBox').innerHTML=`
    <div style="margin-top:18px;background:var(--cream);border:1px solid var(--gold-l);border-radius:14px;padding:18px">
      <div style="font-weight:500;font-family:'Cormorant Garamond',serif;font-size:18px;margin-bottom:10px">Análise da captação</div>
      ${ins.map(i=>`<div style="display:flex;gap:9px;margin-bottom:8px;font-size:13.5px"><span style="color:var(--gold-d)">•</span><span>${i}</span></div>`).join('')}
    </div>`;
}

  // fonte única: as despesas e receitas vêm do Livro-Caixa (dados reais)
  const c = calcCaixa();
  const total = c.despesa;
  const faturamento = c.receita;
  const resultado = c.resultado;
  const margem = faturamento ? resultado/faturamento : 0;
  const cats = c.catDespesaArr; // [{cat, valor}]
  const body = cats.length ? cats.map(x=>{
    const share = total ? x.valor/total : 0;

      options:{responsive:true,maintainAspectRatio:false,cutout:'56%',plugins:{legend:{display:false},

    document.getElementById('leg2').innerHTML=cats.map((x,i)=>`<span><i style="background:${GOLDS[i%GOLDS.length]}"></i>${x.cat}</span>`).join('');
  }
}

function planoConformidade(){
  const pend=DATA.conformidade.filter(c=>c.status==='Pendente');
  const aten=DATA.conformidade.filter(c=>c.status==='Atenção');
  if(!pend.length&&!aten.length){document.getElementById('confPlanoBox').innerHTML='<div style="margin-top:16px;padding:16px;background:var(--green-bg);border-radius:12px;color:var(--green);font-weight:600">Tudo em conformidade. Nenhuma ação pendente.</div>';return;}
  const item=(c,prio)=>`<div style="display:flex;gap:10px;margin-bottom:9px;font-size:13.5px"><span style="color:${prio==='alta'?'var(--red)':'var(--amber)'};font-weight:700">${prio==='alta'?'1':'2'}</span><span><b>${c.item}</b> — responsável: ${c.resp}. ${prio==='alta'?'Prioridade alta: pendência que pode gerar multa ou interdição.':'Revisar e atualizar para evitar virar pendência.'}</span></div>`;
  document.getElementById('confPlanoBox').innerHTML=`
    <div style="margin-top:18px;background:var(--cream);border:1px solid var(--gold-l);border-radius:12px;padding:18px">
      <div style="font-weight:600;font-family:'Cormorant Garamond',serif;font-size:18px;margin-bottom:12px">Plano de ação prioritário</div>
      ${pend.map(c=>item(c,'alta')).join('')}
      ${aten.map(c=>item(c,'media')).join('')}
      <div style="margin-top:10px;font-size:12px;color:var(--grey);font-style:italic">Resolva primeiro os itens vermelhos (pendentes), depois os amarelos (atenção).</div>
    </div>`;
}

/* ============================================================
   ASSISTENTE — IA gratuita baseada em regras e cálculos.
   Sem API externa, sem custo. Analisa calc() e responde.
   ============================================================ */

function gerarInsights(){
  const k=calc(); const ins=[];
  // Resultado financeiro
  if(k.lucro<0){
    ins.push({tipo:'alerta',icone:'alert',titulo:'Resultado negativo no período',
      texto:`As despesas (${BRL(k.custoTotal)}) e impostos superaram o faturamento (${BRL(k.faturamento)}), gerando prejuízo de ${BRL(Math.abs(k.lucro))}. Para o resultado ficar positivo, o faturamento precisaria passar de ${BRL((k.custoTotal)/(1-META.imposto))}.`});
  } else {
    ins.push({tipo:'bom',icone:'check',titulo:'Operação no azul',
      texto:`Lucro líquido de ${BRL(k.lucro)}, com margem de ${PCT(k.margem)}. Resultado saudável para o período.`});
  }
  // Meta de faturamento (só se houver meta definida)
  if(META.faturamento>0){
    const pf=k.faturamento/META.faturamento;
    if(pf<0.7){
      ins.push({tipo:'alerta',icone:'target',titulo:'Faturamento abaixo da meta',
        texto:`Você atingiu ${PCT0(pf)} da meta de ${BRL(META.faturamento)}. Faltam ${BRL(META.faturamento-k.faturamento)} para o objetivo do mês.`});
    } else if(pf>=1){
      ins.push({tipo:'bom',icone:'target',titulo:'Meta de faturamento batida',
        texto:`Faturamento ${PCT0(pf)} da meta. Excelente desempenho comercial.`});
    }
  }
  // Melhor e pior canal
  const canaisComLeads=k.porCanal.filter(c=>c.leads>0);
  if(canaisComLeads.length){
    const melhor=[...canaisComLeads].sort((a,b)=>b.conv-a.conv)[0];
    const maisReceita=[...k.porCanal].sort((a,b)=>b.receita-a.receita)[0];
    ins.push({tipo:'info',icone:'trophy',titulo:`Melhor canal: ${melhor.canal}`,
      texto:`${melhor.canal} converteu ${PCT0(melhor.conv)} dos leads. Em receita, o destaque é ${maisReceita.canal} com ${BRL(maisReceita.receita)}.`});
    // canal ineficiente: muito investimento, pouca conversão
    const pago=k.porCanal.find(c=>c.canal==='Tráfego Pago');
    if(pago && pago.conv<0.4 && k.investMkt>0){
      ins.push({tipo:'alerta',icone:'cash',titulo:'Atenção ao Tráfego Pago',
        texto:`O Tráfego Pago converteu apenas ${PCT0(pago.conv)} e concentra o investimento de marketing (${BRL(k.investMkt)}, CAC de ${BRL(k.cac)}). Vale revisar segmentação dos anúncios ou redirecionar verba para canais que convertem melhor, como indicação.`});
    }
  }
  // No-shows
  if(k.noShows>0){
    const taxaNoShow=k.noShows/(k.nAtend+k.noShows);
    ins.push({tipo: taxaNoShow>0.1?'alerta':'info',icone:'calendar',titulo:`${k.noShows} falta(s) na agenda`,
      texto:`No-shows representam ${PCT0(taxaNoShow)} dos agendamentos. ${taxaNoShow>0.1?'Acima do ideal — ':''}Confirmação por WhatsApp 24h e 2h antes, e sinal para procedimentos caros, reduzem faltas.`});
  }
  // Procedimento campeão
  if(k.porProc.length){
    const top=[...k.porProc].sort((a,b)=>b.receita-a.receita)[0];
    ins.push({tipo:'info',icone:'star',titulo:`Carro-chefe: ${top.proc}`,
      texto:`${top.proc} respondeu por ${PCT0(top.share)} do faturamento (${BRL(top.receita)}, ${top.qtd} atendimento(s)). Considere pacotes e divulgação focada nesse procedimento.`});
  }
  // Maior despesa
  if(k.porCat.length){
    const maior=k.porCat[0];
    ins.push({tipo:'info',icone:'wallet',titulo:`Maior despesa: ${maior.cat}`,
      texto:`${maior.cat} é ${PCT0(maior.valor/k.custoTotal)} dos custos (${BRL(maior.valor)}). É o primeiro lugar para olhar se precisar enxugar gastos.`});
  }
  // Ocupação da agenda
  if(k.txOcup<META.ocupacao){
    ins.push({tipo:'info',icone:'clock',titulo:'Agenda com espaço ocioso',
      texto:`Ocupação em ${PCT(k.txOcup)} contra meta de ${PCT0(META.ocupacao)}. Há horários livres que poderiam virar faturamento — ações de reativação de pacientes antigos ajudam a preencher.`});
  }
  // Conformidade
  const pend=k.confTotal-k.confOK;
  if(pend>0){
    ins.push({tipo:'alerta',icone:'shield',titulo:`${pend} pendência(s) de conformidade`,
      texto:`${k.confOK} de ${k.confTotal} itens regularizados. Pendências sanitárias/legais expõem a clínica a multa e interdição — priorize a regularização.`});
  }
  return ins;
}

/* Responde perguntas livres por correspondência de palavras-chave */
function responder(pergunta){
  const k=calc(); const q=pergunta.toLowerCase();
  const has=(...t)=>t.some(x=>q.includes(x));
  if(has('lucro','resultado','sobrou','ganh')){
    return k.lucro>=0
      ? `O lucro líquido do período é <b>${BRL(k.lucro)}</b>, com margem de <b>${PCT(k.margem)}</b>. Faturamento de ${BRL(k.faturamento)} menos ${BRL(k.imposto)} de impostos e ${BRL(k.custoTotal)} de despesas.`
      : `No período há <b>prejuízo de ${BRL(Math.abs(k.lucro))}</b>. O faturamento (${BRL(k.faturamento)}) não cobriu impostos (${BRL(k.imposto)}) e despesas (${BRL(k.custoTotal)}). Para empatar, seria preciso faturar cerca de ${BRL(k.custoTotal/(1-META.imposto))}.`;
  }
  if(has('faturamento','faturou','receita','vendeu')){
    return `O faturamento do período é <b>${BRL(k.faturamento)}</b>, que equivale a ${PCT0(k.faturamento/META.faturamento)} da meta de ${BRL(META.faturamento)}. Ticket médio de ${BRL(k.ticket)}.`;
  }
  if(has('melhor canal','canal melhor','canal converte','onde investir','melhor origem')){
    const m=[...k.porCanal.filter(c=>c.leads>0)].sort((a,b)=>b.conv-a.conv)[0];
    const r=[...k.porCanal].sort((a,b)=>b.receita-a.receita)[0];
    return m?`O canal que <b>mais converte</b> é <b>${m.canal}</b> (${PCT0(m.conv)} dos leads). Em <b>receita</b>, o líder é ${r.canal} com ${BRL(r.receita)}. Vale concentrar esforço nesses canais.`:`Ainda não há leads suficientes para comparar canais.`;
  }
  if(has('pior canal','cortar','desperdíci','desperdici','gastando à toa','tráfego','trafego')){
    const pago=k.porCanal.find(c=>c.canal==='Tráfego Pago');
    return pago?`O <b>Tráfego Pago</b> converteu ${PCT0(pago.conv)} e tem CAC de ${BRL(k.cac)} (investimento total ${BRL(k.investMkt)}). ${pago.conv<0.4?'Está abaixo do ideal — avalie melhorar os anúncios ou migrar parte da verba para indicação, que costuma ter custo zero e alta conversão.':'Está com desempenho razoável.'}`:`Sem dados de canal pago no período.`;
  }
  if(has('ticket','valor médio','médio por')){
    return `O ticket médio é <b>${BRL(k.ticket)}</b> (meta ${BRL(META.ticket)}). Para subir o ticket: pacotes combinados, protocolos de manutenção e oferta de procedimentos complementares na mesma sessão.`;
  }
  if(has('no-show','no show','falta','furo','faltou')){
    return `Houve <b>${k.noShows} falta(s)</b> no período. Confirmação ativa por WhatsApp (24h e 2h antes) e cobrança de sinal em procedimentos caros são as medidas mais eficazes para reduzir.`;
  }
  if(has('conversão','converte','funil','fecha')){
    return `A taxa de conversão de leads é <b>${PCT(k.txConv)}</b> (meta ${PCT0(META.conversao)}). De cada 10 pessoas que agendam, cerca de ${Math.round(k.txConv*10)} fecham.`;
  }
  if(has('custo','despesa','gasto','gastando')){
    const m=k.porCat[0];
    return `As despesas somam <b>${BRL(k.custoTotal)}</b>. A maior é <b>${m.cat}</b> (${BRL(m.valor)}, ${PCT0(m.valor/k.custoTotal)} do total). É o primeiro lugar para revisar se precisar reduzir gastos.`;
  }
  if(has('conformidade','regulariz','anvisa','pgrss','licença','licenca','vigilância','vigilancia')){
    const pend=k.confTotal-k.confOK;
    return pend?`Há <b>${pend} pendência(s)</b> de conformidade (${k.confOK}/${k.confTotal} em dia). Pendências sanitárias e legais devem ser prioridade, pois expõem a clínica a multa e interdição.`:`Conformidade <b>100% em dia</b> (${k.confOK}/${k.confTotal}). Mantenha o acompanhamento mensal.`;
  }
  if(has('procedimento','carro-chefe','carro chefe','mais vende','popular')){
    const t=[...k.porProc].sort((a,b)=>b.receita-a.receita)[0];
    return t?`O procedimento que mais fatura é <b>${t.proc}</b>: ${BRL(t.receita)} (${PCT0(t.share)} do total, ${t.qtd} atendimento(s)).`:`Sem procedimentos registrados no período.`;
  }
  if(has('ocupação','ocupacao','agenda','horário livre','horario livre','ociosa')){
    return `A ocupação da agenda está em <b>${PCT(k.txOcup)}</b> (meta ${PCT0(META.ocupacao)}). ${k.txOcup<META.ocupacao?'Há espaço ocioso — reativar pacientes antigos ajuda a preencher.':'Boa ocupação.'}`;
  }
  if(has('cac','custo por lead','aquisição','aquisicao')){
    return `O custo de aquisição por cliente (CAC) é <b>${BRL(k.cac)}</b>, com ${BRL(k.investMkt)} investidos em marketing no período.`;
  }
  if(has('resumo','como est','panorama','geral','vai a clínica','vai a clinica','situação','situacao')){
    return `<b>Resumo do período:</b> faturamento ${BRL(k.faturamento)} (${PCT0(k.faturamento/META.faturamento)} da meta), ${k.nAtend} atendimentos, ticket médio ${BRL(k.ticket)}, conversão ${PCT(k.txConv)}. Resultado: <b>${k.lucro>=0?'lucro':'prejuízo'} de ${BRL(Math.abs(k.lucro))}</b>. ${k.confTotal-k.confOK>0?`Atenção: ${k.confTotal-k.confOK} pendência(s) de conformidade.`:'Conformidade em dia.'}`;
  }
  if(has('oi','olá','ola','bom dia','boa tarde','boa noite','ajuda','o que você')){
    return `Olá! Sou o assistente do sistema. Posso responder sobre faturamento, lucro, canais, conversão, custos, agenda e conformidade — tudo com base nos dados lançados. Experimente: "Como está a clínica?" ou "Qual o melhor canal?"`;
  }
  return `Não tenho um cálculo específico para isso ainda. Posso ajudar com: <b>faturamento, lucro, melhor canal, ticket médio, no-shows, conversão, custos, conformidade, ocupação da agenda e CAC</b>. Reformule a pergunta usando um desses temas.`;
}

function metaCard(m, av){
  const T=TIPO_META[m.tipo];
  const real=av.real;
  // barra de progresso até a faixa máxima
  const maxAlvo=Math.max(...m.faixas.map(f=>f.alvo));
  const prog=Math.min(real/maxAlvo,1)*100;
  // faixas com marcador de atingida
  const faixasHTML=av.ordenadas.map(f=>{
    const hit=real>=f.alvo;
    const isCurrent=av.atingida&&f.nome===av.atingida.nome;
    return `<div style="flex:1;text-align:center;padding:10px 6px;border-radius:10px;background:${isCurrent?'var(--green-bg)':hit?'var(--cream)':'var(--paper)'};border:1px solid ${isCurrent?'var(--green)':'var(--line)'}">
      <div style="font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--grey);font-weight:600">${f.nome}</div>
      <div style="font-size:15px;font-weight:600;margin:3px 0;color:var(--ink)">${T.fmt(f.alvo)}</div>
      <div style="font-size:12px;color:${isCurrent?'var(--green)':'var(--gold-d)'};font-weight:600">${bonusLabel(f.bonus)}</div>
      ${hit?'<div style="font-size:10px;color:var(--green);margin-top:3px">✓ atingida</div>':'<div style="font-size:10px;color:var(--grey);margin-top:3px">—</div>'}
    </div>`;
  }).join('');
  const faltaTxt = av.proxima
    ? `Faltam <b>${T.fmt(av.proxima.alvo-real)}</b> para a faixa ${av.proxima.nome} (${bonusLabel(av.proxima.bonus)})`
    : `<b style="color:var(--green)">Faixa máxima atingida!</b>`;
  return `<div class="panel" style="margin-bottom:16px">
    <div class="panel-head">
      <div>
        <h3 style="font-size:18px">${T.label} · ${m.periodo}</h3>
        <div class="ph-sub">${funcNome(m.funcId)} · <span style="text-transform:uppercase;font-size:10px;letter-spacing:.5px;background:${m.escopo==='geral'?'var(--ivory2)':'var(--cream)'};padding:2px 8px;border-radius:10px;color:var(--gold-d)">${m.escopo==='geral'?'Meta geral':'Individual'}</span> · realizado: <b style="color:var(--ink)">${T.fmt(real)}</b></div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--grey);text-transform:uppercase;letter-spacing:.6px">Bônus atual</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:${av.bonus>0?'var(--gold-d)':'var(--grey)'}">${BRL(av.bonus)}</div>
        <button class="btn ghost" style="padding:4px 12px;font-size:12px;margin-top:4px" onclick="editarMeta('${m.id}')">Editar</button>
      </div>
    </div>

let GRAO_ANALISE='dia'; // 'dia' | 'semana' | 'mes'
function setGrao(g){GRAO_ANALISE=g; go('analise');}

// agrupa a série diária de atendimentos em dia / semana / mês
function agruparSerie(grao){
  const at=DATA.atendimentos.filter(a=>a.agenda==='Compareceu');
  const buckets={};
  at.forEach(a=>{
    const d=new Date(a.data+'T00:00:00');
    let chave, ordem;
    if(grao==='dia'){
      chave=a.data.slice(8)+'/'+a.data.slice(5,7); ordem=a.data;
    } else if(grao==='semana'){
      // semana do mês (1-5)
      const sem=Math.ceil(d.getDate()/7);
      chave='Sem '+sem+'/'+a.data.slice(5,7); ordem=a.data.slice(0,7)+'-S'+sem;
    } else {
      const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      chave=meses[d.getMonth()]+'/'+d.getFullYear(); ordem=a.data.slice(0,7);
    }
    if(!buckets[chave]) buckets[chave]={chave,ordem,valor:0,atend:0};
    buckets[chave].valor+=a.valor; buckets[chave].atend+=1;
  });
  return Object.values(buckets).sort((x,y)=>x.ordem.localeCompare(y.ordem));
}

function projecaoBlock(k){
  const ev=k.evolucao||[];
  if(!ev.length){
    return `<div style="color:var(--grey);font-size:13px;padding:8px 0">Sem dados suficientes para projeção. Conforme você lança atendimentos ao longo dos meses, a tendência aparece aqui.</div>`;
  }
  const ultimos=ev.slice(-3).map(e=>e.fat);
  const media=ultimos.reduce((a,b)=>a+b,0)/ultimos.length;
  const tend=ev.length>1?(ev[ev.length-1].fat-ev[0].fat)/ev.length:0;
  const proj=Math.max(0,Math.round((media+tend)/100)*100);
  return `
    <div class="dre-line"><span>Média ${ultimos.length} ${ultimos.length>1?'meses':'mês'}</span><span class="amt">${BRL(media)}</span></div>
    <div class="dre-line"><span>Tendência mensal</span><span class="amt ${tend>=0?'pos':'neg'}">${tend>=0?'+':''}${BRL(tend)}</span></div>
    <div class="dre-line total"><span>Projeção próximo mês</span><span class="amt pos">${BRL(proj)}</span></div>
    <div style="margin-top:14px;font-size:12px;color:var(--grey);font-style:italic">Estimativa baseada na média móvel e tendência. Quanto mais meses lançados, mais precisa fica.</div>`;
}

async function excluirFunc(id){
  if(METAS.some(m=>m.funcId==id)){alert('Este funcionário tem metas vinculadas. Remova as metas antes de excluir.');return;}
  if(MODO_NUVEM){await sbDelete('funcionarios',id);await carregarTudo();} else {FUNCIONARIOS=FUNCIONARIOS.filter(f=>f.id!=id);}
  go('funcionarios');
}

/* ============================ LIVRO-CAIXA ============================ */
function calcCaixa(){
  // saldo por carteira + resultado da clínica
  const saldos={};
  CARTEIRAS.forEach(c=>saldos[c.id]=c.saldoInicial);
  let receita=0, despesa=0, aporte=0, retirada=0, gastoMateriais=0;
  const porCatDespesa={}, porCatReceita={};
  CAIXA.forEach(m=>{
    const t=TIPOS_LANC[m.tipo];
    if(m.tipo==='transferencia'){
      if(saldos[m.carteira]!=null) saldos[m.carteira]-=m.valor;
      if(saldos[m.carteiraDest]!=null) saldos[m.carteiraDest]+=m.valor;
    } else {
      if(saldos[m.carteira]!=null) saldos[m.carteira]+=t.sinal*m.valor;
    }
    if(t.ehReceita){ receita+=m.valor; porCatReceita[m.categoria]=(porCatReceita[m.categoria]||0)+m.valor; }
    if(t.ehDespesa){ despesa+=m.valor; porCatDespesa[m.categoria]=(porCatDespesa[m.categoria]||0)+m.valor; }
    if(m.tipo==='aporte') aporte+=m.valor;
    if(m.tipo==='retirada') retirada+=m.valor;
    if(m.tipo==='despesa' && (m.categoria==='Produtos/Insumos')) gastoMateriais+=m.valor;
  });
  const saldoTotal=Object.values(saldos).reduce((s,v)=>s+v,0);
  const resultado=receita-despesa; // resultado da clínica (não conta aporte/retirada)
  const catDespesaArr=Object.entries(porCatDespesa).map(([cat,v])=>({cat,valor:v})).sort((a,b)=>b.valor-a.valor);
  const catReceitaArr=Object.entries(porCatReceita).map(([cat,v])=>({cat,valor:v})).sort((a,b)=>b.valor-a.valor);
  return {saldos,saldoTotal,receita,despesa,aporte,retirada,gastoMateriais,resultado,catDespesaArr,catReceitaArr};
}

  else if(tipo==='retirada') cats=['Pró-labore','Distribuição de lucro','Outros'];

    carteiraDest: tipo==='transferencia'?+v('lc_cartDest'):null};
  if(MODO_NUVEM){
    const reg={data:dados.data,tipo:dados.tipo,categoria:dados.categoria,descricao:dados.desc,valor:dados.valor,carteira_id:document.getElementById('lc_cart').value,carteira_dest:tipo==='transferencia'?document.getElementById('lc_cartDest').value:null};
    if(id && id!=='0') await sbUpdate('lancamentos',id,reg); else await sbInsert('lancamentos',reg);
    await carregarTudo(); go('caixa'); return;
  }
  if(id && id!=='0'){const m=CAIXA.find(x=>x.id==id);Object.assign(m,dados);}
  else{CAIXA.push({id:CAIXA_SEQ++,...dados});}
  go('caixa');
}
async function excluirCaixa(id){ if(MODO_NUVEM){await sbDelete('lancamentos',id);await carregarTudo();} else {CAIXA=CAIXA.filter(m=>m.id!=id);} go('caixa');}

function abrirCarteiraForm(){ editarCarteira(0); }
function editarCarteira(id){
  const w=id?CARTEIRAS.find(x=>x.id===id):{id:0,nome:'',saldoInicial:''};
  const fs='padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;background:var(--paper);color:var(--ink)';
  document.getElementById('cartCatBox').innerHTML=`
    <div style="background:var(--cream);border:1px solid var(--gold-l);border-radius:14px;padding:16px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
      <div class="field"><label>Nome da carteira</label><input id="cw_nome" value="${w.nome}" placeholder="Ex: Conta Banco" style="${fs};min-width:200px"></div>
      <div class="field"><label>Saldo inicial (R$)</label><input type="number" id="cw_saldo" value="${w.saldoInicial}" style="${fs};min-width:140px"></div>
      <button class="btn" onclick="salvarCarteira('${w.id}')">Salvar</button>
      <button class="btn ghost" onclick="document.getElementById('cartCatBox').innerHTML=''">Cancelar</button>
    </div>`;
}
async function salvarCarteira(id){
  const nome=document.getElementById('cw_nome').value.trim()||'Carteira';
  const saldo=+document.getElementById('cw_saldo').value||0;
  if(MODO_NUVEM){
    if(id && id!=='0') await sbUpdate('carteiras',id,{nome,saldo_inicial:saldo}); else await sbInsert('carteiras',{nome,saldo_inicial:saldo});
    await carregarTudo(); go('caixa'); return;
  }
  if(id && id!=='0' && id!==0){const w=CARTEIRAS.find(x=>x.id==id);w.nome=nome;w.saldoInicial=saldo;}
  else{CARTEIRAS.push({id:CART_SEQ++,nome,saldoInicial:saldo});}
  go('caixa');
}
async function delCarteira(id){
  if(CAIXA.some(m=>m.carteira==id||m.carteiraDest==id)){alert('Esta carteira tem lançamentos. Remova-os antes de excluir.');return;}
  if(MODO_NUVEM){await sbDelete('carteiras',id);await carregarTudo();} else {CARTEIRAS=CARTEIRAS.filter(w=>w.id!=id);}
  go('caixa');
}
function abrirCatForm(){
  const fs='padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;background:var(--paper);color:var(--ink)';
  document.getElementById('cartCatBox').innerHTML=`
    <div style="background:var(--cream);border:1px solid var(--gold-l);border-radius:14px;padding:16px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
      <div class="field"><label>Tipo</label><select id="ct_tipo" style="${fs}"><option value="despesa">Despesa</option><option value="receita">Receita</option></select></div>
      <div class="field"><label>Nome da categoria</label><input id="ct_nome" placeholder="Ex: Limpeza" style="${fs};min-width:200px"></div>
      <button class="btn" onclick="salvarCat()">Adicionar</button>
      <button class="btn ghost" onclick="document.getElementById('cartCatBox').innerHTML=''">Cancelar</button>
    </div>`;
}
async function salvarCat(){
  const tipo=document.getElementById('ct_tipo').value;
  const nome=document.getElementById('ct_nome').value.trim();
  if(!nome)return;
  if(MODO_NUVEM){ await sbInsert('categorias',{nome,tipo}); await carregarTudo(); go('caixa'); return; }
  const arr=tipo==='receita'?CAT_RECEITA:CAT_DESPESA;
  if(!arr.includes(nome))arr.splice(arr.length-1,0,nome);
  go('caixa');
}
async function delCat(tipo,nome){
  if(MODO_NUVEM){
    const t=tipo==='receita'?'receita':'despesa';
    await sb.from('categorias').delete().eq('nome',nome).eq('tipo',t);
    await carregarTudo(); go('caixa'); return;
  }
  if(tipo==='despesa')CAT_DESPESA=CAT_DESPESA.filter(c=>c!==nome);
  else CAT_RECEITA=CAT_RECEITA.filter(c=>c!==nome);
  go('caixa');
}

/* ============================ RELATÓRIO PDF ============================ */

    <div class="panel">

      <div style="margin-bottom:22px">
        <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--grey);font-weight:600;margin-bottom:12px">1 · Período do relatório</div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end">

              <option value="mes" selected>Mensal</option><option value="ano">Anual</option>
            </select>
          </div>
          <div class="field"><label>Referência</label>
            <input id="rb_ref" value="Junho 2026" style="padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-family:inherit;min-width:160px">
          </div>
        </div>
      </div>

      <div>
        <div style="font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--grey);font-weight:600;margin-bottom:12px">2 · Blocos a incluir</div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
          ${chk('resumo','Resumo executivo','Faturamento, lucro, ticket, atendimentos')}
          ${chk('faturamento','Faturamento detalhado','Por procedimento e por canal')}
          ${chk('leads','Leads e conversão','Funil, conversão e desempenho por canal')}
          ${chk('atendimentos','Atendimentos','Lista de atendimentos do período')}

          ${chk('caixa','Fluxo de caixa','Entradas, saídas e saldo')}
          ${chk('pacientes','Pacientes','Base, recompra e LTV')}

        <button class="btn" onclick="gerarPDF()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Gerar relatório PDF</button>
        <span style="font-size:12px;color:var(--grey);align-self:center;font-style:italic">Abre a janela de impressão — escolha "Salvar como PDF".</span>
      </div>

}

function gerarPDF(){
  const k=calc();
  const on=id=>{const e=document.getElementById('rb_'+id);return e&&e.checked;};
  const grao=document.getElementById('rb_grao').value;
  const ref=document.getElementById('rb_ref').value||'';
  const hoje=new Date().toLocaleDateString('pt-BR');
  const sec=(t,inner)=>`<h2>${t}</h2>${inner}`;
  const tbl=(heads,rows)=>`<table><thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>`;
  let body='';

  if(on('resumo')){
    body+=sec('Resumo executivo', tbl(['Indicador','Valor'],[
      ['Faturamento',BRL(k.faturamento)],['Lucro líquido',BRL(k.lucro)],['Margem',PCT(k.margem)],
      ['Ticket médio',BRL(k.ticket)],['Atendimentos',k.nAtend],['Taxa de comparecimento',PCT(k.txComp)],
      ['Conversão de leads',PCT(k.txConv)],['Custo total',BRL(k.custoTotal)]
    ].map(r=>`<tr><td>${r[0]}</td><td class="n">${r[1]}</td></tr>`).join('')));
  }
  if(on('faturamento')){
    body+=sec('Faturamento por procedimento', tbl(['Procedimento','Qtd','Receita','%'],
      k.porProc.map(p=>`<tr><td>${p.proc}</td><td class="n">${p.qtd}</td><td class="n">${BRL(p.receita)}</td><td class="n">${PCT0(p.share)}</td></tr>`).join('')));
    body+=sec('Faturamento por canal', tbl(['Canal','Receita'],
      k.porCanal.map(c=>`<tr><td>${c.canal}</td><td class="n">${BRL(c.receita)}</td></tr>`).join('')));
  }
  if(on('leads')){
    body+=sec('Leads e conversão', tbl(['Canal','Leads','Fechados','Conversão','Receita'],
      k.porCanal.map(c=>`<tr><td>${c.canal}</td><td class="n">${c.leads}</td><td class="n">${c.fechados}</td><td class="n">${PCT0(c.conv)}</td><td class="n">${BRL(c.receita)}</td></tr>`).join('')));
  }
  if(on('atendimentos')){
    body+=sec('Atendimentos do período', tbl(['Data','Paciente','Procedimento','Profissional','Valor','Status'],
      DATA.atendimentos.map(a=>`<tr><td>${fmtDate(a.data)}</td><td>${a.paciente}</td><td>${a.proc}</td><td>${a.func||'—'}</td><td class="n">${BRL(a.valor)}</td><td>${a.agenda}</td></tr>`).join('')));
  }
  if(on('comissoes')){
    const rows=METAS.map(m=>{const av=avaliarMeta(m);const T=TIPO_META[m.tipo];
      return `<tr><td>${funcNome(m.funcId)}</td><td>${T.label} (${m.escopo})</td><td class="n">${T.fmt(av.real)}</td><td>${av.atingida?av.atingida.nome:'—'}</td><td class="n">${BRL(av.bonus)}</td></tr>`;}).join('');
    body+=sec('Metas e bonificações', tbl(['Funcionário','Meta','Realizado','Faixa','Bônus'],rows));
  }
  if(on('caixa')){
    const cc=calcCaixa();
    const linhas=[
      ['Receita (procedimentos)',BRL(cc.receita)],
      ['Aportes (não-receita)',BRL(cc.aporte)],
      ['Despesas',BRL(cc.despesa)],
      ['Retiradas',BRL(cc.retirada)],
      ['Resultado da clínica (receita − despesa)',BRL(cc.resultado)],
      ['Saldo total em caixa',BRL(cc.saldoTotal)],
    ].map(r=>`<tr><td>${r[0]}</td><td class="n">${r[1]}</td></tr>`).join('');
    body+=sec('Fluxo de caixa', tbl(['Indicador','Valor'],linhas));
    const cart=CARTEIRAS.map(w=>`<tr><td>${w.nome}</td><td class="n">${BRL(cc.saldos[w.id])}</td></tr>`).join('');
    body+=sec('Saldo por carteira', tbl(['Carteira','Saldo atual'],cart));
  }
  if(on('pacientes')){
    body+=sec('Pacientes', tbl(['Indicador','Valor'],[
      ['Total de pacientes',k.totalPacientes],['Recorrentes',k.pacRecorrentes],
      ['Taxa de recompra',PCT(k.txRecompra)],['LTV médio',BRL(k.ltv)]
    ].map(r=>`<tr><td>${r[0]}</td><td class="n">${r[1]}</td></tr>`).join('')));
  }
  if(on('conformidade')){
    body+=sec('Conformidade', tbl(['Item','Responsável','Status'],
      DATA.conformidade.map(c=>`<tr><td>${c.item}</td><td>${c.resp}</td><td>${c.status}</td></tr>`).join('')));
  }

  const graoLabel={dia:'Diário',semana:'Semanal',mes:'Mensal',ano:'Anual'}[grao];
  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Relatório · Instituto Bruna Braga</title>
  <style>
    @page{margin:18mm}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Georgia,'Times New Roman',serif;color:#211C16;font-size:12px;line-height:1.5}
    .hd{border-bottom:3px solid #C9A24B;padding-bottom:14px;margin-bottom:22px}
    .hd .brand{font-size:24px;font-weight:700;color:#9A7B2E;letter-spacing:.5px}
    .hd .sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#8A8175;margin-top:4px}
    .hd .meta{margin-top:10px;font-size:11px;color:#555}
    h2{font-size:15px;color:#9A7B2E;border-bottom:1px solid #E8DEC8;padding-bottom:6px;margin:22px 0 10px}
    table{width:100%;border-collapse:collapse;margin-bottom:6px;font-family:Arial,sans-serif;font-size:11px}
    th{background:#211C16;color:#fff;text-align:left;padding:7px 9px;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
    td{padding:6px 9px;border-bottom:1px solid #eee}
    td.n,th.n{text-align:right}
    tr:nth-child(even) td{background:#FBF8F1}
    .ft{margin-top:30px;padding-top:12px;border-top:1px solid #E8DEC8;font-size:10px;color:#999;text-align:center}
  </style></head><body>
    <div class="hd">
      <div class="brand">Instituto Bruna Braga</div>
      <div class="sub">Harmonização Facial · Relatório Gerencial</div>
      <div class="meta">Período: <b>${ref}</b> · Agrupamento: ${graoLabel} · Emitido em ${hoje}</div>
    </div>
    ${body||'<p>Nenhum bloco selecionado.</p>'}
    <div class="ft">Documento gerado pelo Sistema de Gestão · Instituto Bruna Braga</div>
  </body></html>`;
  const w=window.open('','_blank');
  if(!w){alert('Permita pop-ups para gerar o relatório.');return;}
  w.document.write(html); w.document.close();
  setTimeout(()=>{w.focus();w.print();},400);
}

/* ============================ CONFIGURAÇÕES ============================ */
const CONFIG_LISTAS = {
  procedimentos:{label:'Procedimentos',desc:'Serviços oferecidos pela clínica',get:()=>PROCS,set:v=>{PROCS=v;}},
  plataformas:{label:'Plataformas de captação',desc:'Origens usadas no relatório de marketing',get:()=>PLATAFORMAS,set:v=>{PLATAFORMAS=v;}},
  func_tipos:{label:'Tipos de funcionário',desc:'Categorias da equipe',get:()=>FUNC_TIPOS,set:v=>{FUNC_TIPOS=v;}},
  canais:{label:'Canais de origem',desc:'De onde o paciente veio',get:()=>CANAIS,set:v=>{CANAIS=v;}},
};

function renderConfig(pg){
  const blocos=Object.entries(CONFIG_LISTAS).map(([chave,cfg])=>{
    const itens=cfg.get();
    const chips=itens.map(it=>`<span style="display:inline-flex;align-items:center;gap:7px;background:var(--cream);border:1px solid var(--line);border-radius:18px;padding:6px 14px;font-size:13px">${it}<span style="cursor:pointer;color:var(--grey);font-weight:600" onclick="delConfigItem('${chave}','${it.replace(/'/g,"\\'")}')">×</span></span>`).join('');
    return `<div class="panel" style="margin-bottom:18px">
      <div class="panel-head"><div><h3>${cfg.label}</h3><div class="ph-sub">${cfg.desc}</div></div></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">${chips||'<span style="color:var(--grey);font-size:13px">Nenhum item ainda.</span>'}</div>
      <div style="display:flex;gap:10px">
        <input id="cfg_${chave}" placeholder="Adicionar novo..." style="flex:1;max-width:300px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink)" onkeydown="if(event.key==='Enter')addConfigItem('${chave}')">
        <button class="btn" onclick="addConfigItem('${chave}')">Adicionar</button>
      </div>
    </div>`;
  }).join('');
  const fs='padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink);width:130px';
  const metasGerais=`<div class="panel" style="margin-bottom:18px">
    <div class="panel-head"><div><h3>Metas gerais da clínica</h3><div class="ph-sub">Objetivos do mês mostrados no Painel (deixe 0 para não exibir)</div></div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px">
      <div class="field"><label>Faturamento (R$)</label><input type="number" id="mg_fat" value="${META.faturamento||''}" placeholder="ex: 60000" style="${fs}"></div>
      <div class="field"><label>Ticket médio (R$)</label><input type="number" id="mg_ticket" value="${META.ticket||''}" placeholder="ex: 800" style="${fs}"></div>
      <div class="field"><label>Comparecimento (%)</label><input type="number" id="mg_comp" value="${META.comparecimento?Math.round(META.comparecimento*100):''}" placeholder="ex: 90" style="${fs}"></div>
      <div class="field"><label>Conversão de leads (%)</label><input type="number" id="mg_conv" value="${META.conversao?Math.round(META.conversao*100):''}" placeholder="ex: 30" style="${fs}"></div>
      <div class="field"><label>Ocupação (%)</label><input type="number" id="mg_ocup" value="${META.ocupacao?Math.round(META.ocupacao*100):''}" placeholder="ex: 75" style="${fs}"></div>
    </div>
    <div style="margin-top:16px"><button class="btn" onclick="salvarMetasGerais()">Salvar metas gerais</button></div>
  </div>`;
  pg.innerHTML=`
    <div class="panel" style="margin-bottom:18px">
      <div class="panel-head"><div><h3>Configurações gerais</h3><div class="ph-sub">Crie e edite as listas do sistema — sem precisar mexer no código</div></div></div>
      <div style="font-size:13px;color:var(--grey);line-height:1.6">Tudo que você adicionar aqui aparece automaticamente nos formulários do sistema (atendimentos, captação, funcionários, etc.). ${MODO_NUVEM?'As alterações são salvas na nuvem.':'<b style="color:var(--amber)">Modo local:</b> as alterações valem só nesta sessão até conectar o Supabase.'}</div>
    </div>
    ${metasGerais}
    ${blocos}`;
}
async function salvarMetasGerais(){
  const num=i=>{const v=document.getElementById(i).value;return v===''?0:+v;};
  META.faturamento=num('mg_fat');
  META.ticket=num('mg_ticket');
  META.comparecimento=num('mg_comp')/100;
  META.conversao=num('mg_conv')/100;
  META.ocupacao=num('mg_ocup')/100;
  if(MODO_NUVEM){
    const { data:{ user } } = await sb.auth.getUser();
    await sb.from('configuracoes').upsert({user_id:user.id,chave:'metas_gerais',valores:{faturamento:META.faturamento,ticket:META.ticket,comparecimento:META.comparecimento,conversao:META.conversao,ocupacao:META.ocupacao}},{onConflict:'user_id,chave'});
  }
  window.__lastCalc=null;
  go('config');
}
async function addConfigItem(chave){
  const inp=document.getElementById('cfg_'+chave);
  const val=inp.value.trim(); if(!val)return;
  const cfg=CONFIG_LISTAS[chave]; const arr=cfg.get();
  if(!arr.includes(val)){ arr.push(val); cfg.set(arr); await salvarConfig(chave); }
  go('config');
}
async function delConfigItem(chave,item){
  const cfg=CONFIG_LISTAS[chave]; let arr=cfg.get().filter(x=>x!==item);
  cfg.set(arr); await salvarConfig(chave); go('config');
}
async function salvarConfig(chave){
  if(!MODO_NUVEM)return;
  const valores=CONFIG_LISTAS[chave].get();
  const { data:{ user } } = await sb.auth.getUser();
  const { error } = await sb.from('configuracoes').upsert({user_id:user.id,chave,valores},{onConflict:'user_id,chave'});
  if(error)console.error('config save',error);
}

/* ============================ TEMA (claro/escuro) ============================ */
function aplicarTema(t){
  if(t==='light'){ document.body.classList.add('light'); }
  else { document.body.classList.remove('light'); }
  const lbl=document.getElementById('temaLabel');
  if(lbl) lbl.textContent = t==='light' ? 'Escuro' : 'Claro';
  // redesenha gráficos com as novas cores, se houver página com chart
  try{ if(typeof currentPage!=='undefined' && ['painel','custos','analise'].includes(currentPage)) go(currentPage); }catch(e){}
}
function alternarTema(){
  const atual = document.body.classList.contains('light') ? 'light' : 'dark';
  const novo = atual==='light' ? 'dark' : 'light';
  try{ localStorage.setItem('ibb_tema', novo); }catch(e){}
  aplicarTema(novo);
}
// aplica o tema salvo ao carregar
(function(){
  let t='dark';
  try{ t = localStorage.getItem('ibb_tema') || 'dark'; }catch(e){}
  window.addEventListener('DOMContentLoaded',()=>aplicarTema(t));
})();

</script>
