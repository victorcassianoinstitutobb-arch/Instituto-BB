function contaNatMudou(){
  const nat=document.getElementById('ct_nat').value;
  const wrap=document.getElementById('ct_nparcWrap');
  const hint=document.getElementById('ct_hint');
  if(nat==='parcelada'){wrap.style.display='block';document.getElementById('ct_nparc').value=document.getElementById('ct_nparc').value||10;hint.textContent='Parcelada: cria N parcelas com vencimento mensal. Ao quitar cada uma, entra no Livro-Caixa do mês.';}
  else if(nat==='recorrente'){wrap.style.display='block';document.getElementById('ct_nparc').value=12;hint.textContent='Recorrente: cria 12 meses de parcelas iguais (ex: aluguel). Ajuste o número se quiser.';}
  else {wrap.style.display='none';hint.textContent='Avulsa: uma única parcela com vencimento na data informada.';}
}
async function salvarConta(){
  const v=i=>document.getElementById(i).value;
  const tipo=v('ct_tipo'), nat=v('ct_nat');
  const valorParcela=+v('ct_valor')||0;
  let numParcelas = nat==='avulsa'?1:(+v('ct_nparc')||1);
  const venc0=v('ct_venc');
  // gera parcelas com vencimento mensal
  const parcelas=[];
  for(let i=0;i<numParcelas;i++){
    const d=new Date(venc0+'T00:00:00'); d.setMonth(d.getMonth()+i);
    parcelas.push({n:i+1, vencimento:d.toISOString().slice(0,10), pago:false, lancId:null});
  }
  const conta={tipo, descricao:v('ct_desc')||'Conta', categoria:v('ct_cat'), natureza:nat,
    valorParcela, numParcelas, carteira:+v('ct_cart')||(CARTEIRAS[0]&&CARTEIRAS[0].id), parcelas};
  // edição?
  const editId = document.getElementById('contaFormBox').dataset.editId;
  if(editId){
    const orig=CONTAS.find(c=>c.id==editId);
    if(orig){
      // preserva o status pago/lancId das parcelas que já existiam
      conta.parcelas = parcelas.map(np=>{
        const antiga=(orig.parcelas||[]).find(op=>op.n===np.n);
        return antiga? {...np, pago:antiga.pago, lancId:antiga.lancId, vencimento:antiga.vencimento} : np;
      });
    }
    if(MODO_NUVEM){
      await sbUpdate('contas',editId,{tipo:conta.tipo,descricao:conta.descricao,categoria:conta.categoria,natureza:conta.natureza,valor_parcela:conta.valorParcela,num_parcelas:conta.numParcelas,carteira_id:document.getElementById('ct_cart').value||null,parcelas:conta.parcelas});
      await carregarTudo(); go('contas'); return;
    }
    Object.assign(orig, conta); go('contas'); return;
  }
  if(MODO_NUVEM){
    const reg={tipo:conta.tipo,descricao:conta.descricao,categoria:conta.categoria,natureza:conta.natureza,
      valor_parcela:conta.valorParcela,num_parcelas:conta.numParcelas,carteira_id:document.getElementById('ct_cart').value||null,
      primeiro_venc:venc0,parcelas:conta.parcelas};
    await sbInsert('contas',reg); await carregarTudo(); go('contas'); return;
  }
  conta.id=CONTA_SEQ++; CONTAS.push(conta); go('contas');
}
async function excluirConta(id){
  if(MODO_NUVEM){await sbDelete('contas',id);await carregarTudo();}
  else {CONTAS=CONTAS.filter(c=>c.id!=id);}
  go('contas');
}
// quitar uma parcela: marca como paga E cria lançamento no Livro-Caixa
async function quitarParcela(contaId, n){
  const c=CONTAS.find(x=>x.id==contaId); if(!c)return;
  const p=(c.parcelas||[]).find(x=>x.n===n); if(!p||p.pago)return;
  const hoje=new Date().toISOString().slice(0,10);
  const tipoLanc = c.tipo==='pagar'?'despesa':'receita';
  const desc=`${c.descricao} (${n}/${c.numParcelas})`;
  if(MODO_NUVEM){
    const { data:{ user } } = await sb.auth.getUser();
    // cria lançamento no caixa
    const lanc={user_id:user.id,data:hoje,tipo:tipoLanc,categoria:c.categoria,descricao:desc,valor:c.valorParcela,carteira_id:c.carteira||null,carteira_dest:null};
    const ins=await sb.from('lancamentos').insert(lanc).select().single();
    // marca parcela paga
    const novasParc=c.parcelas.map(x=>x.n===n?{...x,pago:true,lancId:ins.data?ins.data.id:null}:x);
    await sb.from('contas').update({parcelas:novasParc}).eq('id',contaId);
    await carregarTudo(); go('contas'); return;
  }
  // local
  CAIXA.push({id:CAIXA_SEQ++,data:hoje,tipo:tipoLanc,categoria:c.categoria,desc,valor:c.valorParcela,carteira:c.carteira||(CARTEIRAS[0]&&CARTEIRAS[0].id),carteiraDest:null});
  p.pago=true;
  go('contas');
}
// estornar: desfaz o pagamento de uma parcela e remove o lançamento do caixa
async function estornarParcela(contaId, n){
  const c=CONTAS.find(x=>x.id==contaId); if(!c)return;
  const p=(c.parcelas||[]).find(x=>x.n===n); if(!p||!p.pago)return;
  if(MODO_NUVEM){
    if(p.lancId){ await sb.from('lancamentos').delete().eq('id',p.lancId); }
    const novasParc=c.parcelas.map(x=>x.n===n?{...x,pago:false,lancId:null}:x);
    await sb.from('contas').update({parcelas:novasParc}).eq('id',contaId);
    await carregarTudo(); go('contas'); return;
  }
  // local: remove o último lançamento que casa com a descrição
  const desc=`${c.descricao} (${n}/${c.numParcelas})`;
  const idx=CAIXA.map(l=>l.desc).lastIndexOf(desc);
  if(idx>=0) CAIXA.splice(idx,1);
  p.pago=false;
  go('contas');
}
// editar conta: reabre o formulário preenchido (descrição, categoria, valor)
function editarConta(id){
  const c=CONTAS.find(x=>x.id==id); if(!c)return;
  abrirContaForm();
  const box=document.getElementById('contaFormBox');
  box.dataset.editId=id;
  document.getElementById('ct_tipo').value=c.tipo;
  document.getElementById('ct_nat').value=c.natureza; contaNatMudou();
  document.getElementById('ct_cat').value=c.categoria;
  document.getElementById('ct_desc').value=c.descricao;
  document.getElementById('ct_valor').value=c.valorParcela;
  if(document.getElementById('ct_nparc')) document.getElementById('ct_nparc').value=c.numParcelas;
  const primeira=(c.parcelas&&c.parcelas[0])?c.parcelas[0].vencimento:'';
  if(primeira) document.getElementById('ct_venc').value=primeira;
  // título indicando edição
  const tit=box.querySelector('.ct-form-title'); if(tit) tit.textContent='Editar conta';
  box.scrollIntoView({behavior:'smooth',block:'center'});
}

      </td>

  const baixoCount=ESTOQUE.filter(e=>{const a=saldoAtualMes(e.id,ym);return e.minimo>0&&a<=e.minimo;}).length;

// detalha o consumo do mês: cada produto, quanto, e em quais atendimentos
function consumoDetalhado(ym){
  return ESTOQUE.map(e=>{
    const usos=[]; let tot=0;
    DATA.atendimentos.forEach(a=>{
      if((a.data||'').slice(0,7)!==ym || a.agenda!=='Compareceu') return;
      let q=0;
      const procs=procedimentosDe(a);
      if(procs.length){ procs.forEach(p=>{ if(p.modo==='produto' && String(p.produtoId)===String(e.id) && p.qtd>0) q+=+p.qtd||0; }); }
      else if(a.baixaAplicada && a.baixaAplicada[e.id]){ q=+a.baixaAplicada[e.id]||0; }
      if(q>0){ usos.push(`${a.paciente} (${q} ${e.unidade||''})`); tot+=q; }
    });
    if(!tot) return '';
    return `<tr><td><b>${e.produto}</b></td><td class="ctr" style="color:var(--red);font-weight:600">${tot} ${e.unidade||''}</td><td style="font-size:12px;color:var(--grey)">${usos.join(' · ')}</td></tr>`;
  }).filter(Boolean).join('');
}

async function salvarProduto(id){
  const v=i=>document.getElementById(i).value;
  const ym=window.__estMes||mesHoje();
  const saldoIni=+v('pr_qtd')||0;
  const prod={produto:v('pr_nome')||'Produto',unidade:v('pr_uni'),minimo:+v('pr_min')||0,custoUnit:+v('pr_custo')||0};
  const ehEdicao = id && id!=='';
  if(MODO_NUVEM){
    if(ehEdicao){
      await sb.from('estoque').update({produto:prod.produto,unidade:prod.unidade,minimo:prod.minimo,custo_unit:prod.custoUnit}).eq('id',id);
      setRegMes(id,ym,'compra',saldoIni); await persistirEstoqueMes();
    } else {
      const { data } = await sb.from('estoque').insert({produto:prod.produto,unidade:prod.unidade,minimo:prod.minimo,custo_unit:prod.custoUnit}).select();
      const novoId = (data&&data[0])?data[0].id:null;
      if(novoId && saldoIni){ setRegMes(novoId,ym,'compra',saldoIni); await persistirEstoqueMes(); }
    }
    await carregarTudo(); window.__lastCalc=null; go('estoque'); return;
  }
  if(ehEdicao){ const ex=ESTOQUE.find(x=>String(x.id)===String(id)); if(ex) Object.assign(ex,prod); setRegMes(id,ym,'compra',saldoIni); }
  else { prod.id=EST_SEQ++; ESTOQUE.push(prod); if(saldoIni){ setRegMes(prod.id,ym,'compra',saldoIni); } }
  window.__lastCalc=null; go('estoque');
}
async function excluirProduto(id){
  if(MODO_NUVEM){await sbDelete('estoque',id);await carregarTudo();}
  else {ESTOQUE=ESTOQUE.filter(e=>e.id!=id);}
  go('estoque');
}

/* ============================ COMPARATIVO MENSAL ============================ */
// agrega faturamento, custo e resultado por mês (dados reais)
function dadosMensais(){
  const meses={};
  DATA.atendimentos.filter(a=>a.agenda==='Compareceu').forEach(a=>{
    const ym=a.data.slice(0,7);
    if(!meses[ym]) meses[ym]={ym,fat:0,custo:0,nAtend:0,receita:0};
    meses[ym].fat+=a.valor; meses[ym].nAtend+=1;
  });
  CAIXA.forEach(l=>{
    const ym=l.data.slice(0,7);
    if(!meses[ym]) meses[ym]={ym,fat:0,custo:0,nAtend:0,receita:0};
    if(l.tipo==='despesa') meses[ym].custo+=l.valor;
    if(l.tipo==='receita') meses[ym].receita+=l.valor;
  });
  // mescla faturamento histórico lançado manualmente (soma ao que houver)
  HISTORICO.forEach(h=>{
    if(!meses[h.ym]) meses[h.ym]={ym:h.ym,fat:0,custo:0,nAtend:0,receita:0,historico:true};
    meses[h.ym].receita += (h.faturamento||0);
    meses[h.ym].custo += (h.custo||0);
    meses[h.ym].historico=true;
  });
  return Object.values(meses).map(m=>({
    ...m,
    faturamento: m.receita||m.fat,
    resultado: (m.receita||m.fat)-m.custo,
    ticket: m.nAtend? (m.receita||m.fat)/m.nAtend : 0
  })).sort((a,b)=>a.ym.localeCompare(b.ym));
}

// projeção: regressão linear simples sobre o faturamento dos meses lançados
function projecaoMensal(dados){
  if(dados.length<2){
    return `<div class="panel" style="margin-bottom:18px;border-left:3px solid var(--gold)"><h3>Projeção</h3><div class="ph-sub">Tendência da clínica</div>
      <div style="font-size:13px;color:var(--grey);margin-top:8px">Lance pelo menos 2 meses para o sistema projetar a tendência dos próximos meses.</div></div>`;
  }
  // regressão linear y = a + b*x sobre faturamento
  const n=dados.length;
  const xs=dados.map((_,i)=>i);
  const ys=dados.map(m=>m.faturamento);
  const sx=xs.reduce((a,b)=>a+b,0), sy=ys.reduce((a,b)=>a+b,0);
  const sxy=xs.reduce((s,x,i)=>s+x*ys[i],0), sxx=xs.reduce((s,x)=>s+x*x,0);
  const b=(n*sxy-sx*sy)/(n*sxx-sx*sx||1);
  const a=(sy-b*sx)/n;
  const proj=k=>Math.max(0,Math.round((a+b*(n-1+k))/100)*100);
  // próximos 3 meses
  const ultYm=dados[dados.length-1].ym;
  const proximos=[1,2,3].map(k=>{
    const d=new Date(ultYm+'-01T00:00:00'); d.setMonth(d.getMonth()+k);
    return {ym:d.toISOString().slice(0,7), val:proj(k)};
  });
  const tendencia = b>=0?'crescimento':'queda';
  const corTend = b>=0?'var(--green)':'var(--red)';
  const mediaCusto=dados.slice(-3).reduce((s,m)=>s+m.custo,0)/Math.min(3,dados.length);
  return `
    <div class="panel" style="margin-bottom:18px;border-left:3px solid var(--gold)">
      <h3>Projeção dos próximos meses</h3><div class="ph-sub">Baseada na tendência dos ${n} meses lançados</div>
      <div style="display:flex;align-items:center;gap:10px;margin:10px 0 16px">
        <span style="font-size:13px;color:var(--grey)">Tendência de faturamento:</span>
        <span style="font-weight:600;color:${corTend}">${b>=0?'▲':'▼'} ${tendencia} de ${BRL(Math.abs(b))}/mês</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
        ${proximos.map(p=>{
          const resultadoProj=p.val-mediaCusto;
          return `<div style="padding:14px;border-radius:12px;background:var(--cream);border:1px solid var(--line)">
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--grey)">${mesAnoCurto(p.ym)}</div>
            <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold);margin:4px 0">${BRL(p.val)}</div>
            <div style="font-size:12px;color:var(--grey)">faturamento previsto</div>
            <div style="font-size:12px;color:${resultadoProj>=0?'var(--green)':'var(--red)'};margin-top:4px">resultado ~${BRL(resultadoProj)}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="margin-top:12px;font-size:12px;color:var(--grey);font-style:italic">Projeção estatística pela tendência dos meses lançados (considera custo médio dos últimos 3 meses). Quanto mais meses, mais precisa.</div>
    </div>`;
}
async function salvarHistorico(){
  const ym=document.getElementById('hist_mes').value;
  const fat=+document.getElementById('hist_fat').value||0;
  const custo=+document.getElementById('hist_custo').value||0;
  if(!ym||(!fat&&!custo))return;
  const existente=HISTORICO.find(h=>h.ym===ym);
  if(existente){ existente.faturamento=fat; existente.custo=custo; }
  else { HISTORICO.push({ym,faturamento:fat,custo}); }
  if(MODO_NUVEM){
    const { data:{ user } } = await sb.auth.getUser();
    await sb.from('configuracoes').upsert({user_id:user.id,chave:'historico',valores:HISTORICO},{onConflict:'user_id,chave'});
  }
  go('comparativo');
}
async function excluirHistorico(ym){
  HISTORICO=HISTORICO.filter(h=>h.ym!==ym);
  if(MODO_NUVEM){
    const { data:{ user } } = await sb.auth.getUser();
    await sb.from('configuracoes').upsert({user_id:user.id,chave:'historico',valores:HISTORICO},{onConflict:'user_id,chave'});
  }
  go('comparativo');
}

/* ============================ CHECK-UP DA CLÍNICA ============================ */
function renderCheckup(pg){
  const dados=dadosMensais();
  const mesRef = dados.length? dados[dados.length-1].ym : new Date().toISOString().slice(0,7);
  const mesAtual = dados.find(m=>m.ym===mesRef) || {faturamento:0,custo:0,resultado:0,nAtend:0,ticket:0};
  const mesAnt = dados.length>1? dados[dados.length-2] : null;
  const cc=calcCaixa();
  const achados=[]; // {nivel:'critico'|'atencao'|'bom', titulo, texto, acao}

  // 1. Margem / resultado
  const margem = mesAtual.faturamento? mesAtual.resultado/mesAtual.faturamento : 0;
  if(mesAtual.resultado<0){
    achados.push({nivel:'critico',titulo:'Resultado negativo no mês',texto:`A clínica fechou ${mesAnoCurto(mesRef)} com prejuízo de ${BRL(Math.abs(mesAtual.resultado))} (custo maior que a receita).`,acao:'Revise os maiores gastos abaixo e veja onde dá para cortar, ou aumente o faturamento/ticket.'});
  } else if(margem<0.15 && mesAtual.faturamento>0){
    achados.push({nivel:'atencao',titulo:'Margem apertada',texto:`A margem do mês foi de ${PCT0(margem)} — abaixo do saudável (20-30%).`,acao:'Avalie reajustar preços ou reduzir custos fixos.'});
  } else if(mesAtual.faturamento>0){
    achados.push({nivel:'bom',titulo:'Margem saudável',texto:`Margem de ${PCT0(margem)} no mês. Resultado positivo de ${BRL(mesAtual.resultado)}.`,acao:''});
  }

  // 2. Crescimento de custo vs mês anterior
  if(mesAnt && mesAnt.custo>0){
    const varCusto=(mesAtual.custo-mesAnt.custo)/mesAnt.custo;
    if(varCusto>0.2){
      achados.push({nivel:'atencao',titulo:'Custos subiram bastante',texto:`As despesas cresceram ${PCT0(varCusto)} em relação a ${mesAnoCurto(mesAnt.ym)} (de ${BRL(mesAnt.custo)} para ${BRL(mesAtual.custo)}).`,acao:'Veja na composição abaixo qual categoria puxou o aumento.'});
    }
  }

  // 3. Maiores categorias de despesa (concentração)
  const despMes=CAIXA.filter(l=>l.tipo==='despesa'&&l.data.slice(0,7)===mesRef);
  const totalDesp=despMes.reduce((s,l)=>s+l.valor,0);
  const porCat={}; despMes.forEach(l=>porCat[l.categoria]=(porCat[l.categoria]||0)+l.valor);
  const catsOrd=Object.entries(porCat).map(([cat,v])=>({cat,v,share:totalDesp?v/totalDesp:0})).sort((a,b)=>b.v-a.v);
  if(catsOrd.length && catsOrd[0].share>0.4){
    achados.push({nivel:'atencao',titulo:`"${catsOrd[0].cat}" concentra muito custo`,texto:`Essa categoria sozinha representa ${PCT0(catsOrd[0].share)} de todas as despesas (${BRL(catsOrd[0].v)}).`,acao:'Concentração alta num único ponto é risco — vale negociar ou buscar alternativas nessa categoria.'});
  }

  // 4. Contas vencidas
  const hoje=new Date().toISOString().slice(0,10);
  let vencidas=0, valVencido=0;
  CONTAS.forEach(c=>{(c.parcelas||[]).forEach(p=>{if(!p.pago && c.tipo==='pagar' && p.vencimento<hoje){vencidas++;valVencido+=c.valorParcela;}});});
  if(vencidas>0){
    achados.push({nivel:'critico',titulo:`${vencidas} parcela(s) vencida(s)`,texto:`Há ${BRL(valVencido)} em contas a pagar já vencidas.`,acao:'Quite ou renegocie para evitar juros e multas.'});
  }

  // 5. Estoque abaixo do mínimo
  const estBaixo=ESTOQUE.filter(e=>e.minimo>0 && e.quantidade<=e.minimo);
  if(estBaixo.length>0){
    achados.push({nivel:'atencao',titulo:`${estBaixo.length} produto(s) abaixo do mínimo`,texto:`Itens precisando reposição: ${estBaixo.map(e=>e.produto).join(', ')}.`,acao:'Programe a compra para não faltar durante atendimentos.'});
  }

  // 6. Saldo de caixa baixo
  if(cc.saldoTotal>=0 && cc.saldoTotal< (mesAtual.custo||0)*0.5 && mesAtual.custo>0){
    achados.push({nivel:'atencao',titulo:'Reserva de caixa baixa',texto:`O saldo em caixa (${BRL(cc.saldoTotal)}) cobre menos de meio mês de custos. Reserva recomendada: pelo menos 1 a 3 meses.`,acao:'Considere reforçar a reserva antes de novos investimentos.'});
  } else if(cc.saldoTotal<0){
    achados.push({nivel:'critico',titulo:'Caixa negativo',texto:`O saldo em caixa está negativo (${BRL(cc.saldoTotal)}).`,acao:'Atenção imediata ao fluxo de caixa.'});
  }

  // 7. Concentração de receita em poucos procedimentos
  const k=calc();
  if(k.porProc && k.porProc.length && k.porProc[0].share>0.5){
    achados.push({nivel:'atencao',titulo:'Receita concentrada num procedimento',texto:`"${k.porProc[0].proc}" responde por ${PCT0(k.porProc[0].share)} do faturamento.`,acao:'Dependência de um só serviço é risco — diversificar protege o negócio.'});
  }

  // 8. Comparecimento baixo
  if(k.txComp>0 && k.txComp<0.8 && k.nAtend>0){
    achados.push({nivel:'atencao',titulo:'Taxa de comparecimento baixa',texto:`${PCT0(k.txComp)} dos agendamentos comparecem. Faltas representam receita perdida.`,acao:'Reforce lembretes e política de confirmação.'});
  }

  if(!achados.length){
    achados.push({nivel:'bom',titulo:'Tudo sob controle',texto:'Não encontrei pontos críticos com os dados atuais. Continue lançando para um diagnóstico mais preciso.',acao:''});
  }

  // ordena: crítico > atenção > bom
  const ordem={critico:0,atencao:1,bom:2};
  achados.sort((a,b)=>ordem[a.nivel]-ordem[b.nivel]);
  const nCrit=achados.filter(a=>a.nivel==='critico').length;
  const nAten=achados.filter(a=>a.nivel==='atencao').length;

  const cor={critico:'var(--red)',atencao:'var(--amber)',bom:'var(--green)'};
  const bg={critico:'var(--red-bg)',atencao:'var(--amber-bg)',bom:'var(--green-bg)'};
  const icone={critico:'⚠',atencao:'!',bom:'✓'};
  const rotulo={critico:'Crítico',atencao:'Atenção',bom:'Tudo certo'};

  const cards=achados.map(a=>`
    <div class="panel" style="margin-bottom:14px;border-left:4px solid ${cor[a.nivel]}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:${bg[a.nivel]};color:${cor[a.nivel]};font-weight:700;font-size:13px">${icone[a.nivel]}</span>
        <span style="font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:${cor[a.nivel]};font-weight:600">${rotulo[a.nivel]}</span>
        <h3 style="font-size:16px;margin-left:2px">${a.titulo}</h3>
      </div>
      <div style="font-size:14px;color:var(--ink);margin-bottom:${a.acao?'8px':'0'};padding-left:34px">${a.texto}</div>
      ${a.acao?`<div style="font-size:13px;color:var(--grey);padding-left:34px"><b style="color:var(--gold-d)">→ </b>${a.acao}</div>`:''}
    </div>`).join('');

  // composição de custo (referência)
  const catTabela=catsOrd.length?catsOrd.map(c=>`<tr><td>${c.cat}</td><td class="num">${BRL(c.v)}</td><td class="num" style="color:var(--grey)">${PCT0(c.share)}</td></tr>`).join(''):'<tr><td colspan="3" style="text-align:center;color:var(--grey);padding:18px">Sem despesas lançadas neste mês.</td></tr>';

  pg.innerHTML=`
    <div class="panel" style="margin-bottom:18px">
      <div class="panel-head"><div><h3 style="font-size:19px">Check-up da Clínica</h3><div class="ph-sub">Diagnóstico automático de ${mesAnoCurto(mesRef)} — pontos que merecem sua atenção</div></div></div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:6px">
        <div style="flex:1;min-width:130px;text-align:center;padding:14px;border-radius:12px;background:var(--red-bg)"><div style="font-size:30px;font-weight:700;color:var(--red);font-family:'Cormorant Garamond',serif">${nCrit}</div><div style="font-size:12px;color:var(--grey)">pontos críticos</div></div>
        <div style="flex:1;min-width:130px;text-align:center;padding:14px;border-radius:12px;background:var(--amber-bg)"><div style="font-size:30px;font-weight:700;color:var(--amber);font-family:'Cormorant Garamond',serif">${nAten}</div><div style="font-size:12px;color:var(--grey)">pontos de atenção</div></div>
        <div style="flex:1;min-width:130px;text-align:center;padding:14px;border-radius:12px;background:var(--green-bg)"><div style="font-size:30px;font-weight:700;color:var(--green);font-family:'Cormorant Garamond',serif">${achados.filter(a=>a.nivel==='bom').length}</div><div style="font-size:12px;color:var(--grey)">pontos positivos</div></div>
      </div>
    </div>

    <div style="margin-bottom:8px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--grey);font-weight:600">Diagnóstico</div>
    ${cards}

    <div class="panel" style="margin-top:18px">
      <h3>Para onde o dinheiro foi em ${mesAnoCurto(mesRef)}</h3><div class="ph-sub">Maiores categorias de despesa — base para decidir onde economizar</div>
      <table class="data" style="margin-top:12px"><thead><tr><th>Categoria</th><th class="num">Valor</th><th class="num">% do total</th></tr></thead><tbody>${catTabela}</tbody></table>
    </div>`;
}

</script>
