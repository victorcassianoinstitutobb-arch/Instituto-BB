function gerarPDF(){
  const k=calc();
  const on=id=>{const e=document.getElementById('rb_'+id);return e&&e.checked;};
  const grao=document.getElementById('rb_grao').value;
  const ref=document.getElementById('rb_ref').value||'';
  const hoje=new Date().toLocaleDateString('pt-BR');
  const sec=(t,inner)=>`<h2>${t}</h2>${inner}`;
  const tbl=(heads,rows)=>`<table><thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>`;
  let body='';

  if(on('resumo')){
    const cc=calcCaixa();
    const mesRef=ref&&/^\d{4}-\d{2}/.test(ref)?ref.slice(0,7):hcMesRef();
    const despMes=CAIXA.filter(l=>l.tipo==='despesa'&&l.data.slice(0,7)===mesRef);
    const custoOp=despMes.reduce((s,l)=>s+l.valor,0);
    const horaClin=(META.horasMes||176)?custoOp/(META.horasMes||176):0;
    // cards de destaque
    body+=`<div class="cards">
      <div class="card"><div class="cl">Faturamento</div><div class="cv">${BRL(k.faturamento)}</div></div>
      <div class="card"><div class="cl">Resultado da clínica</div><div class="cv" style="color:${cc.resultado>=0?'#2E7D4F':'#B23A3A'}">${BRL(cc.resultado)}</div></div>
      <div class="card"><div class="cl">Atendimentos</div><div class="cv">${k.nAtend}</div></div>
      <div class="card"><div class="cl">Ticket médio</div><div class="cv">${BRL(k.ticket)}</div></div>
      <div class="card"><div class="cl">Custo da hora clínica</div><div class="cv">${BRL(horaClin)}</div></div>
      <div class="card"><div class="cl">Saldo em caixa</div><div class="cv">${BRL(cc.saldoTotal)}</div></div>
    </div>`;
    body+=sec('Resumo executivo', tbl(['Indicador','Valor'],[
      ['Faturamento (receita de procedimentos)',BRL(k.faturamento)],
      ['Custo operacional do mês',BRL(custoOp)],
      ['Resultado da clínica (receita − despesa)',BRL(cc.resultado)],
      ['Margem',PCT(k.margem)],
      ['Ticket médio por atendimento',BRL(k.ticket)],
      ['Atendimentos realizados',k.nAtend],
      ['Taxa de comparecimento',PCT(k.txComp)],
      ['Conversão de leads',PCT(k.txConv)],
      ['Custo da hora clínica',BRL(horaClin)],
      ['Saldo total em caixa',BRL(cc.saldoTotal)]
    ].map(r=>`<tr><td>${r[0]}</td><td class="n">${r[1]}</td></tr>`).join('')));
  }
  if(on('faturamento')){
    body+=sec('Faturamento por procedimento', tbl(['Procedimento','Qtd','Receita','%'],
      k.porProc.map(p=>`<tr><td>${p.proc}</td><td class="n">${p.qtd}</td><td class="n">${BRL(p.receita)}</td><td class="n">${PCT0(p.share)}</td></tr>`).join('')));
    body+=sec('Faturamento por canal', tbl(['Canal','Receita'],
      k.porCanal.map(c=>`<tr><td>${c.canal}</td><td class="n">${BRL(c.receita)}</td></tr>`).join('')));
  }
  if(on('leads')){
    body+=sec('Leads e conversão', tbl(['Canal','Leads','Fechados','Conversão','Receita'],
      k.porCanal.map(c=>`<tr><td>${c.canal}</td><td class="n">${c.leads}</td><td class="n">${c.fechados}</td><td class="n">${PCT0(c.conv)}</td><td class="n">${BRL(c.receita)}</td></tr>`).join('')));
  }
  if(on('atendimentos')){
    body+=sec('Atendimentos do período', tbl(['Data','Paciente','Procedimento','Profissional','Valor','Status'],
      DATA.atendimentos.map(a=>`<tr><td>${fmtDate(a.data)}</td><td>${a.paciente}</td><td>${a.proc}</td><td>${a.func||'—'}</td><td class="n">${BRL(a.valor)}</td><td>${a.agenda}</td></tr>`).join('')));
  }
  if(on('comissoes')){
    const rows=METAS.map(m=>{const av=avaliarMeta(m);const T=TIPO_META[m.tipo];
      return `<tr><td>${funcNome(m.funcId)}</td><td>${T.label} (${m.escopo})</td><td class="n">${T.fmt(av.real)}</td><td>${av.atingida?av.atingida.nome:'—'}</td><td class="n">${BRL(av.bonus)}</td></tr>`;}).join('');
    body+=sec('Metas e bonificações', tbl(['Funcionário','Meta','Realizado','Faixa','Bônus'],rows));
  }
  if(on('caixa')){
    const cc=calcCaixa();
    const linhas=[
      ['Receita (procedimentos)',BRL(cc.receita)],
      ['Aportes (não-receita)',BRL(cc.aporte)],
      ['Despesas',BRL(cc.despesa)],
      ['Retiradas',BRL(cc.retirada)],
      ['Resultado da clínica (receita − despesa)',BRL(cc.resultado)],
      ['Saldo total em caixa',BRL(cc.saldoTotal)],
    ].map(r=>`<tr><td>${r[0]}</td><td class="n">${r[1]}</td></tr>`).join('');
    body+=sec('Fluxo de caixa', tbl(['Indicador','Valor'],linhas));
    const cart=CARTEIRAS.map(w=>`<tr><td>${w.nome}</td><td class="n">${BRL(cc.saldos[w.id])}</td></tr>`).join('');
    body+=sec('Saldo por carteira', tbl(['Carteira','Saldo atual'],cart));
  }
  if(on('custoop')){
    const mesRef=ref&&/^\d{4}-\d{2}/.test(ref)?ref.slice(0,7):hcMesRef();
    const despMes=CAIXA.filter(l=>l.tipo==='despesa'&&l.data.slice(0,7)===mesRef);
    const custoOp=despMes.reduce((s,l)=>s+l.valor,0);
    const horas=META.horasMes||176;
    const horaClin=horas?custoOp/horas:0;
    const atendMes=DATA.atendimentos.filter(a=>a.agenda==='Compareceu'&&a.data.slice(0,7)===mesRef);
    const porCat={}; despMes.forEach(l=>porCat[l.categoria]=(porCat[l.categoria]||0)+l.valor);
    const catRows=Object.entries(porCat).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<tr><td>${c}</td><td class="n">${BRL(v)}</td></tr>`).join('');
    body+=sec('Custo operacional & hora clínica', tbl(['Indicador','Valor'],[
      ['Custo operacional total do mês',BRL(custoOp)],
      ['Horas clínicas disponíveis',horas+'h'],
      ['Custo da hora clínica',BRL(horaClin)],
      ['Custo por atendimento',BRL(atendMes.length?custoOp/atendMes.length:0)]
    ].map(r=>`<tr><td>${r[0]}</td><td class="n">${r[1]}</td></tr>`).join('')));
    if(catRows) body+=sec('Composição do custo operacional', tbl(['Categoria','Valor'],catRows));
  }
  if(on('pacientes')){
    body+=sec('Pacientes', tbl(['Indicador','Valor'],[
      ['Total de pacientes',k.totalPacientes],['Recorrentes',k.pacRecorrentes],
      ['Taxa de recompra',PCT(k.txRecompra)],['Ticket médio por paciente',BRL(k.ltv)]
    ].map(r=>`<tr><td>${r[0]}</td><td class="n">${r[1]}</td></tr>`).join('')));
  }
  if(on('conformidade')){
    body+=sec('Conformidade', tbl(['Item','Responsável','Status'],
      DATA.conformidade.map(c=>`<tr><td>${c.item}</td><td>${c.resp}</td><td>${c.status}</td></tr>`).join('')));
  }

  const graoLabel={dia:'Diário',semana:'Semanal',mes:'Mensal',ano:'Anual'}[grao];
  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Relatório · Instituto Bruna Braga</title>
  <style>
    @page{margin:18mm}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Georgia,'Times New Roman',serif;color:#211C16;font-size:12px;line-height:1.5}
    .hd{border-bottom:3px solid #C9A24B;padding-bottom:14px;margin-bottom:22px}
    .hd .brand{font-size:24px;font-weight:700;color:#9A7B2E;letter-spacing:.5px}
    .hd .sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#8A8175;margin-top:4px}
    .hd .meta{margin-top:10px;font-size:11px;color:#555}
    h2{font-size:15px;color:#9A7B2E;border-bottom:1px solid #E8DEC8;padding-bottom:6px;margin:22px 0 10px}
    table{width:100%;border-collapse:collapse;margin-bottom:6px;font-family:Arial,sans-serif;font-size:11px}
    th{background:#211C16;color:#fff;text-align:left;padding:7px 9px;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
    td{padding:6px 9px;border-bottom:1px solid #eee}
    td.n,th.n{text-align:right}
    tr:nth-child(even) td{background:#FBF8F1}
    .ft{margin-top:30px;padding-top:12px;border-top:1px solid #E8DEC8;font-size:10px;color:#999;text-align:center}
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:6px 0 14px}
    .card{border:1px solid #E8DEC8;border-radius:8px;padding:12px 14px;background:#FBF8F1}
    .card .cl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:#8A8175;font-weight:bold}
    .card .cv{font-size:19px;font-weight:bold;color:#211C16;margin-top:4px;font-family:Georgia,serif}
  </style></head><body>
    <div class="hd">
      <div class="brand">Instituto Bruna Braga</div>
      <div class="sub">Harmonização Facial · Relatório Gerencial</div>
      <div class="meta">Período: <b>${ref}</b> · Agrupamento: ${graoLabel} · Emitido em ${hoje}</div>
    </div>
    ${body||'<p>Nenhum bloco selecionado.</p>'}
    <div class="ft">Documento gerado pelo Sistema de Gestão · Instituto Bruna Braga</div>
  </body></html>`;
  const w=window.open('','_blank');
  if(!w){alert('Permita pop-ups para gerar o relatório.');return;}
  w.document.write(html); w.document.close();
  setTimeout(()=>{w.focus();w.print();},400);
}

/* ============================ CONFIGURAÇÕES ============================ */
const CONFIG_LISTAS = {
  procedimentos:{label:'Procedimentos',desc:'Serviços oferecidos pela clínica',get:()=>PROCS,set:v=>{PROCS=v;}},
  plataformas:{label:'Plataformas de captação',desc:'Origens usadas no relatório de marketing',get:()=>PLATAFORMAS,set:v=>{PLATAFORMAS=v;}},
  func_tipos:{label:'Tipos de funcionário',desc:'Categorias da equipe',get:()=>FUNC_TIPOS,set:v=>{FUNC_TIPOS=v;}},
  canais:{label:'Canais de origem',desc:'De onde o paciente veio',get:()=>CANAIS,set:v=>{CANAIS=v;}},
};

function renderConfig(pg){
  const blocos=Object.entries(CONFIG_LISTAS).map(([chave,cfg])=>{
    const itens=cfg.get();
    const chips=itens.map(it=>`<span style="display:inline-flex;align-items:center;gap:7px;background:var(--cream);border:1px solid var(--line);border-radius:18px;padding:6px 14px;font-size:13px">${it}<span style="cursor:pointer;color:var(--grey);font-weight:600" onclick="delConfigItem('${chave}','${it.replace(/'/g,"\\'")}')">×</span></span>`).join('');
    return `<div class="panel" style="margin-bottom:18px">
      <div class="panel-head"><div><h3>${cfg.label}</h3><div class="ph-sub">${cfg.desc}</div></div></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">${chips||'<span style="color:var(--grey);font-size:13px">Nenhum item ainda.</span>'}</div>
      <div style="display:flex;gap:10px">
        <input id="cfg_${chave}" placeholder="Adicionar novo..." style="flex:1;max-width:300px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink)" onkeydown="if(event.key==='Enter')addConfigItem('${chave}')">
        <button class="btn" onclick="addConfigItem('${chave}')">Adicionar</button>
      </div>
    </div>`;
  }).join('');
  const fs='padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink);width:130px';
  const metasGerais=`<div class="panel" style="margin-bottom:18px">
    <div class="panel-head"><div><h3>Metas gerais da clínica</h3><div class="ph-sub">Objetivos do mês mostrados no Painel (deixe 0 para não exibir)</div></div></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px">
      <div class="field"><label>Faturamento (R$)</label><input type="number" id="mg_fat" value="${META.faturamento||''}" placeholder="ex: 60000" style="${fs}"></div>
      <div class="field"><label>Ticket médio (R$)</label><input type="number" id="mg_ticket" value="${META.ticket||''}" placeholder="ex: 800" style="${fs}"></div>
      <div class="field"><label>Comparecimento (%)</label><input type="number" id="mg_comp" value="${META.comparecimento?Math.round(META.comparecimento*100):''}" placeholder="ex: 90" style="${fs}"></div>
      <div class="field"><label>Conversão de leads (%)</label><input type="number" id="mg_conv" value="${META.conversao?Math.round(META.conversao*100):''}" placeholder="ex: 30" style="${fs}"></div>
      <div class="field"><label>Ocupação (%)</label><input type="number" id="mg_ocup" value="${META.ocupacao?Math.round(META.ocupacao*100):''}" placeholder="ex: 75" style="${fs}"></div>
    </div>
    <div style="margin-top:16px"><button class="btn" onclick="salvarMetasGerais()">Salvar metas gerais</button></div>
  </div>`;
  pg.innerHTML=`
    <div class="panel" style="margin-bottom:18px">
      <div class="panel-head"><div><h3>Configurações gerais</h3><div class="ph-sub">Crie e edite as listas do sistema — sem precisar mexer no código</div></div></div>
      <div style="font-size:13px;color:var(--grey);line-height:1.6">Tudo que você adicionar aqui aparece automaticamente nos formulários do sistema (atendimentos, captação, funcionários, etc.). ${MODO_NUVEM?'As alterações são salvas na nuvem.':'<b style="color:var(--amber)">Modo local:</b> as alterações valem só nesta sessão até conectar o Supabase.'}</div>
    </div>
    ${metasGerais}
    ${blocos}`;
}
async function salvarMetasGerais(){
  const num=i=>{const v=document.getElementById(i).value;return v===''?0:+v;};
  META.faturamento=num('mg_fat');
  META.ticket=num('mg_ticket');
  META.comparecimento=num('mg_comp')/100;
  META.conversao=num('mg_conv')/100;
  META.ocupacao=num('mg_ocup')/100;
  if(MODO_NUVEM){
    const { data:{ user } } = await sb.auth.getUser();
    await sb.from('configuracoes').upsert({user_id:user.id,chave:'metas_gerais',valores:{faturamento:META.faturamento,ticket:META.ticket,comparecimento:META.comparecimento,conversao:META.conversao,ocupacao:META.ocupacao}},{onConflict:'user_id,chave'});
  }
  window.__lastCalc=null;
  go('config');
}
async function addConfigItem(chave){
  const inp=document.getElementById('cfg_'+chave);
  const val=inp.value.trim(); if(!val)return;
  const cfg=CONFIG_LISTAS[chave]; const arr=cfg.get();
  if(!arr.includes(val)){ arr.push(val); cfg.set(arr); await salvarConfig(chave); }
  go('config');
}
async function delConfigItem(chave,item){
  const cfg=CONFIG_LISTAS[chave]; let arr=cfg.get().filter(x=>x!==item);
  cfg.set(arr); await salvarConfig(chave); go('config');
}
async function salvarConfig(chave){
  if(!MODO_NUVEM)return;
  const valores=CONFIG_LISTAS[chave].get();
  const { data:{ user } } = await sb.auth.getUser();
  const { error } = await sb.from('configuracoes').upsert({user_id:user.id,chave,valores},{onConflict:'user_id,chave'});
  if(error)console.error('config save',error);
}

/* ============================ TEMA (claro/escuro) ============================ */
function aplicarTema(t){
  if(t==='light'){ document.body.classList.add('light'); }
  else { document.body.classList.remove('light'); }
  const lbl=document.getElementById('temaLabel');
  if(lbl) lbl.textContent = t==='light' ? 'Escuro' : 'Claro';
  // redesenha gráficos com as novas cores, se houver página com chart
  try{ if(typeof currentPage!=='undefined' && ['painel','custos','analise'].includes(currentPage)) go(currentPage); }catch(e){}
}
function alternarTema(){
  const atual = document.body.classList.contains('light') ? 'light' : 'dark';
  const novo = atual==='light' ? 'dark' : 'light';
  try{ localStorage.setItem('ibb_tema', novo); }catch(e){}
  aplicarTema(novo);
}
// aplica o tema salvo ao carregar
(function(){
  let t='dark';
  try{ t = localStorage.getItem('ibb_tema') || 'dark'; }catch(e){}
  window.addEventListener('DOMContentLoaded',()=>aplicarTema(t));
})();

/* ============================ MENU MOBILE ============================ */
function toggleMenu(){
  const open = document.body.classList.toggle('menu-open');
  const ov=document.getElementById('navOverlay');
  if(ov) ov.style.display = open ? 'block' : 'none';
}
function fecharMenu(){
  document.body.classList.remove('menu-open');
  const ov=document.getElementById('navOverlay');
  if(ov) ov.style.display='none';
}

/* ============================ CUSTO OPERACIONAL & HORA CLÍNICA ============================ */
// mês de referência da hora clínica (AAAA-MM); padrão = mês do último lançamento ou atual
let HC_MES = null;
function hcMesRef(){
  if(HC_MES) return HC_MES;
  const datas=CAIXA.map(l=>l.data).filter(Boolean).sort();
  return datas.length? datas[datas.length-1].slice(0,7) : new Date().toISOString().slice(0,7);
}
function setHcMes(v){ HC_MES=v; go('horaclinica'); }

function renderHoraClinica(pg){
  const mesRef=hcMesRef();
  // todas as despesas lançadas no mês de referência (custo real de manutenção)
  const desp=CAIXA.filter(l=>l.tipo==='despesa' && l.data.slice(0,7)===mesRef);
  const totalCusto=desp.reduce((s,l)=>s+l.valor,0);
  // agrupa por categoria
  const porCat={};
  desp.forEach(l=>{porCat[l.categoria]=(porCat[l.categoria]||0)+l.valor;});
  const cats=Object.entries(porCat).map(([cat,v])=>({cat,v})).sort((a,b)=>b.v-a.v);
  // horas clínicas disponíveis no mês
  const horas=META.horasMes||176;
  const horaClinica = horas? totalCusto/horas : 0;
  // receita e atendimentos do mês (para comparar)
  const atendMes=DATA.atendimentos.filter(a=>a.agenda==='Compareceu' && a.data.slice(0,7)===mesRef);
  const receitaMes=atendMes.reduce((s,a)=>s+a.valor,0);
  const custoPorAtend = atendMes.length? totalCusto/atendMes.length : 0;
  // opções de mês
  const meses=[...new Set(CAIXA.map(l=>l.data.slice(0,7)))].sort().reverse();
  if(!meses.includes(mesRef)) meses.unshift(mesRef);
  const mesOpts=meses.map(m=>`<option value="${m}" ${m===mesRef?'selected':''}>${mesAnoCurto(m)}</option>`).join('');

  const catBody=cats.length?cats.map(c=>{
    const share=totalCusto?c.v/totalCusto:0;
    return `<tr><td>${c.cat}</td><td class="num">${BRL(c.v)}</td><td style="width:120px"><span class="minibar" style="width:${share*100}%"></span></td><td class="num" style="color:var(--grey)">${PCT0(share)}</td></tr>`;
  }).join(''):'<tr><td colspan="4" style="text-align:center;color:var(--grey);padding:24px">Nenhuma despesa lançada neste mês. Registre no Livro-Caixa.</td></tr>';

  pg.innerHTML=`
    <div class="panel" style="margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div><h3 style="font-size:18px">Custo operacional do mês</h3><div class="ph-sub">Soma de tudo que a clínica gasta para funcionar — base do cálculo da hora clínica</div></div>
      <div style="display:flex;align-items:center;gap:10px">
        <label style="font-size:12px;color:var(--grey)">Mês de referência</label>
        <select onchange="setHcMes(this.value)" style="padding:8px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink)">${mesOpts}</select>
      </div>
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi" style="animation-delay:0ms"><div class="label">Custo operacional total</div><div class="val">${BRL(totalCusto)}</div><div class="meta">${desp.length} despesas no mês</div></div>
      <div class="kpi gold" style="animation-delay:70ms"><div class="label">Horas clínicas no mês</div><div class="val" style="color:var(--ink)">${horas}h</div><div class="meta">capacidade de atendimento</div></div>
      <div class="kpi" style="animation-delay:140ms"><div class="label">Custo da hora clínica</div><div class="val" style="color:var(--gold)">${BRL(horaClinica)}</div><div class="meta">por hora de atendimento</div></div>
      <div class="kpi" style="animation-delay:210ms"><div class="label">Custo por atendimento</div><div class="val">${BRL(custoPorAtend)}</div><div class="meta">${atendMes.length} atendimentos no mês</div></div>
    </div>

    <div class="panel" style="margin-bottom:18px">
      <div class="panel-head"><div><h3>Como configurar as horas clínicas</h3></div></div>
      <div style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap">
        <div class="field"><label>Horas de atendimento disponíveis no mês</label>
          <input type="number" id="hc_horas" value="${horas}" style="padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink);width:160px"></div>
        <button class="btn" onclick="salvarHoras()">Salvar horas</button>
        <div style="font-size:12px;color:var(--grey);flex:1;min-width:220px">Ex: 8h/dia × 22 dias úteis = 176h. Ajuste conforme a agenda real da clínica (dias e horas que há atendimento).</div>
      </div>
    </div>

    <div class="row two">
      <div class="panel"><h3>Composição do custo operacional</h3><div class="ph-sub">Todas as despesas do mês, por categoria</div>
        <table class="data"><thead><tr><th>Categoria</th><th class="num">Valor</th><th></th><th class="num">%</th></tr></thead><tbody>${catBody}</tbody></table>
      </div>
      <div class="panel"><h3>O que isso significa</h3><div class="ph-sub">Interpretação</div>
        <div style="font-size:14px;line-height:1.7;color:var(--ink)">
          <p style="margin-bottom:12px">Cada hora de atendimento na clínica custa <b style="color:var(--gold)">${BRL(horaClinica)}</b> só para manter as portas abertas (aluguel, salários, impostos, insumos, etc.).</p>
          <p style="margin-bottom:12px">Isso significa que <b>todo procedimento precisa cobrir pelo menos esse custo por hora</b> antes de gerar lucro. Um atendimento de 1h que rende menos de ${BRL(horaClinica)} está no prejuízo operacional.</p>
          ${receitaMes>0?`<p>No mês, a receita foi ${BRL(receitaMes)} e o custo ${BRL(totalCusto)} — ${receitaMes>=totalCusto?`<b style="color:var(--green)">resultado positivo de ${BRL(receitaMes-totalCusto)}</b>`:`<b style="color:var(--red)">déficit de ${BRL(totalCusto-receitaMes)}</b>`}.</p>`:''}
        </div>
      </div>
    </div>`;
}
function mesAnoCurto(s){const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];const[y,m]=s.split('-');return meses[+m-1]+'/'+y;}
async function salvarHoras(){
  META.horasMes=+document.getElementById('hc_horas').value||176;
  if(MODO_NUVEM){
    const { data:{ user } } = await sb.auth.getUser();
    await sb.from('configuracoes').upsert({user_id:user.id,chave:'horas_mes',valores:{horas:META.horasMes}},{onConflict:'user_id,chave'});
  }
  go('horaclinica');
}

/* ============================ CONTAS A PAGAR / RECEBER ============================ */
let CONTAS_FILTRO='todas'; // todas | pagar | receber
let CONTAS_EXPANDIDA=null;  // id da conta com parcelas abertas
let CONTAS_VER_MAIS=false;  // ver todas as parcelas próximas
function setContasFiltro(f){CONTAS_FILTRO=f;go('contas');}
function toggleConta(id){ CONTAS_EXPANDIDA = (CONTAS_EXPANDIDA===String(id))?null:String(id); go('contas'); }
function toggleVerMais(){ CONTAS_VER_MAIS=!CONTAS_VER_MAIS; go('contas'); }
let CONTAS_MES=null; // mês de referência dos próximos vencimentos
function contasMesRef(){ return CONTAS_MES || new Date().toISOString().slice(0,7); }
function setContasMes(v){ CONTAS_MES=v; go('contas'); }

function renderContas(pg){
  // resumo
  let aPagar=0, aReceber=0, vencidoPagar=0, prox=[];
  const hoje=new Date().toISOString().slice(0,10);
  const mesRef=contasMesRef();
  CONTAS.forEach(c=>{
    (c.parcelas||[]).forEach(p=>{
      if(!p.pago){
        if(c.tipo==='pagar'){ aPagar+=c.valorParcela; if(p.vencimento<hoje)vencidoPagar+=c.valorParcela; }
        else aReceber+=c.valorParcela;
        // só inclui em "próximos vencimentos" as parcelas que vencem no mês de referência
        if((p.vencimento||'').slice(0,7)===mesRef) prox.push({conta:c,parc:p});
      }
    });
  });
  prox.sort((a,b)=>(a.parc.vencimento||'').localeCompare(b.parc.vencimento||''));
  const lista=CONTAS.filter(c=>CONTAS_FILTRO==='todas'||c.tipo===CONTAS_FILTRO);
  // meses disponíveis (a partir dos vencimentos em aberto)
  const mesesDisp=[...new Set(CONTAS.flatMap(c=>(c.parcelas||[]).filter(p=>!p.pago).map(p=>(p.vencimento||'').slice(0,7))).filter(Boolean))].sort();
  if(!mesesDisp.includes(mesRef)) mesesDisp.unshift(mesRef);
  const mesOpts=mesesDisp.map(m=>`<option value="${m}" ${m===mesRef?'selected':''}>${mesAnoCurto(m)}</option>`).join('');

  const contaCard=(c)=>{
    const parcelas=c.parcelas||[];
    const pagas=parcelas.filter(p=>p.pago).length;
    const proxima=parcelas.find(p=>!p.pago);
    const total=c.valorParcela*c.numParcelas;
    const cor = c.tipo==='pagar'?'var(--red)':'var(--green)';
    const natLabel={parcelada:'Parcelada',recorrente:'Recorrente',avulsa:'Avulsa'}[c.natureza]||'';
    const aberto = CONTAS_EXPANDIDA===String(c.id);
    const parcChips=parcelas.map(p=>{
      const venc=p.vencimento?fmtDate(p.vencimento):'';
      const st=p.pago?'pago':(p.vencimento<hoje?'vencido':'aberto');
      const bg={pago:'var(--green-bg)',vencido:'var(--red-bg)',aberto:'var(--cream)'}[st];
      const cl={pago:'var(--green)',vencido:'var(--red)',aberto:'var(--grey)'}[st];
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:9px;background:${bg};border:1px solid var(--line);margin-bottom:6px">
        <div><b style="font-size:13px">${p.n}/${c.numParcelas}</b> <span style="font-size:12px;color:var(--grey)">· venc. ${venc}</span></div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-weight:600;color:${cl};font-size:13px">${BRL(c.valorParcela)}</span>
          ${p.pago
            ? `<span style="font-size:11px;color:var(--green)">✓ ${c.tipo==='pagar'?'pago':'recebido'}</span> <button class="btn ghost" style="padding:2px 8px;font-size:10px" onclick="estornarParcela('${c.id}',${p.n})">estornar</button>`
            : `<button class="btn ghost" style="padding:3px 10px;font-size:11px" onclick="quitarParcela('${c.id}',${p.n})">${c.tipo==='pagar'?'pagar':'receber'}</button>`}
        </div></div>`;
    }).join('');
    const proxTxt = proxima ? `Próxima: ${proxima.n}/${c.numParcelas} em ${fmtDate(proxima.vencimento)}` : 'Todas quitadas';
    return `<div class="panel" style="margin-bottom:14px">
      <div class="panel-head" style="cursor:pointer" onclick="toggleConta('${c.id}')">
        <div><h3 style="font-size:17px">${c.descricao} <span style="font-size:13px;color:var(--grey)">${aberto?'▲':'▼'}</span></h3>
          <div class="ph-sub"><span style="text-transform:uppercase;font-size:10px;letter-spacing:.5px;background:var(--cream);padding:2px 8px;border-radius:10px;color:var(--gold-d)">${c.tipo==='pagar'?'A pagar':'A receber'} · ${natLabel}</span> · ${c.categoria} · ${pagas}/${c.numParcelas} quitadas · <span style="color:var(--gold-d)">${proxTxt}</span></div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--grey);text-transform:uppercase;letter-spacing:.5px">Valor da parcela</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:${cor}">${BRL(c.valorParcela)}</div>
          <div style="font-size:11px;color:var(--grey)">total ${BRL(total)}</div>
        </div>
      </div>
      ${aberto?`<div style="margin-top:14px">
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="btn ghost" style="padding:5px 12px;font-size:12px" onclick="editarConta('${c.id}')">Editar conta</button>
          <button class="btn ghost" style="padding:5px 12px;font-size:12px;color:var(--red)" onclick="excluirConta('${c.id}')">Excluir conta</button>
        </div>
        ${parcChips}
      </div>`:''}
    </div>`;
  };

  pg.innerHTML=`
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi" style="animation-delay:0ms"><div class="label">Total a pagar (em aberto)</div><div class="val" style="color:var(--red)">${BRL(aPagar)}</div><div class="meta">${vencidoPagar>0?`<span style="color:var(--red)">${BRL(vencidoPagar)} vencido</span>`:'em dia'}</div></div>
      <div class="kpi" style="animation-delay:70ms"><div class="label">Total a receber (em aberto)</div><div class="val" style="color:var(--green)">${BRL(aReceber)}</div><div class="meta">parcelas futuras</div></div>
      <div class="kpi gold" style="animation-delay:140ms"><div class="label">Saldo previsto</div><div class="val" style="color:var(--ink)">${BRL(aReceber-aPagar)}</div><div class="meta">a receber − a pagar</div></div>
    </div>

    <div class="panel" style="margin-bottom:18px">
      <div class="toolbar"><div><h3>Próximos vencimentos</h3><div class="ph-sub">Parcelas que vencem no mês selecionado</div></div>
        <div style="display:flex;align-items:center;gap:10px">
          <select onchange="setContasMes(this.value)" style="padding:8px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink)">${mesOpts}</select>
          <button class="btn" onclick="abrirContaForm()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nova conta</button>
        </div>
      </div>
      <div id="contaFormBox"></div>
      ${prox.length?`<table class="data"><thead><tr><th>Vencimento</th><th>Descrição</th><th class="ctr">Parcela</th><th class="ctr">Tipo</th><th class="num">Valor</th><th class="ctr">Ação</th></tr></thead><tbody>
        ${prox.map(x=>{const vencido=x.parc.vencimento<hoje;return `<tr>
          <td style="${vencido?'color:var(--red);font-weight:600':''}">${fmtDate(x.parc.vencimento)}${vencido?' ⚠':''}</td>
          <td>${x.conta.descricao}</td><td class="ctr">${x.parc.n}/${x.conta.numParcelas}</td>
          <td class="ctr">${x.conta.tipo==='pagar'?'<span style="color:var(--red)">Pagar</span>':'<span style="color:var(--green)">Receber</span>'}</td>
          <td class="num">${BRL(x.conta.valorParcela)}</td>
          <td class="ctr"><button class="btn ghost" style="padding:3px 10px;font-size:11px" onclick="quitarParcela('${x.conta.id}',${x.parc.n})">${x.conta.tipo==='pagar'?'pagar':'receber'}</button></td>
        </tr>`;}).join('')}
      </tbody></table>
      <div style="margin-top:10px;font-size:12px;color:var(--grey)">Total do mês: <b>${BRL(prox.reduce((s,x)=>s+x.conta.valorParcela,0))}</b> em ${prox.length} parcela(s)</div>`
      :'<div style="color:var(--grey);font-size:13px;padding:14px 0">Nenhuma parcela vence neste mês.</div>'}
    </div>

    <div class="panel">
      <div class="toolbar"><div><h3>Todas as contas</h3><div class="ph-sub">Parcelamentos, recorrentes e avulsas</div></div>
        <div class="itabs">
          <button class="${CONTAS_FILTRO==='todas'?'active':''}" onclick="setContasFiltro('todas')">Todas</button>
          <button class="${CONTAS_FILTRO==='pagar'?'active':''}" onclick="setContasFiltro('pagar')">A pagar</button>
          <button class="${CONTAS_FILTRO==='receber'?'active':''}" onclick="setContasFiltro('receber')">A receber</button>
        </div>
      </div>
      ${lista.length?lista.map(contaCard).join(''):'<div style="color:var(--grey);font-size:13px;padding:14px 0">Nenhuma conta cadastrada. Clique em "Nova conta".</div>'}
    </div>`;
}

  const fs='padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink);width:100%';
  const catOpts=CAT_CONTAS.map(c=>`<option>${c}</option>`).join('');
  const cartOpts=CARTEIRAS.map(w=>`<option value="${w.id}">${w.nome}</option>`).join('');
  const box=document.getElementById('contaFormBox');
  delete box.dataset.editId; // garante que é cadastro novo (editarConta seta depois)
  box.innerHTML=`
    <div style="background:var(--cream);border:1px solid var(--gold-l);border-radius:14px;padding:18px;margin-bottom:18px">
      <div class="ct-form-title" style="font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;margin-bottom:14px">Nova conta</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px">
        <div class="field"><label>Tipo</label><select id="ct_tipo" style="${fs}"><option value="pagar">A pagar</option><option value="receber">A receber</option></select></div>
        <div class="field"><label>Natureza</label><select id="ct_nat" onchange="contaNatMudou()" style="${fs}"><option value="parcelada">Parcelada (ex: 10x)</option><option value="recorrente">Recorrente (todo mês)</option><option value="avulsa">Avulsa (única)</option></select></div>
        <div class="field"><label>Categoria</label><select id="ct_cat" style="${fs}">${catOpts}</select></div>
        <div class="field" style="grid-column:span 2"><label>Descrição</label><input id="ct_desc" placeholder="Ex: Equipamento de laser" style="${fs}"></div>
        <div class="field"><label>Carteira (de onde sai/entra)</label><select id="ct_cart" style="${fs}">${cartOpts}</select></div>
        <div class="field"><label>Valor da parcela (R$)</label><input type="number" id="ct_valor" placeholder="0,00" style="${fs}"></div>
        <div class="field" id="ct_nparcWrap"><label>Nº de parcelas</label><input type="number" id="ct_nparc" value="10" style="${fs}"></div>
        <div class="field"><label>1º vencimento</label><input type="date" id="ct_venc" value="${new Date().toISOString().slice(0,10)}" style="${fs}"></div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn" onclick="salvarConta()">Salvar conta</button>
        <button class="btn ghost" onclick="document.getElementById('contaFormBox').innerHTML=''">Cancelar</button>
      </div>
      <div id="ct_hint" style="margin-top:10px;font-size:12px;color:var(--grey);font-style:italic">Parcelada: cria todas as parcelas com vencimento mensal. Ao quitar cada uma, ela entra no Livro-Caixa do mês.</div>
    </div>`;
  contaNatMudou();
}
function contaNatMudou(){
  const nat=document.getElementById('ct_nat').value;
  const wrap=document.getElementById('ct_nparcWrap');
  const hint=document.getElementById('ct_hint');
  if(nat==='parcelada'){wrap.style.display='block';document.getElementById('ct_nparc').value=document.getElementById('ct_nparc').value||10;hint.textContent='Parcelada: cria N parcelas com vencimento mensal. Ao quitar cada uma, entra no Livro-Caixa do mês.';}
  else if(nat==='recorrente'){wrap.style.display='block';document.getElementById('ct_nparc').value=12;hint.textContent='Recorrente: cria 12 meses de parcelas iguais (ex: aluguel). Ajuste o número se quiser.';}
  else {wrap.style.display='none';hint.textContent='Avulsa: uma única parcela com vencimento na data informada.';}
}
async function salvarConta(){
  const v=i=>document.getElementById(i).value;
  const tipo=v('ct_tipo'), nat=v('ct_nat');
  const valorParcela=+v('ct_valor')||0;
  let numParcelas = nat==='avulsa'?1:(+v('ct_nparc')||1);
  const venc0=v('ct_venc');
  // gera parcelas com vencimento mensal
  const parcelas=[];
  for(let i=0;i<numParcelas;i++){
    const d=new Date(venc0+'T00:00:00'); d.setMonth(d.getMonth()+i);
    parcelas.push({n:i+1, vencimento:d.toISOString().slice(0,10), pago:false, lancId:null});
  }
  const conta={tipo, descricao:v('ct_desc')||'Conta', categoria:v('ct_cat'), natureza:nat,
    valorParcela, numParcelas, carteira:+v('ct_cart')||(CARTEIRAS[0]&&CARTEIRAS[0].id), parcelas};
  // edição?

// quitar uma parcela: marca como paga E cria lançamento no Livro-Caixa
async function quitarParcela(contaId, n){
  const c=CONTAS.find(x=>x.id==contaId); if(!c)return;
  const p=(c.parcelas||[]).find(x=>x.n===n); if(!p||p.pago)return;
  const hoje=new Date().toISOString().slice(0,10);
  const tipoLanc = c.tipo==='pagar'?'despesa':'receita';
  const desc=`${c.descricao} (${n}/${c.numParcelas})`;
  if(MODO_NUVEM){
    const { data:{ user } } = await sb.auth.getUser();
    // cria lançamento no caixa
    const lanc={user_id:user.id,data:hoje,tipo:tipoLanc,categoria:c.categoria,descricao:desc,valor:c.valorParcela,carteira_id:c.carteira||null,carteira_dest:null};
    const ins=await sb.from('lancamentos').insert(lanc).select().single();
    // marca parcela paga
    const novasParc=c.parcelas.map(x=>x.n===n?{...x,pago:true,lancId:ins.data?ins.data.id:null}:x);
    await sb.from('contas').update({parcelas:novasParc}).eq('id',contaId);
    await carregarTudo(); go('contas'); return;
  }
  // local
  CAIXA.push({id:CAIXA_SEQ++,data:hoje,tipo:tipoLanc,categoria:c.categoria,desc,valor:c.valorParcela,carteira:c.carteira||(CARTEIRAS[0]&&CARTEIRAS[0].id),carteiraDest:null});
  p.pago=true;
  go('contas');
}
// estornar: desfaz o pagamento de uma parcela e remove o lançamento do caixa
async function estornarParcela(contaId, n){
  const c=CONTAS.find(x=>x.id==contaId); if(!c)return;
  const p=(c.parcelas||[]).find(x=>x.n===n); if(!p||!p.pago)return;
  if(MODO_NUVEM){
    if(p.lancId){ await sb.from('lancamentos').delete().eq('id',p.lancId); }
    const novasParc=c.parcelas.map(x=>x.n===n?{...x,pago:false,lancId:null}:x);
    await sb.from('contas').update({parcelas:novasParc}).eq('id',contaId);
    await carregarTudo(); go('contas'); return;
  }
  // local: remove o último lançamento que casa com a descrição
  const desc=`${c.descricao} (${n}/${c.numParcelas})`;
  const idx=CAIXA.map(l=>l.desc).lastIndexOf(desc);
  if(idx>=0) CAIXA.splice(idx,1);
  p.pago=false;
  go('contas');
}

// agrega faturamento, custo e resultado por mês (dados reais)
function dadosMensais(){
  const meses={};
  DATA.atendimentos.filter(a=>a.agenda==='Compareceu').forEach(a=>{
    const ym=a.data.slice(0,7);
    if(!meses[ym]) meses[ym]={ym,fat:0,custo:0,nAtend:0,receita:0};
    meses[ym].fat+=a.valor; meses[ym].nAtend+=1;
  });
  CAIXA.forEach(l=>{
    const ym=l.data.slice(0,7);
    if(!meses[ym]) meses[ym]={ym,fat:0,custo:0,nAtend:0,receita:0};
    if(l.tipo==='despesa') meses[ym].custo+=l.valor;
    if(l.tipo==='receita') meses[ym].receita+=l.valor;
  });
  // mescla faturamento histórico lançado manualmente (soma ao que houver)
  HISTORICO.forEach(h=>{
    if(!meses[h.ym]) meses[h.ym]={ym:h.ym,fat:0,custo:0,nAtend:0,receita:0,historico:true};
    meses[h.ym].receita += (h.faturamento||0);
    meses[h.ym].custo += (h.custo||0);
    meses[h.ym].historico=true;
  });
  return Object.values(meses).map(m=>({
    ...m,
    faturamento: m.receita||m.fat,
    resultado: (m.receita||m.fat)-m.custo,
    ticket: m.nAtend? (m.receita||m.fat)/m.nAtend : 0
  })).sort((a,b)=>a.ym.localeCompare(b.ym));
}

      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:end">
        <div class="field"><label>Mês</label><input type="month" id="hist_mes" value="${new Date().toISOString().slice(0,7)}" style="padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink);width:100%"></div>
        <div class="field"><label>Faturamento do mês (R$)</label><input type="number" id="hist_fat" placeholder="0,00" style="padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink);width:100%"></div>
        <div class="field"><label>Custo do mês (R$) — opcional</label><input type="number" id="hist_custo" placeholder="0,00" style="padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink);width:100%"></div>
        <button class="btn" onclick="salvarHistorico()">Lançar mês</button>
      </div>
      ${HISTORICO.length?`<div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:8px">${HISTORICO.sort((a,b)=>a.ym.localeCompare(b.ym)).map(h=>`<span style="display:inline-flex;align-items:center;gap:8px;background:var(--cream);border:1px solid var(--line);border-radius:18px;padding:6px 14px;font-size:13px">${mesAnoCurto(h.ym)}: <b>${BRL(h.faturamento)}</b>${h.custo?` · custo ${BRL(h.custo)}`:''}<span style="cursor:pointer;color:var(--grey)" onclick="excluirHistorico('${h.ym}')">×</span></span>`).join('')}</div>`:''}
      <div style="margin-top:10px;font-size:12px;color:var(--grey);font-style:italic">Dica: lance os últimos meses que já passaram para a projeção ficar mais precisa. Se já houver atendimentos lançados naquele mês, este valor soma ao que existe.</div>
    </div>`;

  if(!dados.length){
    pg.innerHTML=histForm+`<div class="panel"><div class="ph-sub">Lance ao menos um mês acima para ver o comparativo e a projeção.</div></div>`;
    return;
  }
  const ult=dados.slice(-6); // últimos 6 meses
  const variacao=(atual,ant)=>ant?((atual-ant)/Math.abs(ant)*100):0;
  const linhas=ult.map((m,i)=>{
    const ant=i>0?ult[i-1]:null;
    const vFat=ant?variacao(m.faturamento,ant.faturamento):null;
    const vCusto=ant?variacao(m.custo,ant.custo):null;
    const vRes=ant?variacao(m.resultado,ant.resultado):null;
    const seta=(v,bomSubir)=>{if(v===null)return '';const up=v>=0;const bom=bomSubir?up:!up;return `<span style="font-size:11px;color:${bom?'var(--green)':'var(--red)'}">${up?'▲':'▼'} ${Math.abs(v).toFixed(0)}%</span>`;};
    return `<tr>
      <td style="font-weight:600">${mesAnoCurto(m.ym)}</td>
      <td class="num">${BRL(m.faturamento)} ${seta(vFat,true)}</td>
      <td class="num">${BRL(m.custo)} ${seta(vCusto,false)}</td>
      <td class="num" style="font-weight:600;color:${m.resultado>=0?'var(--green)':'var(--red)'}">${BRL(m.resultado)} ${seta(vRes,true)}</td>
      <td class="num">${BRL(m.ticket)}</td>
      <td class="ctr">${m.nAtend}</td>
    </tr>`;
  }).join('');
  // médias
  const mFat=ult.reduce((s,m)=>s+m.faturamento,0)/ult.length;
  const mCusto=ult.reduce((s,m)=>s+m.custo,0)/ult.length;
  const mRes=ult.reduce((s,m)=>s+m.resultado,0)/ult.length;
  // melhor e pior mês
  const melhor=[...ult].sort((a,b)=>b.resultado-a.resultado)[0];
  const pior=[...ult].sort((a,b)=>a.resultado-b.resultado)[0];
  // projeção: tendência linear simples do faturamento
  const projBloco=projecaoMensal(dados);

  pg.innerHTML=histForm+`
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="kpi" style="animation-delay:0ms"><div class="label">Faturamento médio/mês</div><div class="val">${BRL(mFat)}</div><div class="meta">últimos ${ult.length} meses</div></div>
      <div class="kpi" style="animation-delay:70ms"><div class="label">Custo médio/mês</div><div class="val" style="color:var(--red)">${BRL(mCusto)}</div><div class="meta">média de despesas</div></div>
      <div class="kpi ${mRes>=0?'green':'green neg'}" style="animation-delay:140ms"><div class="label">Resultado médio/mês</div><div class="val">${BRL(mRes)}</div><div class="meta">receita − custo</div></div>
    </div>

    ${projBloco}

    <div class="panel" style="margin-bottom:18px">
      <h3>Evolução lado a lado</h3><div class="ph-sub">Faturamento, custo e resultado mês a mês — com variação sobre o mês anterior</div>
      <div class="chart-wrap" style="height:300px;margin:16px 0"><canvas id="chComp"></canvas></div>
      <table class="data">
        <thead><tr><th>Mês</th><th class="num">Faturamento</th><th class="num">Custo</th><th class="num">Resultado</th><th class="num">Ticket médio</th><th class="ctr">Atend.</th></tr></thead>
        <tbody>${linhas}</tbody>
      </table>
    </div>

    <div class="row two-eq">
      <div class="panel" style="border-left:3px solid var(--green)"><h3>Melhor mês</h3><div class="ph-sub">Maior resultado</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;margin-top:8px">${mesAnoCurto(melhor.ym)}</div>
        <div style="color:var(--green);font-size:18px;font-weight:600">${BRL(melhor.resultado)}</div>
        <div style="font-size:13px;color:var(--grey);margin-top:6px">Faturamento ${BRL(melhor.faturamento)} · custo ${BRL(melhor.custo)}</div>
      </div>
      <div class="panel" style="border-left:3px solid var(--red)"><h3>Mês mais apertado</h3><div class="ph-sub">Menor resultado</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;margin-top:8px">${mesAnoCurto(pior.ym)}</div>
        <div style="color:${pior.resultado>=0?'var(--green)':'var(--red)'};font-size:18px;font-weight:600">${BRL(pior.resultado)}</div>
        <div style="font-size:13px;color:var(--grey);margin-top:6px">Faturamento ${BRL(pior.faturamento)} · custo ${BRL(pior.custo)}</div>
      </div>
    </div>`;

  if(typeof Chart!=='undefined'){
    const ctx=document.getElementById('chComp');
    if(charts.comp)charts.comp.destroy();
    const isLight=document.body.classList.contains('light');
    const grid=isLight?'#E7E0D4':'#383229';
    const tick=isLight?'#8A8175':'#B0A899';
    charts.comp=new Chart(ctx,{type:'bar',
      data:{labels:ult.map(m=>mesAnoCurto(m.ym)),datasets:[
        {label:'Faturamento',data:ult.map(m=>m.faturamento),backgroundColor:'#D8B468',borderRadius:5},
        {label:'Custo',data:ult.map(m=>m.custo),backgroundColor:'#C77B6F',borderRadius:5},
        {type:'line',label:'Resultado',data:ult.map(m=>m.resultado),borderColor:'#74B98C',backgroundColor:'#74B98C',tension:.3,borderWidth:2,pointRadius:4,fill:false}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:tick,font:{size:12}}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${BRL(c.parsed.y)}`}}},
        scales:{x:{grid:{color:grid},ticks:{color:tick}},y:{grid:{color:grid},ticks:{color:tick,callback:v=>'R$'+(v/1000)+'k'}}}}});
  }
}

// projeção: regressão linear simples sobre o faturamento dos meses lançados
function projecaoMensal(dados){
  if(dados.length<2){
    return `<div class="panel" style="margin-bottom:18px;border-left:3px solid var(--gold)"><h3>Projeção</h3><div class="ph-sub">Tendência da clínica</div>
      <div style="font-size:13px;color:var(--grey);margin-top:8px">Lance pelo menos 2 meses para o sistema projetar a tendência dos próximos meses.</div></div>`;
  }
  // regressão linear y = a + b*x sobre faturamento
  const n=dados.length;
  const xs=dados.map((_,i)=>i);
  const ys=dados.map(m=>m.faturamento);
  const sx=xs.reduce((a,b)=>a+b,0), sy=ys.reduce((a,b)=>a+b,0);
  const sxy=xs.reduce((s,x,i)=>s+x*ys[i],0), sxx=xs.reduce((s,x)=>s+x*x,0);
  const b=(n*sxy-sx*sy)/(n*sxx-sx*sx||1);
  const a=(sy-b*sx)/n;
  const proj=k=>Math.max(0,Math.round((a+b*(n-1+k))/100)*100);
  // próximos 3 meses
  const ultYm=dados[dados.length-1].ym;
  const proximos=[1,2,3].map(k=>{
    const d=new Date(ultYm+'-01T00:00:00'); d.setMonth(d.getMonth()+k);
    return {ym:d.toISOString().slice(0,7), val:proj(k)};
  });
  const tendencia = b>=0?'crescimento':'queda';
  const corTend = b>=0?'var(--green)':'var(--red)';
  const mediaCusto=dados.slice(-3).reduce((s,m)=>s+m.custo,0)/Math.min(3,dados.length);
  return `
    <div class="panel" style="margin-bottom:18px;border-left:3px solid var(--gold)">
      <h3>Projeção dos próximos meses</h3><div class="ph-sub">Baseada na tendência dos ${n} meses lançados</div>
      <div style="display:flex;align-items:center;gap:10px;margin:10px 0 16px">
        <span style="font-size:13px;color:var(--grey)">Tendência de faturamento:</span>
        <span style="font-weight:600;color:${corTend}">${b>=0?'▲':'▼'} ${tendencia} de ${BRL(Math.abs(b))}/mês</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
        ${proximos.map(p=>{
          const resultadoProj=p.val-mediaCusto;
          return `<div style="padding:14px;border-radius:12px;background:var(--cream);border:1px solid var(--line)">
            <div style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--grey)">${mesAnoCurto(p.ym)}</div>
            <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--gold);margin:4px 0">${BRL(p.val)}</div>
            <div style="font-size:12px;color:var(--grey)">faturamento previsto</div>
            <div style="font-size:12px;color:${resultadoProj>=0?'var(--green)':'var(--red)'};margin-top:4px">resultado ~${BRL(resultadoProj)}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="margin-top:12px;font-size:12px;color:var(--grey);font-style:italic">Projeção estatística pela tendência dos meses lançados (considera custo médio dos últimos 3 meses). Quanto mais meses, mais precisa.</div>
    </div>`;
}
async function salvarHistorico(){
  const ym=document.getElementById('hist_mes').value;
  const fat=+document.getElementById('hist_fat').value||0;
  const custo=+document.getElementById('hist_custo').value||0;
  if(!ym||(!fat&&!custo))return;
  const existente=HISTORICO.find(h=>h.ym===ym);
  if(existente){ existente.faturamento=fat; existente.custo=custo; }
  else { HISTORICO.push({ym,faturamento:fat,custo}); }
  if(MODO_NUVEM){
    const { data:{ user } } = await sb.auth.getUser();
    await sb.from('configuracoes').upsert({user_id:user.id,chave:'historico',valores:HISTORICO},{onConflict:'user_id,chave'});
  }
  go('comparativo');
}
async function excluirHistorico(ym){
  HISTORICO=HISTORICO.filter(h=>h.ym!==ym);
  if(MODO_NUVEM){
    const { data:{ user } } = await sb.auth.getUser();
    await sb.from('configuracoes').upsert({user_id:user.id,chave:'historico',valores:HISTORICO},{onConflict:'user_id,chave'});
  }
  go('comparativo');
}

/* ============================ CHECK-UP DA CLÍNICA ============================ */
function renderCheckup(pg){
  const dados=dadosMensais();
  const mesRef = dados.length? dados[dados.length-1].ym : new Date().toISOString().slice(0,7);
  const mesAtual = dados.find(m=>m.ym===mesRef) || {faturamento:0,custo:0,resultado:0,nAtend:0,ticket:0};
  const mesAnt = dados.length>1? dados[dados.length-2] : null;
  const cc=calcCaixa();
  const achados=[]; // {nivel:'critico'|'atencao'|'bom', titulo, texto, acao}

  // 1. Margem / resultado
  const margem = mesAtual.faturamento? mesAtual.resultado/mesAtual.faturamento : 0;
  if(mesAtual.resultado<0){
    achados.push({nivel:'critico',titulo:'Resultado negativo no mês',texto:`A clínica fechou ${mesAnoCurto(mesRef)} com prejuízo de ${BRL(Math.abs(mesAtual.resultado))} (custo maior que a receita).`,acao:'Revise os maiores gastos abaixo e veja onde dá para cortar, ou aumente o faturamento/ticket.'});
  } else if(margem<0.15 && mesAtual.faturamento>0){
    achados.push({nivel:'atencao',titulo:'Margem apertada',texto:`A margem do mês foi de ${PCT0(margem)} — abaixo do saudável (20-30%).`,acao:'Avalie reajustar preços ou reduzir custos fixos.'});
  } else if(mesAtual.faturamento>0){
    achados.push({nivel:'bom',titulo:'Margem saudável',texto:`Margem de ${PCT0(margem)} no mês. Resultado positivo de ${BRL(mesAtual.resultado)}.`,acao:''});
  }

  // 2. Crescimento de custo vs mês anterior
  if(mesAnt && mesAnt.custo>0){
    const varCusto=(mesAtual.custo-mesAnt.custo)/mesAnt.custo;
    if(varCusto>0.2){
      achados.push({nivel:'atencao',titulo:'Custos subiram bastante',texto:`As despesas cresceram ${PCT0(varCusto)} em relação a ${mesAnoCurto(mesAnt.ym)} (de ${BRL(mesAnt.custo)} para ${BRL(mesAtual.custo)}).`,acao:'Veja na composição abaixo qual categoria puxou o aumento.'});
    }
  }

  // 3. Maiores categorias de despesa (concentração)
  const despMes=CAIXA.filter(l=>l.tipo==='despesa'&&l.data.slice(0,7)===mesRef);
  const totalDesp=despMes.reduce((s,l)=>s+l.valor,0);
  const porCat={}; despMes.forEach(l=>porCat[l.categoria]=(porCat[l.categoria]||0)+l.valor);
  const catsOrd=Object.entries(porCat).map(([cat,v])=>({cat,v,share:totalDesp?v/totalDesp:0})).sort((a,b)=>b.v-a.v);
  if(catsOrd.length && catsOrd[0].share>0.4){
    achados.push({nivel:'atencao',titulo:`"${catsOrd[0].cat}" concentra muito custo`,texto:`Essa categoria sozinha representa ${PCT0(catsOrd[0].share)} de todas as despesas (${BRL(catsOrd[0].v)}).`,acao:'Concentração alta num único ponto é risco — vale negociar ou buscar alternativas nessa categoria.'});
  }

  // 4. Contas vencidas
  const hoje=new Date().toISOString().slice(0,10);
  let vencidas=0, valVencido=0;
  CONTAS.forEach(c=>{(c.parcelas||[]).forEach(p=>{if(!p.pago && c.tipo==='pagar' && p.vencimento<hoje){vencidas++;valVencido+=c.valorParcela;}});});
  if(vencidas>0){
    achados.push({nivel:'critico',titulo:`${vencidas} parcela(s) vencida(s)`,texto:`Há ${BRL(valVencido)} em contas a pagar já vencidas.`,acao:'Quite ou renegocie para evitar juros e multas.'});
  }

  // 5. Estoque abaixo do mínimo
  const estBaixo=ESTOQUE.filter(e=>e.minimo>0 && e.quantidade<=e.minimo);
  if(estBaixo.length>0){
    achados.push({nivel:'atencao',titulo:`${estBaixo.length} produto(s) abaixo do mínimo`,texto:`Itens precisando reposição: ${estBaixo.map(e=>e.produto).join(', ')}.`,acao:'Programe a compra para não faltar durante atendimentos.'});
  }

  // 6. Saldo de caixa baixo
  if(cc.saldoTotal>=0 && cc.saldoTotal< (mesAtual.custo||0)*0.5 && mesAtual.custo>0){
    achados.push({nivel:'atencao',titulo:'Reserva de caixa baixa',texto:`O saldo em caixa (${BRL(cc.saldoTotal)}) cobre menos de meio mês de custos. Reserva recomendada: pelo menos 1 a 3 meses.`,acao:'Considere reforçar a reserva antes de novos investimentos.'});
  } else if(cc.saldoTotal<0){
    achados.push({nivel:'critico',titulo:'Caixa negativo',texto:`O saldo em caixa está negativo (${BRL(cc.saldoTotal)}).`,acao:'Atenção imediata ao fluxo de caixa.'});
  }

  // 7. Concentração de receita em poucos procedimentos
  const k=calc();
  if(k.porProc && k.porProc.length && k.porProc[0].share>0.5){
    achados.push({nivel:'atencao',titulo:'Receita concentrada num procedimento',texto:`"${k.porProc[0].proc}" responde por ${PCT0(k.porProc[0].share)} do faturamento.`,acao:'Dependência de um só serviço é risco — diversificar protege o negócio.'});
  }

  // 8. Comparecimento baixo
  if(k.txComp>0 && k.txComp<0.8 && k.nAtend>0){
    achados.push({nivel:'atencao',titulo:'Taxa de comparecimento baixa',texto:`${PCT0(k.txComp)} dos agendamentos comparecem. Faltas representam receita perdida.`,acao:'Reforce lembretes e política de confirmação.'});
  }

  if(!achados.length){
    achados.push({nivel:'bom',titulo:'Tudo sob controle',texto:'Não encontrei pontos críticos com os dados atuais. Continue lançando para um diagnóstico mais preciso.',acao:''});
  }

  // ordena: crítico > atenção > bom
  const ordem={critico:0,atencao:1,bom:2};
  achados.sort((a,b)=>ordem[a.nivel]-ordem[b.nivel]);
  const nCrit=achados.filter(a=>a.nivel==='critico').length;
  const nAten=achados.filter(a=>a.nivel==='atencao').length;

  const cor={critico:'var(--red)',atencao:'var(--amber)',bom:'var(--green)'};
  const bg={critico:'var(--red-bg)',atencao:'var(--amber-bg)',bom:'var(--green-bg)'};
  const icone={critico:'⚠',atencao:'!',bom:'✓'};
  const rotulo={critico:'Crítico',atencao:'Atenção',bom:'Tudo certo'};

  const cards=achados.map(a=>`
    <div class="panel" style="margin-bottom:14px;border-left:4px solid ${cor[a.nivel]}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:${bg[a.nivel]};color:${cor[a.nivel]};font-weight:700;font-size:13px">${icone[a.nivel]}</span>
        <span style="font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:${cor[a.nivel]};font-weight:600">${rotulo[a.nivel]}</span>
        <h3 style="font-size:16px;margin-left:2px">${a.titulo}</h3>
      </div>
      <div style="font-size:14px;color:var(--ink);margin-bottom:${a.acao?'8px':'0'};padding-left:34px">${a.texto}</div>
      ${a.acao?`<div style="font-size:13px;color:var(--grey);padding-left:34px"><b style="color:var(--gold-d)">→ </b>${a.acao}</div>`:''}
    </div>`).join('');

  // composição de custo (referência)
  const catTabela=catsOrd.length?catsOrd.map(c=>`<tr><td>${c.cat}</td><td class="num">${BRL(c.v)}</td><td class="num" style="color:var(--grey)">${PCT0(c.share)}</td></tr>`).join(''):'<tr><td colspan="3" style="text-align:center;color:var(--grey);padding:18px">Sem despesas lançadas neste mês.</td></tr>';

  pg.innerHTML=`
    <div class="panel" style="margin-bottom:18px">
      <div class="panel-head"><div><h3 style="font-size:19px">Check-up da Clínica</h3><div class="ph-sub">Diagnóstico automático de ${mesAnoCurto(mesRef)} — pontos que merecem sua atenção</div></div></div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:6px">
        <div style="flex:1;min-width:130px;text-align:center;padding:14px;border-radius:12px;background:var(--red-bg)"><div style="font-size:30px;font-weight:700;color:var(--red);font-family:'Cormorant Garamond',serif">${nCrit}</div><div style="font-size:12px;color:var(--grey)">pontos críticos</div></div>
        <div style="flex:1;min-width:130px;text-align:center;padding:14px;border-radius:12px;background:var(--amber-bg)"><div style="font-size:30px;font-weight:700;color:var(--amber);font-family:'Cormorant Garamond',serif">${nAten}</div><div style="font-size:12px;color:var(--grey)">pontos de atenção</div></div>
        <div style="flex:1;min-width:130px;text-align:center;padding:14px;border-radius:12px;background:var(--green-bg)"><div style="font-size:30px;font-weight:700;color:var(--green);font-family:'Cormorant Garamond',serif">${achados.filter(a=>a.nivel==='bom').length}</div><div style="font-size:12px;color:var(--grey)">pontos positivos</div></div>
      </div>
    </div>

    <div style="margin-bottom:8px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--grey);font-weight:600">Diagnóstico</div>
    ${cards}

    <div class="panel" style="margin-top:18px">
      <h3>Para onde o dinheiro foi em ${mesAnoCurto(mesRef)}</h3><div class="ph-sub">Maiores categorias de despesa — base para decidir onde economizar</div>
      <table class="data" style="margin-top:12px"><thead><tr><th>Categoria</th><th class="num">Valor</th><th class="num">% do total</th></tr></thead><tbody>${catTabela}</tbody></table>
    </div>`;
}
