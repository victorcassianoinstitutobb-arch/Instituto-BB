async function salvarCapt(id){
  const num=i=>{const v=document.getElementById(i).value;return v===''?0:+v;};
  const dados={data:document.getElementById('cp_data').value,plataforma:document.getElementById('cp_plat').value,
    seguidores:num('cp_seg'),leads:num('cp_leads'),agendadas:num('cp_agend'),
    investido:num('cp_inv'),gasto:num('cp_gasto'),campanhas:num('cp_camp')};
  if(MODO_NUVEM){
    if(id && id!=='0') await sbUpdate('captacao',id,dados); else await sbInsert('captacao',dados);
    await carregarTudo(); go('leads'); return;
  }
  if(id && id!=='0'){const c=CAPTACAO.find(x=>x.id==id);Object.assign(c,dados);}
  else{CAPTACAO.push({id:CAPT_SEQ++,...dados});}
  go('leads');
}
async function delCapt(id){ if(MODO_NUVEM){await sbDelete('captacao',id);await carregarTudo();} else {CAPTACAO=CAPTACAO.filter(c=>c.id!=id);} go('leads');}
function analisarCaptacao(){
  const porPlat={};
  CAPTACAO.forEach(c=>{if(!porPlat[c.plataforma])porPlat[c.plataforma]={plataforma:c.plataforma,leads:0,agendadas:0,gasto:0};
    porPlat[c.plataforma].leads+=c.leads||0;porPlat[c.plataforma].agendadas+=c.agendadas||0;porPlat[c.plataforma].gasto+=c.gasto||0;});
  const plats=Object.values(porPlat).filter(p=>p.leads>0);
  if(!plats.length){document.getElementById('analiseBox').innerHTML='<div style="padding:16px;color:var(--grey)">Sem dados suficientes.</div>';return;}
  const melhorConv=[...plats].sort((a,b)=>(b.agendadas/b.leads)-(a.agendadas/a.leads))[0];
  const maisLeads=[...plats].sort((a,b)=>b.leads-a.leads)[0];
  const ins=[];
  ins.push(`<b>${maisLeads.plataforma}</b> trouxe mais leads (${maisLeads.leads}).`);
  ins.push(`<b>${melhorConv.plataforma}</b> tem a melhor conversão: ${PCT0(melhorConv.agendadas/melhorConv.leads)} dos leads agendaram.`);
  plats.forEach(p=>{if(p.gasto>0){const cpl=p.gasto/p.leads;ins.push(`${p.plataforma}: custo de ${BRL(cpl)} por lead (gasto ${BRL(p.gasto)}).`);}});
  const orgClose=plats.find(p=>p.gasto===0&&p.leads>0);
  if(orgClose)ins.push(`<b style="color:var(--green)">${orgClose.plataforma}</b> gera leads sem custo de mídia — vale potencializar conteúdo orgânico e indicação.`);
  document.getElementById('analiseBox').innerHTML=`
    <div style="margin-top:18px;background:var(--cream);border:1px solid var(--gold-l);border-radius:14px;padding:18px">
      <div style="font-weight:500;font-family:'Cormorant Garamond',serif;font-size:18px;margin-bottom:10px">Análise da captação</div>
      ${ins.map(i=>`<div style="display:flex;gap:9px;margin-bottom:8px;font-size:13.5px"><span style="color:var(--gold-d)">•</span><span>${i}</span></div>`).join('')}
    </div>`;
}

   ASSISTENTE — IA gratuita baseada em regras e cálculos.
   Sem API externa, sem custo. Analisa calc() e responde.

function gerarInsights(){
  const k=calc(); const ins=[];
  // Resultado financeiro
  if(k.lucro<0){
    ins.push({tipo:'alerta',icone:'alert',titulo:'Resultado negativo no período',
      texto:`As despesas (${BRL(k.custoTotal)}) e impostos superaram o faturamento (${BRL(k.faturamento)}), gerando prejuízo de ${BRL(Math.abs(k.lucro))}. Para o resultado ficar positivo, o faturamento precisaria passar de ${BRL((k.custoTotal)/(1-META.imposto))}.`});
  } else {
    ins.push({tipo:'bom',icone:'check',titulo:'Operação no azul',
      texto:`Lucro líquido de ${BRL(k.lucro)}, com margem de ${PCT(k.margem)}. Resultado saudável para o período.`});
  }
  // Meta de faturamento (só se houver meta definida)
  if(META.faturamento>0){
    const pf=k.faturamento/META.faturamento;
    if(pf<0.7){
      ins.push({tipo:'alerta',icone:'target',titulo:'Faturamento abaixo da meta',
        texto:`Você atingiu ${PCT0(pf)} da meta de ${BRL(META.faturamento)}. Faltam ${BRL(META.faturamento-k.faturamento)} para o objetivo do mês.`});
    } else if(pf>=1){
      ins.push({tipo:'bom',icone:'target',titulo:'Meta de faturamento batida',
        texto:`Faturamento ${PCT0(pf)} da meta. Excelente desempenho comercial.`});
    }
  }
  // Melhor e pior canal
  const canaisComLeads=k.porCanal.filter(c=>c.leads>0);
  if(canaisComLeads.length){
    const melhor=[...canaisComLeads].sort((a,b)=>b.conv-a.conv)[0];
    const maisReceita=[...k.porCanal].sort((a,b)=>b.receita-a.receita)[0];
    ins.push({tipo:'info',icone:'trophy',titulo:`Melhor canal: ${melhor.canal}`,
      texto:`${melhor.canal} converteu ${PCT0(melhor.conv)} dos leads. Em receita, o destaque é ${maisReceita.canal} com ${BRL(maisReceita.receita)}.`});
    // canal ineficiente: muito investimento, pouca conversão
    const pago=k.porCanal.find(c=>c.canal==='Tráfego Pago');
    if(pago && pago.conv<0.4 && k.investMkt>0){
      ins.push({tipo:'alerta',icone:'cash',titulo:'Atenção ao Tráfego Pago',
        texto:`O Tráfego Pago converteu apenas ${PCT0(pago.conv)} e concentra o investimento de marketing (${BRL(k.investMkt)}, CAC de ${BRL(k.cac)}). Vale revisar segmentação dos anúncios ou redirecionar verba para canais que convertem melhor, como indicação.`});
    }
  }
  // No-shows
  if(k.noShows>0){
    const taxaNoShow=k.noShows/(k.nAtend+k.noShows);
    ins.push({tipo: taxaNoShow>0.1?'alerta':'info',icone:'calendar',titulo:`${k.noShows} falta(s) na agenda`,
      texto:`No-shows representam ${PCT0(taxaNoShow)} dos agendamentos. ${taxaNoShow>0.1?'Acima do ideal — ':''}Confirmação por WhatsApp 24h e 2h antes, e sinal para procedimentos caros, reduzem faltas.`});
  }
  // Procedimento campeão
  if(k.porProc.length){
    const top=[...k.porProc].sort((a,b)=>b.receita-a.receita)[0];
    ins.push({tipo:'info',icone:'star',titulo:`Carro-chefe: ${top.proc}`,
      texto:`${top.proc} respondeu por ${PCT0(top.share)} do faturamento (${BRL(top.receita)}, ${top.qtd} atendimento(s)). Considere pacotes e divulgação focada nesse procedimento.`});
  }
  // Maior despesa
  if(k.porCat.length){
    const maior=k.porCat[0];
    ins.push({tipo:'info',icone:'wallet',titulo:`Maior despesa: ${maior.cat}`,
      texto:`${maior.cat} é ${PCT0(maior.valor/k.custoTotal)} dos custos (${BRL(maior.valor)}). É o primeiro lugar para olhar se precisar enxugar gastos.`});
  }
  // Ocupação da agenda
  if(k.txOcup<META.ocupacao){
    ins.push({tipo:'info',icone:'clock',titulo:'Agenda com espaço ocioso',
      texto:`Ocupação em ${PCT(k.txOcup)} contra meta de ${PCT0(META.ocupacao)}. Há horários livres que poderiam virar faturamento — ações de reativação de pacientes antigos ajudam a preencher.`});
  }
  // Conformidade
  const pend=k.confTotal-k.confOK;
  if(pend>0){
    ins.push({tipo:'alerta',icone:'shield',titulo:`${pend} pendência(s) de conformidade`,
      texto:`${k.confOK} de ${k.confTotal} itens regularizados. Pendências sanitárias/legais expõem a clínica a multa e interdição — priorize a regularização.`});
  }
  return ins;
}

/* Responde perguntas livres por correspondência de palavras-chave */
function responder(pergunta){
  const k=calc(); const q=pergunta.toLowerCase();
  const has=(...t)=>t.some(x=>q.includes(x));
  if(has('lucro','resultado','sobrou','ganh')){
    return k.lucro>=0
      ? `O lucro líquido do período é <b>${BRL(k.lucro)}</b>, com margem de <b>${PCT(k.margem)}</b>. Faturamento de ${BRL(k.faturamento)} menos ${BRL(k.imposto)} de impostos e ${BRL(k.custoTotal)} de despesas.`
      : `No período há <b>prejuízo de ${BRL(Math.abs(k.lucro))}</b>. O faturamento (${BRL(k.faturamento)}) não cobriu impostos (${BRL(k.imposto)}) e despesas (${BRL(k.custoTotal)}). Para empatar, seria preciso faturar cerca de ${BRL(k.custoTotal/(1-META.imposto))}.`;
  }
  if(has('faturamento','faturou','receita','vendeu')){
    return `O faturamento do período é <b>${BRL(k.faturamento)}</b>, que equivale a ${PCT0(k.faturamento/META.faturamento)} da meta de ${BRL(META.faturamento)}. Ticket médio de ${BRL(k.ticket)}.`;
  }
  if(has('melhor canal','canal melhor','canal converte','onde investir','melhor origem')){
    const m=[...k.porCanal.filter(c=>c.leads>0)].sort((a,b)=>b.conv-a.conv)[0];
    const r=[...k.porCanal].sort((a,b)=>b.receita-a.receita)[0];
    return m?`O canal que <b>mais converte</b> é <b>${m.canal}</b> (${PCT0(m.conv)} dos leads). Em <b>receita</b>, o líder é ${r.canal} com ${BRL(r.receita)}. Vale concentrar esforço nesses canais.`:`Ainda não há leads suficientes para comparar canais.`;
  }
  if(has('pior canal','cortar','desperdíci','desperdici','gastando à toa','tráfego','trafego')){
    const pago=k.porCanal.find(c=>c.canal==='Tráfego Pago');
    return pago?`O <b>Tráfego Pago</b> converteu ${PCT0(pago.conv)} e tem CAC de ${BRL(k.cac)} (investimento total ${BRL(k.investMkt)}). ${pago.conv<0.4?'Está abaixo do ideal — avalie melhorar os anúncios ou migrar parte da verba para indicação, que costuma ter custo zero e alta conversão.':'Está com desempenho razoável.'}`:`Sem dados de canal pago no período.`;
  }
  if(has('ticket','valor médio','médio por')){
    return `O ticket médio é <b>${BRL(k.ticket)}</b> (meta ${BRL(META.ticket)}). Para subir o ticket: pacotes combinados, protocolos de manutenção e oferta de procedimentos complementares na mesma sessão.`;
  }
  if(has('no-show','no show','falta','furo','faltou')){
    return `Houve <b>${k.noShows} falta(s)</b> no período. Confirmação ativa por WhatsApp (24h e 2h antes) e cobrança de sinal em procedimentos caros são as medidas mais eficazes para reduzir.`;
  }
  if(has('conversão','converte','funil','fecha')){
    return `A taxa de conversão de leads é <b>${PCT(k.txConv)}</b> (meta ${PCT0(META.conversao)}). De cada 10 pessoas que agendam, cerca de ${Math.round(k.txConv*10)} fecham.`;
  }
  if(has('custo','despesa','gasto','gastando')){
    const m=k.porCat[0];
    return `As despesas somam <b>${BRL(k.custoTotal)}</b>. A maior é <b>${m.cat}</b> (${BRL(m.valor)}, ${PCT0(m.valor/k.custoTotal)} do total). É o primeiro lugar para revisar se precisar reduzir gastos.`;
  }
  if(has('conformidade','regulariz','anvisa','pgrss','licença','licenca','vigilância','vigilancia')){
    const pend=k.confTotal-k.confOK;
    return pend?`Há <b>${pend} pendência(s)</b> de conformidade (${k.confOK}/${k.confTotal} em dia). Pendências sanitárias e legais devem ser prioridade, pois expõem a clínica a multa e interdição.`:`Conformidade <b>100% em dia</b> (${k.confOK}/${k.confTotal}). Mantenha o acompanhamento mensal.`;
  }
  if(has('procedimento','carro-chefe','carro chefe','mais vende','popular')){
    const t=[...k.porProc].sort((a,b)=>b.receita-a.receita)[0];
    return t?`O procedimento que mais fatura é <b>${t.proc}</b>: ${BRL(t.receita)} (${PCT0(t.share)} do total, ${t.qtd} atendimento(s)).`:`Sem procedimentos registrados no período.`;
  }
  if(has('ocupação','ocupacao','agenda','horário livre','horario livre','ociosa')){
    return `A ocupação da agenda está em <b>${PCT(k.txOcup)}</b> (meta ${PCT0(META.ocupacao)}). ${k.txOcup<META.ocupacao?'Há espaço ocioso — reativar pacientes antigos ajuda a preencher.':'Boa ocupação.'}`;
  }
  if(has('cac','custo por lead','aquisição','aquisicao')){
    return `O custo de aquisição por cliente (CAC) é <b>${BRL(k.cac)}</b>, com ${BRL(k.investMkt)} investidos em marketing no período.`;
  }
  if(has('resumo','como est','panorama','geral','vai a clínica','vai a clinica','situação','situacao')){
    return `<b>Resumo do período:</b> faturamento ${BRL(k.faturamento)} (${PCT0(k.faturamento/META.faturamento)} da meta), ${k.nAtend} atendimentos, ticket médio ${BRL(k.ticket)}, conversão ${PCT(k.txConv)}. Resultado: <b>${k.lucro>=0?'lucro':'prejuízo'} de ${BRL(Math.abs(k.lucro))}</b>. ${k.confTotal-k.confOK>0?`Atenção: ${k.confTotal-k.confOK} pendência(s) de conformidade.`:'Conformidade em dia.'}`;
  }
  if(has('oi','olá','ola','bom dia','boa tarde','boa noite','ajuda','o que você')){
    return `Olá! Sou o assistente do sistema. Posso responder sobre faturamento, lucro, canais, conversão, custos, agenda e conformidade — tudo com base nos dados lançados. Experimente: "Como está a clínica?" ou "Qual o melhor canal?"`;
  }
  return `Não tenho um cálculo específico para isso ainda. Posso ajudar com: <b>faturamento, lucro, melhor canal, ticket médio, no-shows, conversão, custos, conformidade, ocupação da agenda e CAC</b>. Reformule a pergunta usando um desses temas.`;
}

function metaCard(m, av){
  const T=TIPO_META[m.tipo];
  const real=av.real;
  // barra de progresso até a faixa máxima
  const maxAlvo=Math.max(...m.faixas.map(f=>f.alvo));
  const prog=Math.min(real/maxAlvo,1)*100;
  // faixas com marcador de atingida
  const faixasHTML=av.ordenadas.map(f=>{
    const hit=real>=f.alvo;
    const isCurrent=av.atingida&&f.nome===av.atingida.nome;
    return `<div style="flex:1;text-align:center;padding:10px 6px;border-radius:10px;background:${isCurrent?'var(--green-bg)':hit?'var(--cream)':'var(--paper)'};border:1px solid ${isCurrent?'var(--green)':'var(--line)'}">
      <div style="font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--grey);font-weight:600">${f.nome}</div>
      <div style="font-size:15px;font-weight:600;margin:3px 0;color:var(--ink)">${T.fmt(f.alvo)}</div>
      <div style="font-size:12px;color:${isCurrent?'var(--green)':'var(--gold-d)'};font-weight:600">${bonusLabel(f.bonus)}</div>
      ${hit?'<div style="font-size:10px;color:var(--green);margin-top:3px">✓ atingida</div>':'<div style="font-size:10px;color:var(--grey);margin-top:3px">—</div>'}
    </div>`;
  }).join('');
  const faltaTxt = av.proxima
    ? `Faltam <b>${T.fmt(av.proxima.alvo-real)}</b> para a faixa ${av.proxima.nome} (${bonusLabel(av.proxima.bonus)})`
    : `<b style="color:var(--green)">Faixa máxima atingida!</b>`;
  // detalhamento por semana (metas semanais)
  let semanasHTML='';
  if(m.periodo==='semanal'){
    const sems=realizadoPorSemana(m).filter(s=>s.val>0 || s.sem<=4);
    semanasHTML=`<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--line)">
      <div style="font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--grey);font-weight:600;margin-bottom:10px">Por semana do mês</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${sems.map(s=>`<div style="flex:1;min-width:90px;text-align:center;padding:8px;border-radius:9px;background:var(--cream);border:1px solid var(--line)">
          <div style="font-size:10.5px;color:var(--grey);text-transform:uppercase;letter-spacing:.5px">Semana ${s.sem}</div>
          <div style="font-size:15px;font-weight:600;color:var(--ink);margin-top:3px">${T.fmt(s.val)}</div>
        </div>`).join('')}
      </div></div>`;
  }
  return `<div class="panel" style="margin-bottom:16px">
    <div class="panel-head">
      <div>
        <h3 style="font-size:18px">${T.label} · ${m.periodo}</h3>
        <div class="ph-sub">${funcNome(m.funcId)} · <span style="text-transform:uppercase;font-size:10px;letter-spacing:.5px;background:${m.escopo==='geral'?'var(--ivory2)':'var(--cream)'};padding:2px 8px;border-radius:10px;color:var(--gold-d)">${m.escopo==='geral'?'Meta geral':'Individual'}</span> · realizado: <b style="color:var(--ink)">${T.fmt(real)}</b></div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--grey);text-transform:uppercase;letter-spacing:.6px">Bônus atual</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:${av.bonus>0?'var(--gold-d)':'var(--grey)'}">${BRL(av.bonus)}</div>
        <button class="btn ghost" style="padding:4px 12px;font-size:12px;margin-top:4px" onclick="editarMeta('${m.id}')">Editar</button>
      </div>
    </div>
    <div class="bar" style="margin-bottom:16px"><i class="${av.proxima?'':'hit'}" data-w="${prog}" style="width:${prog}%"></i></div>
    <div style="display:flex;gap:10px">${faixasHTML}</div>
    <div style="margin-top:14px;font-size:13px;color:var(--grey)">${faltaTxt}</div>
    ${semanasHTML}
  </div>`;
}

function lerFaixas(){
  const nomes=['Mínima','Média','Máxima'];
  return nomes.map((nome,i)=>({
    nome,
    alvo:+document.getElementById('fa_alvo_'+i).value||0,
    bonus:{tipo:document.getElementById('fa_btipo_'+i).value,
           valor:+document.getElementById('fa_bval_'+i).value||0}
  }));
}
async function salvarMeta(id){
  const funcVal=document.getElementById('m_func').value;
  const dados={funcId: MODO_NUVEM?funcVal:+funcVal,
    escopo:document.getElementById('m_escopo').value,
    tipo:document.getElementById('m_tipo').value,
    periodo:document.getElementById('m_periodo').value,
    faixas:lerFaixas()};
  if(MODO_NUVEM){
    const reg={func_id:funcVal,escopo:dados.escopo,tipo:dados.tipo,periodo:dados.periodo,faixas:dados.faixas};
    if(id && id!=='0') await sbUpdate('metas',id,reg); else await sbInsert('metas',reg);
    await carregarTudo(); go('comissoes'); return;
  }
  if(id && id!=='0'){ const m=METAS.find(x=>x.id==id); Object.assign(m,dados); }
  else { METAS.push({id:METAS_SEQ++,...dados}); }
  go('comissoes');
}
async function excluirMeta(id){
  if(MODO_NUVEM){await sbDelete('metas',id);await carregarTudo();go('comissoes');return;}
  METAS=METAS.filter(m=>m.id!=id);
  go('comissoes');
}

function fichaPaciente(nome){
  const k=calc(); const p=k.pacientes.find(x=>x.nome===nome); if(!p)return;
  const hist=DATA.atendimentos.filter(a=>a.paciente===nome).sort((a,b)=>b.data.localeCompare(a.data));
  // agrupa por dia de visita
  const porDia={};
  hist.forEach(a=>{ if(!porDia[a.data])porDia[a.data]=[]; porDia[a.data].push(a); });
  const dias=Object.keys(porDia).sort((a,b)=>b.localeCompare(a));
  const primeira = hist.length? hist[hist.length-1].data : null;
  const visitasHTML=dias.map(dia=>{
    const itens=porDia[dia];
    const totalDia=itens.reduce((s,a)=>s+a.valor,0);
    const procs=itens.map(a=>`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)">
        <div style="display:flex;align-items:center;gap:10px">

/* ============================ ANÁLISE AVANÇADA ============================ */
let GRAO_ANALISE='mes'; // 'dia' | 'semana' | 'mes' | 'ano'
function setGrao(g){GRAO_ANALISE=g; go('analise');}

// retorna o intervalo de datas do período selecionado, baseado no dado mais recente
function periodoAtual(grao){
  const datas=DATA.atendimentos.map(a=>a.data).filter(Boolean).sort();
  const ref = datas.length? datas[datas.length-1] : new Date().toISOString().slice(0,10);
  const d=new Date(ref+'T00:00:00');
  if(grao==='dia'){
    return {ini:ref, fim:ref, label:fmtDateFull(ref)};
  } else if(grao==='semana'){
    const sem=Math.ceil(d.getDate()/7);
    const ym=ref.slice(0,7);
    const ini=ym+'-'+String((sem-1)*7+1).padStart(2,'0');
    const fimDia=Math.min(sem*7, new Date(d.getFullYear(),d.getMonth()+1,0).getDate());
    const fim=ym+'-'+String(fimDia).padStart(2,'0');
    return {ini,fim,label:'Semana '+sem+' de '+mesAno(ref)};
  } else if(grao==='ano'){
    const y=ref.slice(0,4);
    return {ini:y+'-01-01', fim:y+'-12-31', label:'Ano '+y};
  } else { // mes
    const ym=ref.slice(0,7);
    const ult=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    return {ini:ym+'-01', fim:ym+'-'+String(ult).padStart(2,'0'), label:mesAno(ref)};
  }
}
function mesAno(s){const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];const[y,m]=s.split('-');return meses[+m-1]+' de '+y;}

// calcula indicadores (LTV, CAC, recompra) sobre os atendimentos de um intervalo
function calcIndicadores(ini,fim){
  const noPeriodo = DATA.atendimentos.filter(a=>a.data>=ini && a.data<=fim);
  const comp = noPeriodo.filter(a=>a.agenda==='Compareceu');
  const nomes=[...new Set(comp.map(a=>a.paciente))];
  const pacientes=nomes.map(nome=>{
    const hist=comp.filter(a=>a.paciente===nome);
    return {nome, visitas:hist.length, valorTotal:hist.reduce((s,a)=>s+a.valor,0), recorrente:hist.length>1};
  });
  const totalPac=pacientes.length;
  const recorrentes=pacientes.filter(p=>p.recorrente).length;
  const txRecompra= totalPac? recorrentes/totalPac : 0;
  const ltv= totalPac? pacientes.reduce((s,p)=>s+p.valorTotal,0)/totalPac : 0;
  // CAC: investimento em captação no período / clientes fechados (compareceram)
  const captPeriodo = CAPTACAO.filter(c=>c.data>=ini && c.data<=fim);
  const investido = captPeriodo.reduce((s,c)=>s+(c.gasto||c.investido||0),0);
  const cac= totalPac? investido/totalPac : 0;
  return {txRecompra, ltv, cac, totalPac, recorrentes, faturamento:comp.reduce((s,a)=>s+a.valor,0), nAtend:comp.length};
}
// recebimentos por modalidade (+parcelas) dentro de um período
function recebimentosPeriodo(ini,fim){
  const comp = DATA.atendimentos.filter(a=>a.agenda==='Compareceu' && a.data>=ini && a.data<=fim);
  const map={};
  let semReceb=0;
  comp.forEach(a=>{
    const ps=pagamentosDe(a);
    if(!ps.length){ if(a.valor>0) semReceb+=a.valor; return; }
    ps.forEach(p=>{
      if(!p.forma) return;
      const chave = ehCredito(p.forma) && (+p.parcelas>1) ? `${p.forma} ${p.parcelas}x` : p.forma;
      if(!map[chave]) map[chave]={label:chave, modalidade:p.forma, parcelas:(+p.parcelas||1), valor:0, qtd:0, credito:ehCredito(p.forma)};
      map[chave].valor += (+p.valor||0); map[chave].qtd += 1;
    });
  });
  const lista = Object.values(map).sort((a,b)=>b.valor-a.valor);
  const total = lista.reduce((s,r)=>s+r.valor,0);
  return {lista, total, semReceb};
}

// agrupa a série diária de atendimentos em dia / semana / mês / ano
function agruparSerie(grao){
  const at=DATA.atendimentos.filter(a=>a.agenda==='Compareceu');
  const buckets={};
  at.forEach(a=>{
    const d=new Date(a.data+'T00:00:00');
    let chave, ordem;
    if(grao==='dia'){
      chave=a.data.slice(8)+'/'+a.data.slice(5,7); ordem=a.data;
    } else if(grao==='semana'){
      const sem=Math.ceil(d.getDate()/7);
      chave='Sem '+sem+'/'+a.data.slice(5,7); ordem=a.data.slice(0,7)+'-S'+sem;
    } else if(grao==='ano'){
      chave=''+d.getFullYear(); ordem=a.data.slice(0,4);
    } else {
      const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      chave=meses[d.getMonth()]+'/'+d.getFullYear(); ordem=a.data.slice(0,7);
    }
    if(!buckets[chave]) buckets[chave]={chave,ordem,valor:0,atend:0,datas:[]};
    buckets[chave].valor+=a.valor; buckets[chave].atend+=1;
    if(buckets[chave].datas.indexOf(a.data)<0) buckets[chave].datas.push(a.data);
  });
  return Object.values(buckets).sort((x,y)=>x.ordem.localeCompare(y.ordem));
}

      ${recebimentosBlock(recebimentosPeriodo(per.ini, per.fim))}
    </div>`;
  drawAnaliseCharts(k, serie);
}
function recebimentosBlock(r){
  if(!r.lista.length && !r.semReceb){
    return `<div style="color:var(--grey);font-size:13px;padding:8px 0">Nenhum recebimento registrado neste período. Informe a forma de recebimento ao cadastrar os atendimentos para ver o detalhamento aqui.</div>`;
  }
  const corDe = m => m.indexOf('Pix')===0 ? 'var(--green)' : m.indexOf('Crédito')===0 ? 'var(--gold)' : 'var(--sage)';
  const linhas=r.lista.map(x=>{
    const w=r.total?x.valor/r.total*100:0;
    const det = x.credito && x.parcelas>1 ? ` · ${x.qtd} venda(s) em ${x.parcelas}x` : ` · ${x.qtd} venda(s)`;
    return `<div style="margin-bottom:13px">
      <div style="display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:5px">
        <span><b>${x.label}</b><span style="color:var(--grey);font-size:12px">${det}</span></span>
        <span><b>${BRL(x.valor)}</b> <span style="color:var(--grey);font-size:12px">${r.total?PCT0(x.valor/r.total):'0%'}</span></span>
      </div>
      <div class="bar"><i style="width:${w}%;background:${corDe(x.modalidade)}"></i></div>
    </div>`;
  }).join('');
  const totalLinha=`<div class="dre-line total" style="margin-top:6px"><span>Total recebido</span><span class="amt pos">${BRL(r.total)}</span></div>`;
  const semR = r.semReceb ? `<div style="margin-top:10px;font-size:12px;color:var(--amber)">⚠ ${BRL(r.semReceb)} em vendas sem forma de recebimento informada.</div>` : '';
  return linhas + totalLinha + semR;
}
function projecaoBlock(k){
  const ev=k.evolucao||[];
  if(!ev.length){
    return `<div style="color:var(--grey);font-size:13px;padding:8px 0">Sem dados suficientes para projeção. Conforme você lança atendimentos ao longo dos meses, a tendência aparece aqui.</div>`;
  }
  const ultimos=ev.slice(-3).map(e=>e.fat);
  const media=ultimos.reduce((a,b)=>a+b,0)/ultimos.length;
  const tend=ev.length>1?(ev[ev.length-1].fat-ev[0].fat)/ev.length:0;
  const proj=Math.max(0,Math.round((media+tend)/100)*100);
  return `
    <div class="dre-line"><span>Média ${ultimos.length} ${ultimos.length>1?'meses':'mês'}</span><span class="amt">${BRL(media)}</span></div>
    <div class="dre-line"><span>Tendência mensal</span><span class="amt ${tend>=0?'pos':'neg'}">${tend>=0?'+':''}${BRL(tend)}</span></div>
    <div class="dre-line total"><span>Projeção próximo mês</span><span class="amt pos">${BRL(proj)}</span></div>

}

  const proc=k.porProc;

  if(MODO_NUVEM){

async function excluirFunc(id){

}

/* ============================ LIVRO-CAIXA ============================ */
function calcCaixa(){
  // SALDO das carteiras = ACUMULADO REAL (saldo inicial + todo o histórico até hoje).
  // RESULTADO / categorias = filtrado pelo período do topo (mês ou acumulado).
  const _per = (typeof periodoSelecionadoIntervalo==='function') ? periodoSelecionadoIntervalo() : null;
  const _dentro = (d)=> !_per || (d && d>=_per.ini && d<=_per.fim);
  const saldos={};
  CARTEIRAS.forEach(c=>saldos[c.id]=+c.saldoInicial||0);
  let receita=0, despesa=0, aporte=0, retirada=0, gastoMateriais=0, fechamentoTot=0;
  const porCatDespesa={}, porCatReceita={};
  CAIXA.forEach(m=>{
    const t=TIPOS_LANC[m.tipo]; if(!t) return;
    // --- SALDO: acumula SEMPRE (todo o histórico), independe do período ---
    if(m.tipo==='transferencia'){
      if(saldos[m.carteira]!=null) saldos[m.carteira]-=m.valor;
      if(saldos[m.carteiraDest]!=null) saldos[m.carteiraDest]+=m.valor;
    } else {
      if(saldos[m.carteira]!=null) saldos[m.carteira]+=t.sinal*m.valor;
    }
    // --- RESULTADO / categorias: só o que está DENTRO do período selecionado ---
    if(_dentro(m.data)){
      if(t.ehReceita){ receita+=m.valor; porCatReceita[m.categoria]=(porCatReceita[m.categoria]||0)+m.valor; }
      if(t.ehDespesa){ despesa+=m.valor; porCatDespesa[m.categoria]=(porCatDespesa[m.categoria]||0)+m.valor; }
      if(m.tipo==='aporte') aporte+=m.valor;
      if(m.tipo==='retirada') retirada+=m.valor;
      if(m.tipo==='fechamento') fechamentoTot+=(t.sinal*m.valor);
      if(m.tipo==='despesa' && (m.categoria==='Produtos/Insumos')) gastoMateriais+=m.valor;
    }
  });
  const saldoTotal=Object.values(saldos).reduce((s,v)=>s+v,0);
  const resultado=receita-despesa; // resultado da clínica no período (não conta aporte/retirada/fechamento)
  const catDespesaArr=Object.entries(porCatDespesa).map(([cat,v])=>({cat,valor:v})).sort((a,b)=>b.valor-a.valor);
  const catReceitaArr=Object.entries(porCatReceita).map(([cat,v])=>({cat,valor:v})).sort((a,b)=>b.valor-a.valor);
  return {saldos,saldoTotal,receita,despesa,aporte,retirada,fechamentoTot,gastoMateriais,resultado,catDespesaArr,catReceitaArr};
}

function renderCaixa(pg){
  const c=calcCaixa();
  const filtro=window.__caixaFiltro||'todas';
  const todas = filtro==='todas';
  // movimentos do período (filtrados por carteira quando aplicável)
  // a LISTA mostra só o mês selecionado (cada mês é independente); o SALDO segue acumulado (calcCaixa)
  const _perLista = (typeof periodoSelecionadoIntervalo==='function') ? periodoSelecionadoIntervalo() : null;
  const _dentroLista = (d)=> !_perLista || (d && d>=_perLista.ini && d<=_perLista.fim);
  const movFull=[...CAIXA].filter(m=>_dentroLista(m.data)).sort((a,b)=>a.data.localeCompare(b.data));
  const mov = todas ? movFull : movFull.filter(m=>String(m.carteira)===String(filtro)||String(m.carteiraDest)===String(filtro));
  // resumo da carteira selecionada (entradas e saídas que tocam aquela carteira)
  let rDespesa=0,rReceita=0,rAporte=0,rRetirada=0,rEntraTransf=0,rSaiTransf=0;
  if(!todas){
    movFull.forEach(m=>{
      const t=TIPOS_LANC[m.tipo];
      if(m.tipo==='transferencia'){
        if(String(m.carteira)===String(filtro)) rSaiTransf+=m.valor;
        if(String(m.carteiraDest)===String(filtro)) rEntraTransf+=m.valor;
      } else if(String(m.carteira)===String(filtro)){
        if(m.tipo==='despesa') rDespesa+=m.valor;
        else if(m.tipo==='receita') rReceita+=m.valor;
        else if(m.tipo==='aporte') rAporte+=m.valor;
        else if(m.tipo==='retirada') rRetirada+=m.valor;
      }
    });
  }
  // saldo corrente acumulado: geral em "todas"; por carteira quando filtrado
  let acc = todas ? CARTEIRAS.reduce((s,w)=>s+w.saldoInicial,0)
                  : ((CARTEIRAS.find(w=>String(w.id)===String(filtro))||{}).saldoInicial||0);
  const body=mov.map(m=>{
    const t=TIPOS_LANC[m.tipo];
    if(m.tipo==='transferencia'){
      if(todas){/* neutro no total geral */}
      else if(String(m.carteiraDest)===String(filtro)) acc+=m.valor;   // entrou nesta carteira
      else if(String(m.carteira)===String(filtro)) acc-=m.valor;       // saiu desta carteira
    } else {
      // em "todas", soma tudo; filtrado, só conta o que afeta a carteira escolhida (sempre m.carteira)
      acc+=t.sinal*m.valor;
    }
    const valTxt = m.tipo==='transferencia'
      ? `<span style="color:var(--grey)">${BRL(m.valor)} →</span>`
      : `<span style="color:${t.cor};font-weight:600">${t.sinal>0?'+':'−'}${BRL(m.valor)}</span>`;
    const cartTxt = m.tipo==='transferencia'
      ? `${cartNome(m.carteira)} → ${cartNome(m.carteiraDest)}`
      : cartNome(m.carteira);
    return `<tr>
      <td data-label="Data">${fmtDate(m.data)}</td>
      <td data-label="Tipo" class="ctr"><span class="pill" style="background:${tipoBg(m.tipo)};color:${t.cor}">${t.label}</span></td>
      <td data-label="Categoria">${m.categoria}</td>
      <td data-label="Descrição">${m.desc}${(Array.isArray(m.itens)&&m.itens.length)?` <span style="font-size:10px;color:var(--gold-d);border:1px solid var(--gold-l);border-radius:6px;padding:1px 5px" title="${m.itens.map(it=>it.nome+' '+BRL(it.valor)).join(' · ')}">${m.itens.length} ${m.itens.length===1?'item':'itens'}</span>`:''}</td>
      <td data-label="Carteira" style="font-size:12px;color:var(--grey)">${cartTxt}</td>
      <td data-label="Valor" class="num">${valTxt}</td>
      <td data-label="Saldo" class="num" style="font-weight:600;color:${acc>=0?'var(--ink)':'var(--red)'}">${BRL(acc)}</td>
      <td data-label="Ações" class="ctr"><button class="btn ghost" style="padding:3px 9px;font-size:11px" onclick="editarLanc('${m.id}')">editar</button> <button class="btn ghost" style="padding:3px 8px;font-size:11px" onclick="excluirCaixa('${m.id}')">×</button></td>
    </tr>`;
  }).join('');
  // seletor de carteira + (quando filtrado) faixa de resumo da carteira
  const cartOpts=`<option value="todas" ${todas?'selected':''}>Todas as carteiras</option>`+
    CARTEIRAS.map(w=>`<option value="${w.id}" ${String(w.id)===String(filtro)?'selected':''}>${w.nome}</option>`).join('');
  const seletor=`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px">

    ${todas?'':`<div style="display:flex;gap:16px;flex-wrap:wrap;margin-left:auto;font-size:12.5px">
      <span style="color:var(--green)">Receitas <b>+${BRL(rReceita)}</b></span>
      ${rAporte?`<span style="color:var(--sage)">Aportes <b>+${BRL(rAporte)}</b></span>`:''}
      <span style="color:var(--red)">Despesas <b>−${BRL(rDespesa)}</b></span>
      ${rRetirada?`<span style="color:var(--amber)">Retiradas <b>−${BRL(rRetirada)}</b></span>`:''}
      ${(rEntraTransf||rSaiTransf)?`<span style="color:var(--grey)">Transf. +${BRL(rEntraTransf)} / −${BRL(rSaiTransf)}</span>`:''}
    </div>`}
  </div>`;

  // cards de saldo por carteira — saldo acumulado real; "Zerar" quando negativo
  const cartCards=CARTEIRAS.map((w,i)=>{
    const saldo=c.saldos[w.id]||0;
    // Zerar só faz sentido quando negativo. Saldo positivo já é acumulado (passa sozinho p/ o mês seguinte).
    let acaoBtn='';
    if(saldo<-0.005){
      acaoBtn=`<button class="btn ghost" style="padding:4px 10px;font-size:11px;margin-top:8px;width:100%" onclick="zerarCarteira(${w.id})" title="Registrar aporte de fechamento para zerar o saldo negativo atual">Zerar (fechamento)</button>`;

  // ---- consolidado de ITENS comprados no mês (do topo) ----

      itAgg[key].valor += (+it.valor||0);
      itAgg[key].vezes += 1;
    }); });
  const itArr=Object.values(itAgg).sort((a,b)=>b.valor-a.valor);

  const resumoItensHTML = itArr.length ? `

// drill-down: mostra os lançamentos de uma categoria (respeita o filtro de carteira)
function verCategoria(tipo, cat){
  const filtro=window.__caixaFiltro||'todas';
  const todas = filtro==='todas';
  let itens=CAIXA.filter(m=>m.tipo===tipo && m.categoria===cat);
  if(!todas) itens=itens.filter(m=>String(m.carteira)===String(filtro));
  itens.sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  const total=itens.reduce((s,m)=>s+m.valor,0);
  const cor = tipo==='despesa'?'var(--red)':'var(--green)';
  const linhas=itens.map(m=>`<tr>
    <td>${fmtDate(m.data)}</td>
    <td>${m.desc||'—'}</td>
    <td style="font-size:12px;color:var(--grey)">${cartNome(m.carteira)}</td>
    <td class="num" style="color:${cor};font-weight:600">${BRL(m.valor)}</td>
    <td class="ctr"><button class="btn ghost" style="padding:3px 9px;font-size:11px" onclick="editarLanc('${m.id}')">editar</button></td>
  </tr>`).join('');
  const box=document.getElementById('catDetalheBox');
  box.innerHTML=`<div class="panel" style="margin-bottom:18px;border:1px solid var(--gold-l)">
    <div class="toolbar">
      <div><h3>${cat}</h3><div class="ph-sub">${itens.length} lançamento(s)${todas?'':' · '+cartNome(filtro)} · total ${BRL(total)}</div></div>
      <button class="btn ghost" style="padding:5px 12px;font-size:12.5px" onclick="document.getElementById('catDetalheBox').innerHTML=''">✕ fechar</button>
    </div>
    <table class="data">
      <thead><tr><th>Data</th><th>Descrição</th><th>Carteira</th><th class="num">Valor</th><th class="ctr">Ações</th></tr></thead>
      <tbody>${linhas||'<tr><td colspan="5" style="text-align:center;color:var(--grey);padding:18px">Nenhum lançamento.</td></tr>'}</tbody>
    </table>
  </div>`;
  box.scrollIntoView({behavior:'smooth',block:'start'});
}

// ===== FECHAMENTO DE CAIXA POR CARTEIRA =====
// Zera uma carteira negativa: cria um lançamento de fechamento (entrada neutra) do valor que faltou.
async function zerarCarteira(cartId){
  const ym=(mesSelecionadoTopo&&mesSelecionadoTopo())||mesHoje();
  const c=calcCaixa();
  const saldo=c.saldos[cartId]||0;
  if(saldo>=0){ alert('Esta carteira não está negativa neste mês.'); return; }
  const falta=Math.abs(saldo);
  const w=CARTEIRAS.find(x=>x.id==cartId);
  if(!confirm(`Zerar "${w?w.nome:''}" com um fechamento de ${BRL(falta)}? Isso não conta como receita nem despesa — apenas fecha o caixa do mês.`)) return;
  const data=ym+'-'+String(diaFechamento(ym)).padStart(2,'0');
  const reg={data,tipo:'fechamento',categoria:'Fechamento de caixa',desc:'Fechamento (zerar saldo)',valor:falta,carteira:cartId,carteiraDest:null,itens:[],fechAcao:'zerar'};
  if(MODO_NUVEM){
    await sbInsert('lancamentos',{data,tipo:'fechamento',categoria:reg.categoria,descricao:reg.desc,valor:falta,carteira_id:cartId,carteira_dest:null,itens:[],fech_acao:'zerar'});
    await carregarTudo();
  } else { CAIXA.push({id:CAIXA_SEQ++,...reg}); }
  go('caixa');
}
// Puxa o saldo positivo de uma carteira para o próximo mês (lança fechamento de entrada no mês seguinte).
// dia de referência do fechamento (último dia do mês, ou hoje se for o mês corrente)
function diaFechamento(ym){
  const hoje=new Date();
  const [a,m]=ym.split('-').map(Number);
  if(ym===mesHoje()) return hoje.getDate();
  return new Date(a, m, 0).getDate(); // último dia do mês
}
async function salvarLanc(id){

    : [];
  registrarItens(itens);
  const dados={data:v('lc_data'),tipo,
    categoria: tipo==='transferencia'?'Transferência':v('lc_cat'),
    desc:v('lc_desc')||'—',valor:+v('lc_valor')||0,carteira:+v('lc_cart'),
    carteiraDest: tipo==='transferencia'?+v('lc_cartDest'):null, itens};
  if(MODO_NUVEM){
    const reg={data:dados.data,tipo:dados.tipo,categoria:dados.categoria,descricao:dados.desc,valor:dados.valor,carteira_id:document.getElementById('lc_cart').value,carteira_dest:tipo==='transferencia'?document.getElementById('lc_cartDest').value:null,itens:itens};
    if(id && id!=='0') await sbUpdate('lancamentos',id,reg); else await sbInsert('lancamentos',reg);
    await carregarTudo(); go('caixa'); return;
  }
  if(id && id!=='0'){const m=CAIXA.find(x=>x.id==id);Object.assign(m,dados);}
  else{CAIXA.push({id:CAIXA_SEQ++,...dados});}
  go('caixa');
}

async function salvarCat(){
  const tipo=document.getElementById('cat_tipo').value;
  const nome=document.getElementById('ct_nome').value.trim();
  if(!nome)return;
  if(MODO_NUVEM){ await sbInsert('categorias',{nome,tipo}); await carregarTudo(); go('caixa'); return; }
  const arr=tipo==='receita'?CAT_RECEITA:CAT_DESPESA;
  if(!arr.includes(nome))arr.splice(arr.length-1,0,nome);
  go('caixa');
}
async function delCat(tipo,nome){
  if(MODO_NUVEM){
    const t=tipo==='receita'?'receita':'despesa';
    await sb.from('categorias').delete().eq('nome',nome).eq('tipo',t);
    await carregarTudo(); go('caixa'); return;
  }
  if(tipo==='despesa')CAT_DESPESA=CAT_DESPESA.filter(c=>c!==nome);
  else CAT_RECEITA=CAT_RECEITA.filter(c=>c!==nome);
  go('caixa');
}

function dadosVendas(){
  const k=calc();
  const ym = mesSelecionadoTopo()||mesHoje();
  // todas as despesas do mês no Livro-Caixa (abatem o resultado da Bruna)
  const despMes = (CAIXA||[]).filter(l=>l.tipo==='despesa' && (l.data||'').slice(0,7)===ym)
                    .reduce((s,l)=>s+(+l.valor||0),0);
  // BRUNA: vendido − despesas do mês − material dela = lucro
  const bruna = {
    vendido: k.fatBruna||0,
    despesas: despMes,
    material: k.custoMatBruna||0,
    get lucro(){ return this.vendido - this.despesas - this.material; }
  };
  // PARCEIROS: já vêm prontos de calc().parceiros
  const parceiros = (k.parceiros||[]);
  return {ym, bruna, parceiros, k};
}

function drawVendasCharts(){
  if(typeof Chart==='undefined') return;
  const {bruna, parceiros, k} = dadosVendas();
  const dark = document.body.classList.contains('dark');
  const tick = dark?'#b9b2a3':'#7a7264', grid = dark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)';
  // vendas por profissional (Bruna + cada parceiro)
  const labels=['Dra. Bruna', ...parceiros.map(p=>p.nome)];
  const vendas=[bruna.vendido, ...parceiros.map(p=>p.receita)];
  const c1=document.getElementById('vChVend');
  if(c1){ if(charts.vVend)charts.vVend.destroy(); charts.vVend=new Chart(c1,{type:'bar',
    data:{labels,datasets:[{data:vendas,backgroundColor:'#C9A24B',borderRadius:6,maxBarThickness:46}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>' '+BRL(c.parsed.y)}}},
      scales:{y:{grid:{color:grid},ticks:{color:tick,callback:v=>'R$ '+(v/1000)+'k'}},x:{grid:{display:false},ticks:{color:tick,font:{size:11}}}}}}); }
  // repasse x lucro do instituto (só parceiros)
  const c2=document.getElementById('vChRep');

        {label:'Repasse',data:parceiros.map(p=>p.repasse),backgroundColor:'#9A7B2E',borderRadius:5,maxBarThickness:40},

  }
}

function gerarPDF(){
  const k=calc();
  const on=id=>{const e=document.getElementById('rb_'+id);return e&&e.checked;};
  const grao=document.getElementById('rb_grao').value;
  const ref=document.getElementById('rb_ref').value||'';
  const hoje=new Date().toLocaleDateString('pt-BR');
  const sec=(t,inner)=>`<h2>${t}</h2>${inner}`;
  const tbl=(heads,rows)=>`<table><thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows}</tbody></table>`;
  let body='';

  if(on('resumo')){
    const cc=calcCaixa();
    const mesRef=ref&&/^\d{4}-\d{2}/.test(ref)?ref.slice(0,7):hcMesRef();
    const despMes=CAIXA.filter(l=>l.tipo==='despesa'&&l.data.slice(0,7)===mesRef);
    const custoOp=despMes.reduce((s,l)=>s+l.valor,0);
    const horaClin=(META.horasMes||176)?custoOp/(META.horasMes||176):0;
    // cards de destaque
    body+=`<div class="cards">
      <div class="card"><div class="cl">Faturamento</div><div class="cv">${BRL(k.faturamento)}</div></div>
      <div class="card"><div class="cl">Resultado da clínica</div><div class="cv" style="color:${cc.resultado>=0?'#2E7D4F':'#B23A3A'}">${BRL(cc.resultado)}</div></div>
      <div class="card"><div class="cl">Atendimentos</div><div class="cv">${k.nAtend}</div></div>
      <div class="card"><div class="cl">Ticket médio</div><div class="cv">${BRL(k.ticket)}</div></div>
      <div class="card"><div class="cl">Custo da hora clínica</div><div class="cv">${BRL(horaClin)}</div></div>
      <div class="card"><div class="cl">Saldo em caixa</div><div class="cv">${BRL(cc.saldoTotal)}</div></div>
    </div>`;
    body+=sec('Resumo executivo', tbl(['Indicador','Valor'],[
      ['Faturamento (receita de procedimentos)',BRL(k.faturamento)],
      ['Custo operacional do mês',BRL(custoOp)],
      ['Resultado da clínica (receita − despesa)',BRL(cc.resultado)],
      ['Margem',PCT(k.margem)],
      ['Ticket médio por atendimento',BRL(k.ticket)],
      ['Atendimentos realizados',k.nAtend],
      ['Taxa de comparecimento',PCT(k.txComp)],
      ['Conversão de leads',PCT(k.txConv)],
      ['Custo da hora clínica',BRL(horaClin)],
      ['Saldo total em caixa',BRL(cc.saldoTotal)]
    ].map(r=>`<tr><td>${r[0]}</td><td class="n">${r[1]}</td></tr>`).join('')));
  }
  if(on('faturamento')){
    body+=sec('Faturamento por procedimento', tbl(['Procedimento','Qtd','Receita','%'],
      k.porProc.map(p=>`<tr><td>${p.proc}</td><td class="n">${p.qtd}</td><td class="n">${BRL(p.receita)}</td><td class="n">${PCT0(p.share)}</td></tr>`).join('')));
    body+=sec('Faturamento por canal', tbl(['Canal','Receita'],
      k.porCanal.map(c=>`<tr><td>${c.canal}</td><td class="n">${BRL(c.receita)}</td></tr>`).join('')));
  }
  if(on('leads')){
    body+=sec('Leads e conversão', tbl(['Canal','Leads','Fechados','Conversão','Receita'],
      k.porCanal.map(c=>`<tr><td>${c.canal}</td><td class="n">${c.leads}</td><td class="n">${c.fechados}</td><td class="n">${PCT0(c.conv)}</td><td class="n">${BRL(c.receita)}</td></tr>`).join('')));
  }
  if(on('atendimentos')){
    body+=sec('Atendimentos do período', tbl(['Data','Paciente','Procedimento','Profissional','Valor','Status'],
      DATA.atendimentos.map(a=>`<tr><td>${fmtDate(a.data)}</td><td>${a.paciente}</td><td>${a.proc}</td><td>${a.func||'—'}</td><td class="n">${BRL(a.valor)}</td><td>${a.agenda}</td></tr>`).join('')));
  }
  if(on('comissoes')){
    const rows=METAS.map(m=>{const av=avaliarMeta(m);const T=TIPO_META[m.tipo];
      return `<tr><td>${funcNome(m.funcId)}</td><td>${T.label} (${m.escopo})</td><td class="n">${T.fmt(av.real)}</td><td>${av.atingida?av.atingida.nome:'—'}</td><td class="n">${BRL(av.bonus)}</td></tr>`;}).join('');
    body+=sec('Metas e bonificações', tbl(['Funcionário','Meta','Realizado','Faixa','Bônus'],rows));
  }
  if(on('caixa')){
    const cc=calcCaixa();
    const linhas=[
      ['Receita (procedimentos)',BRL(cc.receita)],
      ['Aportes (não-receita)',BRL(cc.aporte)],
      ['Despesas',BRL(cc.despesa)],
      ['Retiradas',BRL(cc.retirada)],
      ['Resultado da clínica (receita − despesa)',BRL(cc.resultado)],
      ['Saldo total em caixa',BRL(cc.saldoTotal)],
    ].map(r=>`<tr><td>${r[0]}</td><td class="n">${r[1]}</td></tr>`).join('');
    body+=sec('Fluxo de caixa', tbl(['Indicador','Valor'],linhas));
    const cart=CARTEIRAS.map(w=>`<tr><td>${w.nome}</td><td class="n">${BRL(cc.saldos[w.id])}</td></tr>`).join('');
    body+=sec('Saldo por carteira', tbl(['Carteira','Saldo atual'],cart));
  }
  if(on('custoop')){
    const mesRef=ref&&/^\d{4}-\d{2}/.test(ref)?ref.slice(0,7):hcMesRef();
    const despMes=CAIXA.filter(l=>l.tipo==='despesa'&&l.data.slice(0,7)===mesRef);
    const custoOp=despMes.reduce((s,l)=>s+l.valor,0);
    const horas=META.horasMes||176;
    const horaClin=horas?custoOp/horas:0;
    const atendMes=DATA.atendimentos.filter(a=>a.agenda==='Compareceu'&&a.data.slice(0,7)===mesRef);
    const porCat={}; despMes.forEach(l=>porCat[l.categoria]=(porCat[l.categoria]||0)+l.valor);
    const catRows=Object.entries(porCat).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<tr><td>${c}</td><td class="n">${BRL(v)}</td></tr>`).join('');
    body+=sec('Custo operacional & hora clínica', tbl(['Indicador','Valor'],[
      ['Custo operacional total do mês',BRL(custoOp)],
      ['Horas clínicas disponíveis',horas+'h'],
      ['Custo da hora clínica',BRL(horaClin)],
      ['Custo por atendimento',BRL(atendMes.length?custoOp/atendMes.length:0)]
    ].map(r=>`<tr><td>${r[0]}</td><td class="n">${r[1]}</td></tr>`).join('')));
    if(catRows) body+=sec('Composição do custo operacional', tbl(['Categoria','Valor'],catRows));
  }
  if(on('pacientes')){
    body+=sec('Pacientes', tbl(['Indicador','Valor'],[
      ['Total de pacientes',k.totalPacientes],['Recorrentes',k.pacRecorrentes],
      ['Taxa de recompra',PCT(k.txRecompra)],['Ticket médio por paciente',BRL(k.ltv)]
    ].map(r=>`<tr><td>${r[0]}</td><td class="n">${r[1]}</td></tr>`).join('')));
  }
  if(on('conformidade')){
    body+=sec('Conformidade', tbl(['Item','Responsável','Status'],
      DATA.conformidade.map(c=>`<tr><td>${c.item}</td><td>${c.resp}</td><td>${c.status}</td></tr>`).join('')));
  }

  const graoLabel={dia:'Diário',semana:'Semanal',mes:'Mensal',ano:'Anual'}[grao];
  const html=`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Relatório · Instituto Bruna Braga</title>
  <style>
    @page{margin:18mm}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Georgia,'Times New Roman',serif;color:#211C16;font-size:12px;line-height:1.5}
    .hd{border-bottom:3px solid #C9A24B;padding-bottom:14px;margin-bottom:22px}
    .hd .brand{font-size:24px;font-weight:700;color:#9A7B2E;letter-spacing:.5px}
    .hd .sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#8A8175;margin-top:4px}
    .hd .meta{margin-top:10px;font-size:11px;color:#555}
    h2{font-size:15px;color:#9A7B2E;border-bottom:1px solid #E8DEC8;padding-bottom:6px;margin:22px 0 10px}
    table{width:100%;border-collapse:collapse;margin-bottom:6px;font-family:Arial,sans-serif;font-size:11px}
    th{background:#211C16;color:#fff;text-align:left;padding:7px 9px;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
    td{padding:6px 9px;border-bottom:1px solid #eee}
    td.n,th.n{text-align:right}
    tr:nth-child(even) td{background:#FBF8F1}
    .ft{margin-top:30px;padding-top:12px;border-top:1px solid #E8DEC8;font-size:10px;color:#999;text-align:center}
    .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:6px 0 14px}
    .card{border:1px solid #E8DEC8;border-radius:8px;padding:12px 14px;background:#FBF8F1}
    .card .cl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:#8A8175;font-weight:bold}
    .card .cv{font-size:19px;font-weight:bold;color:#211C16;margin-top:4px;font-family:Georgia,serif}
  </style></head><body>
    <div class="hd">
      <div class="brand">Instituto Bruna Braga</div>
      <div class="sub">Harmonização Facial · Relatório Gerencial</div>

  </body></html>`;
  const w=window.open('','_blank');
  if(!w){alert('Permita pop-ups para gerar o relatório.');return;}

/* ============================ CONFIGURAÇÕES ============================ */
const CONFIG_LISTAS = {
  procedimentos:{label:'Procedimentos',desc:'Serviços oferecidos pela clínica',get:()=>PROCS,set:v=>{PROCS=v;}},
  plataformas:{label:'Plataformas de captação',desc:'Origens usadas no relatório de marketing',get:()=>PLATAFORMAS,set:v=>{PLATAFORMAS=v;}},
  func_tipos:{label:'Tipos de funcionário',desc:'Categorias da equipe',get:()=>FUNC_TIPOS,set:v=>{FUNC_TIPOS=v;}},
  canais:{label:'Canais de origem',desc:'De onde o paciente veio',get:()=>CANAIS,set:v=>{CANAIS=v;}},
};

function renderConfig(pg){
  const blocos=Object.entries(CONFIG_LISTAS).map(([chave,cfg])=>{
    const itens=cfg.get();
    const chips=itens.map(it=>`<span style="display:inline-flex;align-items:center;gap:7px;background:var(--cream);border:1px solid var(--line);border-radius:18px;padding:6px 14px;font-size:13px">${it}<span style="cursor:pointer;color:var(--grey);font-weight:600" onclick="delConfigItem('${chave}','${it.replace(/'/g,"\\'")}')">×</span></span>`).join('');
    return `<div class="panel" style="margin-bottom:18px">
      <div class="panel-head"><div><h3>${cfg.label}</h3><div class="ph-sub">${cfg.desc}</div></div></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">${chips||'<span style="color:var(--grey);font-size:13px">Nenhum item ainda.</span>'}</div>
      <div style="display:flex;gap:10px">
        <input id="cfg_${chave}" placeholder="Adicionar novo..." style="flex:1;max-width:300px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink)" onkeydown="if(event.key==='Enter')addConfigItem('${chave}')">
        <button class="btn" onclick="addConfigItem('${chave}')">Adicionar</button>
      </div>
    </div>`;
  }).join('');
  const fsm='padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;background:var(--paper);color:var(--ink)';
  // ---- metas da clínica POR MÊS ----
  if(!metaMesSel) metaMesSel = mesHoje();
  const metasMes = metasDoMes(metaMesSel);
  const kCalc = kDoMes(metaMesSel);
  // meses que têm metas + o mês atual + o selecionado, ordenados desc
  const mesesComMetas = Object.keys(METAS_POR_MES).filter(ym=>(METAS_POR_MES[ym]||[]).length);
  const setMeses = new Set([...mesesComMetas, mesHoje(), metaMesSel]);
  const mesesLista = [...setMeses].sort((a,b)=>b.localeCompare(a));
  const mesOpts = mesesLista.map(ym=>`<option value="${ym}" ${ym===metaMesSel?'selected':''}>${rotuloMes(ym)}${ym===mesHoje()?' (mês atual)':''}${(METAS_POR_MES[ym]||[]).length?'':' — vazio'}</option>`).join('');
  const mesAnt = mesAnterior(metaMesSel);
  const temMesAnterior = (METAS_POR_MES[mesAnt]||[]).length>0;
  // faixa de ação quando o mês está vazio
  const vazioMsg = (!metasMes.length) ? `
    <div style="background:var(--cream);border:1px dashed var(--gold-l);border-radius:12px;padding:16px;margin-bottom:14px">
      <div style="font-size:13.5px;margin-bottom:10px">Você ainda não definiu metas para <b>${rotuloMes(metaMesSel)}</b>. Como quer começar?</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${temMesAnterior?`<button class="btn" onclick="copiarMetasMesAnterior()">Copiar metas de ${rotuloMes(mesAnt)}</button>`:''}
        <button class="btn ghost" onclick="addMetaLivre()">Começar do zero</button>
      </div>
    </div>` : '';
  const linhasML=metasMes.map((m,i)=>{
    const T=META_TIPOS[m.tipo]||META_TIPOS.faturamento;
    const tipoOpts=Object.entries(META_TIPOS).map(([k,v])=>`<option value="${k}" ${k===m.tipo?'selected':''}>${v.label}</option>`).join('');
    let filtroUI='';
    if(T.filtravel && T.filtravel.length){
      const ftOpts=`<option value="todos" ${(!m.filtroTipo||m.filtroTipo==='todos')?'selected':''}>Toda a clínica</option>`+
        T.filtravel.map(f=>`<option value="${f}" ${m.filtroTipo===f?'selected':''}>${f==='procedimento'?'Por procedimento':'Por canal'}</option>`).join('');
      let valOpts='';
      if(m.filtroTipo==='procedimento'){ valOpts=`<select onchange="updMetaLivre(${i},'filtroValor',this.value)" style="${fsm};width:100%">`+PROCS.map(p=>`<option ${p===m.filtroValor?'selected':''}>${p}</option>`).join('')+`</select>`; }
      else if(m.filtroTipo==='canal'){ valOpts=`<select onchange="updMetaLivre(${i},'filtroValor',this.value)" style="${fsm};width:100%">`+CANAIS.map(c=>`<option ${c===m.filtroValor?'selected':''}>${c}</option>`).join('')+`</select>`; }
      filtroUI=`<div class="field" style="margin:0"><label>Aplicar a</label><select onchange="updMetaLivre(${i},'filtroTipo',this.value)" style="${fsm};width:100%">${ftOpts}</select></div>
        <div class="field" style="margin:0">${valOpts?`<label>Qual</label>${valOpts}`:''}</div>`;
    } else {
      filtroUI=`<div class="field" style="margin:0"><label>Aplicar a</label><input value="Toda a clínica" disabled style="${fsm};width:100%;opacity:.6"></div><div></div>`;
    }
    const realizado=valorMetaLivre(m,kCalc);
    const alvoNum = m.alvo||0;
    const alvoInput = T.pct
      ? `<input type="number" value="${m.alvo?Math.round(m.alvo*100):''}" oninput="updMetaLivre(${i},'alvoPct',this.value)" placeholder="ex: 90" style="${fsm};width:100%">`
      : `<input type="number" value="${m.alvo||''}" oninput="updMetaLivre(${i},'alvo',this.value)" placeholder="ex: 20000" style="${fsm};width:100%">`;
    const prog = alvoNum>0 ? realizado/alvoNum : 0;
    return `<div style="border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;background:var(--paper)">
      <div style="display:grid;grid-template-columns:1.6fr 1.2fr 1fr;gap:10px;align-items:end;margin-bottom:10px">
        <div class="field" style="margin:0"><label>Nome da meta</label><input value="${(m.nome||'').replace(/"/g,'&quot;')}" oninput="updMetaLivre(${i},'nome',this.value)" placeholder="ex: Faturamento Botox" style="${fsm};width:100%"></div>
        <div class="field" style="margin:0"><label>O que acompanhar</label><select onchange="updMetaLivre(${i},'tipo',this.value)" style="${fsm};width:100%">${tipoOpts}</select></div>
        <div class="field" style="margin:0"><label>Meta / alvo${T.pct?' (%)':(T.unidade?' ('+T.unidade+')':'')}</label>${alvoInput}</div>
      </div>
      <div style="display:grid;grid-template-columns:1.6fr 1.2fr 1fr auto;gap:10px;align-items:end">
        ${filtroUI}
        <button class="btn ghost" style="padding:8px 10px;font-size:12px" onclick="removeMetaLivre(${i})" title="Remover meta">remover</button>
      </div>
      <div style="margin-top:10px;font-size:12.5px;color:var(--grey)">Realizado em ${rotuloMes(metaMesSel)}: <b style="color:var(--ink)">${T.fmt(realizado)}</b>${alvoNum>0?` · ${PCT0(prog)} da meta`:' · defina o alvo'}</div>
    </div>`;
  }).join('');
  const ehMesAtual = metaMesSel===mesHoje();
  const metasLivres=`<div class="panel" style="margin-bottom:18px">
    <div class="panel-head"><div><h3>Metas da clínica</h3><div class="ph-sub">Metas por mês. Escolha o que acompanhar e o app calcula o realizado sozinho. Cada mês tem seu conjunto — selecione o mês para ver ou criar.</div></div></div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px">
      <span style="font-size:12.5px;color:var(--grey)">Mês das metas:</span>
      <select onchange="metaMesSel=this.value;go('config')" style="padding:8px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink);font-size:13px">${mesOpts}</select>
      ${ehMesAtual?'<span style="font-size:12px;color:var(--gold-d)">● acompanhando agora</span>':'<span style="font-size:12px;color:var(--grey)">consulta de outro mês</span>'}
    </div>
    ${vazioMsg}
    <div id="metasLivresBox">${linhasML}</div>
    ${metasMes.length?`<div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn ghost" style="padding:6px 12px;font-size:13px" onclick="addMetaLivre()">+ nova meta</button>
      <button class="btn" onclick="salvarMetasLivres()">Salvar metas de ${rotuloMes(metaMesSel)}</button>
    </div>`:''}
  </div>`;
  // ---- procedimentos com repasse (vinculados a uma profissional parceira) ----
  const fsp='padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;background:var(--paper);color:var(--ink)';
  const parceirasAtivas=(FUNCIONARIOS||[]).filter(f=>f.pele).map(f=>f.nome);
  const linhasPele=(PROCS_PELE||[]).map((p,i)=>{
    const lucro=Math.max(0,(+p.valor||0)-(+p.custo||0));
    const rep=lucro*(+p.repasse||0);
    const inst=lucro-rep;
    const ct=p.custoTipo||'fixado'; // 'fixado' | 'material'
    const profOpts=`<option value="">— escolher profissional —</option>`+parceirasAtivas.map(n=>`<option ${n===p.func?'selected':''}>${n}</option>`).join('');
    const custoLabel = ct==='material' ? 'Custo estimado (R$)' : 'Custo fixado (R$)';
    return `<div style="border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;background:var(--paper)">
      <div style="display:grid;grid-template-columns:1.6fr 1.4fr 1fr 1fr .8fr auto;gap:10px;align-items:end">
        <div class="field" style="margin:0"><label>Procedimento</label><input value="${(p.nome||'').replace(/"/g,'&quot;')}" oninput="updProcPele(${i},'nome',this.value)" placeholder="ex: Limpeza de pele" style="${fsp};width:100%"></div>
        <div class="field" style="margin:0"><label>Profissional</label><select onchange="updProcPele(${i},'func',this.value)" style="${fsp};width:100%">${profOpts}</select></div>
        <div class="field" style="margin:0"><label>Valor (R$)</label><input type="number" value="${p.valor||''}" oninput="updProcPele(${i},'valor',this.value)" placeholder="250" style="${fsp};width:100%"></div>
        <div class="field" style="margin:0"><label>${custoLabel}</label><input type="number" value="${p.custo||''}" oninput="updProcPele(${i},'custo',this.value)" placeholder="80" style="${fsp};width:100%"></div>
        <div class="field" style="margin:0"><label>Repasse (%)</label><input type="number" value="${p.repasse?Math.round(p.repasse*100):''}" oninput="updProcPele(${i},'repassePct',this.value)" placeholder="50" style="${fsp};width:100%"></div>
        <button class="btn ghost" style="padding:8px 10px;font-size:12px" onclick="removeProcPele(${i})" title="Remover">×</button>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap">
        <label style="font-size:12px;color:var(--grey)">Tipo de custo:</label>
        <select onchange="updProcPele(${i},'custoTipo',this.value)" style="${fsp};padding:6px 10px;font-size:13px">
          <option value="fixado" ${ct==='fixado'?'selected':''}>Fixado (valor definido aqui)</option>
          <option value="material" ${ct==='material'?'selected':''}>Material (gasto real lançado)</option>
        </select>
        <span style="font-size:11.5px;color:var(--grey);font-style:italic">${ct==='material'?'O custo real virá das compras lançadas em Material de Parceiros.':'O custo é sempre este valor por atendimento.'}</span>
      </div>
      <div style="margin-top:8px;font-size:12.5px;color:var(--grey)">${p.func?'':'<b style="color:var(--amber)">⚠ Escolha a profissional para este procedimento aparecer no atendimento dela. </b>'}Lucro: <b style="color:var(--ink)">${BRL(lucro)}</b> · Repasse: <b style="color:var(--amber)">${BRL(rep)}</b> · Instituto: <b style="color:var(--green)">${BRL(inst)}</b></div>
    </div>`;
  }).join('');
  const semParceiras = parceirasAtivas.length===0
    ? '<div style="font-size:12.5px;color:var(--amber);background:var(--amber-bg);border:1px solid var(--gold-l);border-radius:10px;padding:10px 12px;margin-bottom:12px">Você ainda não marcou ninguém como <b>profissional parceira</b>. Vá em <b>Cadastros → Funcionários</b>, edite a profissional e marque <b>"Profissional parceira (com repasse)? = Sim"</b>. Depois volte aqui para vincular os procedimentos a ela.</div>'
    : '';
  const peleBlock=`<div class="panel" style="margin-bottom:18px">
    <div class="panel-head"><div><h3>Procedimentos com repasse</h3><div class="ph-sub">Procedimentos de profissionais parceiras (qualquer área). Cada um é vinculado a uma profissional; o lucro (valor − custo) é dividido entre ela e o Instituto pela % de repasse.</div></div></div>
    ${semParceiras}
    <div id="procsPeleBox">${linhasPele||'<div style="font-size:13px;color:var(--grey);font-style:italic;margin-bottom:10px">Nenhum procedimento com repasse cadastrado.</div>'}</div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn ghost" style="padding:6px 12px;font-size:13px" onclick="addProcPele()">+ novo procedimento com repasse</button>
      <button class="btn" onclick="salvarProcsPele()">Salvar procedimentos</button>
    </div>
  </div>`;
  const palAtual=paletaAtual();
  const paletaBlock=`
    <div class="panel" style="margin-bottom:18px">
      <div class="panel-head"><div><h3>Aparência</h3><div class="ph-sub">Tema e paleta de cor de destaque do sistema</div></div></div>
      <div style="font-size:13px;color:var(--grey);margin-bottom:14px">Escolha a cor de destaque do app. Funciona junto com o tema claro/escuro (botão no topo).</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px">
        ${PALETAS.map(p=>`
          <button onclick="aplicarPaleta('${p.id}')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:2px solid ${p.id===palAtual?'var(--gold)':'var(--line)'};border-radius:12px;background:var(--paper);cursor:pointer;font-family:inherit;transition:.15s">
            <span style="width:22px;height:22px;border-radius:50%;background:${p.cor};flex-shrink:0;box-shadow:0 0 0 2px var(--paper),0 0 0 3px ${p.cor}40"></span>
            <span style="font-size:13px;color:var(--ink);font-weight:${p.id===palAtual?'600':'400'}">${p.nome}${p.id===palAtual?' ✓':''}</span>
          </button>`).join('')}
      </div>
    </div>`;
  pg.innerHTML=`
    ${paletaBlock}
    <div class="panel" style="margin-bottom:18px">
      <div class="panel-head"><div><h3>Configurações gerais</h3><div class="ph-sub">Crie e edite as listas do sistema — sem precisar mexer no código</div></div></div>
      <div style="font-size:13px;color:var(--grey);line-height:1.6">Tudo que você adicionar aqui aparece automaticamente nos formulários do sistema (atendimentos, captação, funcionários, etc.). ${MODO_NUVEM?'As alterações são salvas na nuvem.':'<b style="color:var(--amber)">Modo local:</b> as alterações valem só nesta sessão até conectar o Supabase.'}</div>
    </div>
    ${metasLivres}
    ${peleBlock}
    ${blocos}`;
}
// ---- procedimentos de pele ----
function addProcPele(){ PROCS_PELE.push({id:Date.now()+Math.random(),nome:'',func:'',valor:0,custo:0,repasse:0.5,custoTipo:'fixado'}); go('config'); }
function removeProcPele(i){ PROCS_PELE.splice(i,1); go('config'); }
function updProcPele(i,campo,val){
  if(!PROCS_PELE[i])return;
  if(campo==='nome'||campo==='func'||campo==='custoTipo') PROCS_PELE[i][campo]=val;
  else if(campo==='repassePct') PROCS_PELE[i].repasse=(+val||0)/100;
  else PROCS_PELE[i][campo]=+val||0;
  if(campo==='custoTipo') go('config'); // re-render p/ atualizar rótulos
}
async function salvarProcsPele(){
  PROCS_PELE=PROCS_PELE.filter(p=>(p.nome||'').trim());
  if(MODO_NUVEM){
    try{ const { data:{ user } } = await sb.auth.getUser();
      await sb.from('configuracoes').upsert({user_id:user.id,chave:'procs_pele',valores:PROCS_PELE},{onConflict:'user_id,chave'});
    }catch(e){ console.warn('procs_pele não salvo',e); }
  }
  window.__lastCalc=null; go('config'); toast('Procedimentos salvos');
}
// ---- metas da clínica (por mês, acompanhadas pelo app) ----
function metasMesSel(){ return metasDoMes(metaMesSel||mesHoje()); }
function addMetaLivre(){ metasMesSel().push({id:Date.now()+Math.random(),nome:'',tipo:'faturamento',alvo:0,filtroTipo:'todos',filtroValor:''}); go('config'); setTimeout(()=>{const b=document.getElementById('metasLivresBox');if(b)b.scrollIntoView({behavior:'smooth',block:'end'});},50); }
function removeMetaLivre(i){ metasMesSel().splice(i,1); go('config'); }
function copiarMetasMesAnterior(){
  const ant=mesAnterior(metaMesSel);
  const base=METAS_POR_MES[ant]||[];
  METAS_POR_MES[metaMesSel] = base.map(m=>({id:Date.now()+Math.random(),nome:m.nome,tipo:m.tipo,alvo:m.alvo,filtroTipo:m.filtroTipo||'todos',filtroValor:m.filtroValor||''}));
  go('config'); toast('Metas copiadas de '+rotuloMes(ant));
}
function updMetaLivre(i,campo,val){
  const arr=metasMesSel(); if(!arr[i])return;
  if(campo==='nome'||campo==='filtroValor'){ arr[i][campo]=val; }
  else if(campo==='alvo'){ arr[i].alvo=+val||0; }
  else if(campo==='alvoPct'){ arr[i].alvo=(+val||0)/100; }
  else if(campo==='tipo'){
    arr[i].tipo=val;
    const T=META_TIPOS[val]; if(!T||!T.filtravel||!T.filtravel.length){ arr[i].filtroTipo='todos'; arr[i].filtroValor=''; }
    go('config');
  }
  else if(campo==='filtroTipo'){
    arr[i].filtroTipo=val;
    if(val==='procedimento') arr[i].filtroValor=PROCS[0]||'';
    else if(val==='canal') arr[i].filtroValor=CANAIS[0]||'';
    else arr[i].filtroValor='';
    go('config');
  }
}
async function salvarMetasLivres(){
  // remove metas sem nome no mês selecionado
  METAS_POR_MES[metaMesSel] = metasMesSel().filter(m=>(m.nome||'').trim());
  // mantém o ponteiro do mês atual sincronizado
  METAS_LIVRES = metasDoMes(mesHoje());
  if(MODO_NUVEM){
    const { data:{ user } } = await sb.auth.getUser();
    await sb.from('configuracoes').upsert({user_id:user.id,chave:'metas_por_mes',valores:METAS_POR_MES},{onConflict:'user_id,chave'});
  }
  window.__lastCalc=null;
  go('config'); toast('Metas de '+rotuloMes(metaMesSel)+' salvas');
}
async function addConfigItem(chave){
  const inp=document.getElementById('cfg_'+chave);
  const val=inp.value.trim(); if(!val)return;
  const cfg=CONFIG_LISTAS[chave]; const arr=cfg.get();
  if(!arr.includes(val)){ arr.push(val); cfg.set(arr); await salvarConfig(chave); }
  go('config');
}
async function delConfigItem(chave,item){
  const cfg=CONFIG_LISTAS[chave]; let arr=cfg.get().filter(x=>x!==item);
  cfg.set(arr); await salvarConfig(chave); go('config');
}
async function salvarConfig(chave){
  if(!MODO_NUVEM)return;
  const valores=CONFIG_LISTAS[chave].get();
  const { data:{ user } } = await sb.auth.getUser();
  const { error } = await sb.from('configuracoes').upsert({user_id:user.id,chave,valores},{onConflict:'user_id,chave'});
  if(error)console.error('config save',error);
}

/* ============================ TEMA (claro/escuro) ============================ */
function aplicarTema(t){
  if(t==='light'){ document.body.classList.add('light'); }
  else { document.body.classList.remove('light'); }
  const lbl=document.getElementById('temaLabel');
  if(lbl) lbl.textContent = t==='light' ? 'Escuro' : 'Claro';
  // redesenha gráficos com as novas cores, se houver página com chart
  try{ if(typeof currentPage!=='undefined' && ['painel','custos','analise'].includes(currentPage)) go(currentPage); }catch(e){}
}
function alternarTema(){
  const atual = document.body.classList.contains('light') ? 'light' : 'dark';
  const novo = atual==='light' ? 'dark' : 'light';
  try{ localStorage.setItem('ibb_tema', novo); }catch(e){}
  aplicarTema(novo);
}
// aplica o tema salvo ao carregar
(function(){
  let t='dark';
  try{ t = localStorage.getItem('ibb_tema') || 'dark'; }catch(e){}
  window.addEventListener('DOMContentLoaded',()=>aplicarTema(t));
})();

/* ============================ PALETAS DE COR ============================ */
const PALETAS=[
  {id:'ouro',     nome:'Ouro',      cor:'#D8B468'},
  {id:'rose',     nome:'Rosé',      cor:'#E59CB0'},
  {id:'esmeralda',nome:'Esmeralda', cor:'#6FCFA0'},
  {id:'safira',   nome:'Safira',    cor:'#74AEEA'},
  {id:'ametista', nome:'Ametista',  cor:'#B596E4'},
  {id:'rubi',     nome:'Rubi',      cor:'#E68A93'},
  {id:'bronze',   nome:'Bronze',    cor:'#DBA06E'},
  {id:'grafite',  nome:'Grafite',   cor:'#9FB0C4'},
  {id:'turquesa', nome:'Turquesa',  cor:'#5FCBD2'},
  {id:'coral',    nome:'Coral',     cor:'#EF9870'},
];
function aplicarPaleta(id){
  PALETAS.forEach(p=>document.body.classList.remove('pal-'+p.id));
  document.body.classList.add('pal-'+id);
  try{ localStorage.setItem('ibb_paleta', id); }catch(e){}
  // re-render se estiver numa página com gráficos/seletor
  try{ if(typeof currentPage!=='undefined') go(currentPage); }catch(e){}
}
function paletaAtual(){
  try{ return localStorage.getItem('ibb_paleta') || 'ouro'; }catch(e){ return 'ouro'; }
}
(function(){

async function salvarMaterialParc(){
  const data=document.getElementById('mp_data').value;
  const profissional=document.getElementById('mp_prof').value;
  const descricao=document.getElementById('mp_desc').value.trim();
  const valor=+document.getElementById('mp_valor').value||0;
  if(!data || !profissional){ alert('Informe a data e a profissional.'); return; }
  if(valor<=0){ alert('Informe um valor maior que zero.'); return; }
  if(MODO_NUVEM){
    const novo=await sbInsert('material_parceiros',{data,profissional,descricao,valor});
    if(novo) await carregarTudo();
  } else {
    MATERIAL_PARC.push({id:'mp'+(MATPARC_SEQ++),data,profissional,descricao,valor});
  }
  go('materialparc');
}
async function excluirMaterialParc(id){
  if(!confirm('Excluir esta compra de material?')) return;
  if(MODO_NUVEM){ await sbDelete('material_parceiros',id); await carregarTudo(); }
  else { MATERIAL_PARC=MATERIAL_PARC.filter(m=>String(m.id)!==String(id)); }
  go('materialparc');
}

  if(HC_MES) return HC_MES;
  const datas=CAIXA.map(l=>l.data).filter(Boolean).sort();
  return datas.length? datas[datas.length-1].slice(0,7) : new Date().toISOString().slice(0,7);
}

      <div style="display:flex;align-items:center;gap:10px">
        <label style="font-size:12px;color:var(--grey)">Mês de referência</label>
        <select onchange="setHcMes(this.value)" style="padding:8px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink)">${mesOpts}</select>

    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="kpi" style="animation-delay:0ms"><div class="label">Custo operacional total</div><div class="val">${BRL(totalCusto)}</div><div class="meta">${desp.length} despesas no mês</div></div>
      <div class="kpi gold" style="animation-delay:70ms"><div class="label">Horas clínicas no mês</div><div class="val" style="color:var(--ink)">${horas}h</div><div class="meta">capacidade de atendimento</div></div>
      <div class="kpi" style="animation-delay:140ms"><div class="label">Custo da hora clínica</div><div class="val" style="color:var(--gold)">${BRL(horaClinica)}</div><div class="meta">por hora de atendimento</div></div>
      <div class="kpi" style="animation-delay:210ms"><div class="label">Custo por atendimento</div><div class="val">${BRL(custoPorAtend)}</div><div class="meta">${atendMes.length} atendimentos no mês</div></div>

// Demonstrativo de Resultado: separa Bruna x Pele, com custos discriminados.
// Respeita o período selecionado no topo. horaClinicaUnit = custo por hora (do mês de referência).
function dreBlock(horaClinicaUnit){
  const k=calc();
  const incluiHora = !!window.__dreHora;
  const dur = META.duracaoMedia||1;
  // custo de hora alocado a cada origem = horas usadas × custo/hora
  const horaBruna = incluiHora ? (k.nAtendBruna||0)*dur*horaClinicaUnit : 0;
  const horaPele  = incluiHora ? (k.nAtendPele||0)*dur*horaClinicaUnit : 0;
  // BRUNA: receita = fatBruna; custos = material + (opcional) hora; lucro = receita - custos
  const recBruna=k.fatBruna||0;
  const custoBruna=(k.custoMatBruna||0)+horaBruna;
  const lucroBruna=recBruna-custoBruna;
  // PELE: receita bruta; custos = material + hora; repasse; lucro Instituto = receita - material - hora - repasse
  const recPele=k.fatPeleBruto||0;
  const custoPeleMat=(k.custoMatPele||0)+horaPele;
  const repPele=k.repassePele||0;
  const lucroPele=recPele-custoPeleMat-repPele;
  // TOTAIS
  const recTot=recBruna+recPele;
  const custoTot=custoBruna+custoPeleMat;
  const lucroTot=lucroBruna+lucroPele;
  const col=(titulo,linhas,destaque)=>`
    <div style="flex:1;min-width:230px;background:var(--paper);border:1px solid ${destaque?'var(--gold-l)':'var(--line)'};border-radius:14px;padding:16px">
      <div style="font-family:var(--serif,'Cormorant Garamond',serif);font-size:19px;margin-bottom:10px">${titulo}</div>
      ${linhas.map(l=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:13.5px">
        <span style="color:${l.forte?'var(--ink)':'var(--grey)'};${l.forte?'font-weight:600':''}">${l.nome}</span>
        <span style="color:${l.cor||'var(--ink)'};${l.forte?'font-weight:700':''}">${l.neg?'− ':''}${BRL(Math.abs(l.val))}</span></div>`).join('')}
    </div>`;
  return `<div class="panel" style="margin-top:18px">
    <div class="panel-head"><div><h3>Demonstrativo de Resultado — ${rotuloMes(mesSelecionadoTopo()||mesHoje())}</h3>
      <div class="ph-sub">Receita, custos e lucro separados por origem. Respeita o mês selecionado no topo.</div></div></div>
    <label style="display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--grey);margin-bottom:14px;cursor:pointer">
      <input type="checkbox" ${incluiHora?'checked':''} onchange="window.__dreHora=this.checked;go('horaclinica')" style="width:16px;height:16px;accent-color:var(--gold-d)">
      Incluir custo de hora clínica (${BRL(horaClinicaUnit)}/h × ${dur}h por atendimento)
    </label>
    <div style="display:flex;gap:14px;flex-wrap:wrap">
      ${col('Dra. Bruna',[
        {nome:'Receita',val:recBruna,forte:true},
        {nome:'Custo de material',val:k.custoMatBruna||0,neg:true,cor:'var(--red)'},
        ...(incluiHora?[{nome:'Custo de hora clínica',val:horaBruna,neg:true,cor:'var(--red)'}]:[]),
        {nome:'Lucro',val:lucroBruna,forte:true,cor:lucroBruna>=0?'var(--green)':'var(--red)'}
      ])}
      ${col('Profissionais parceiros',[
        {nome:'Receita bruta',val:recPele,forte:true},
        {nome:'Custo de material',val:k.custoMatPele||0,neg:true,cor:'var(--red)'},
        ...(incluiHora?[{nome:'Custo de hora clínica',val:horaPele,neg:true,cor:'var(--red)'}]:[]),
        {nome:'Repasse à profissional',val:repPele,neg:true,cor:'var(--amber)'},
        {nome:'Lucro do Instituto',val:lucroPele,forte:true,cor:lucroPele>=0?'var(--green)':'var(--red)'}
      ])}
      ${col('Total do Instituto',[
        {nome:'Receita total',val:recTot,forte:true},
        {nome:'Custos totais',val:custoTot,neg:true,cor:'var(--red)'},
        {nome:'Repasses a profissionais',val:repPele,neg:true,cor:'var(--amber)'},
        {nome:'Lucro final',val:lucroTot,forte:true,cor:lucroTot>=0?'var(--green)':'var(--red)'}
      ],true)}
    </div>
    ${(k.parceiros&&k.parceiros.length)?`<div style="margin-top:18px;border-top:1px solid var(--line);padding-top:14px">
      <div style="font-family:var(--serif,'Cormorant Garamond',serif);font-size:18px;margin-bottom:4px">Repasse a pagar por profissional</div>
      <div class="ph-sub" style="margin-bottom:12px">O que cada parceiro gerou e quanto há a repassar no período — base para o pagamento dos colaboradores</div>
      <div style="overflow-x:auto">
        <table class="data"><thead><tr>
          <th>Profissional</th><th class="num">Atend.</th><th class="num">Receita gerada</th>
          <th class="num">Custo</th><th class="num">A repassar</th><th class="num">Fica p/ Instituto</th>
        </tr></thead><tbody>
        ${k.parceiros.map(p=>`<tr>
          <td>${p.nome}</td><td class="num">${p.qtd}</td>
          <td class="num">${BRL(p.receita)}</td>
          <td class="num" style="color:var(--red)">${BRL(p.custo)}</td>
          <td class="num" style="color:var(--amber);font-weight:600">${BRL(p.repasse)}</td>
          <td class="num" style="color:var(--green,#3b7a57)">${BRL(p.instituto)}</td>
        </tr>`).join('')}
        <tr style="border-top:2px solid var(--line);font-weight:700">
          <td>Total</td><td class="num">${k.nAtendPele}</td>
          <td class="num">${BRL(k.fatPeleBruto)}</td>
          <td class="num" style="color:var(--red)">${BRL(k.custoPele)}</td>
          <td class="num" style="color:var(--amber)">${BRL(k.repasseTotal)}</td>
          <td class="num" style="color:var(--green,#3b7a57)">${BRL(k.fatPeleInstituto)}</td>
        </tr>
        </tbody></table>
      </div>
    </div>`:''}
    <div style="font-size:12px;color:var(--grey);font-style:italic;margin-top:12px">
      <b>Como ler:</b> "Custo de material" vem da baixa de estoque (quantidade × custo unitário cadastrado). O repasse aos profissionais parceiros aparece como linha própria. A hora clínica é opcional — quando ligada, distribui o custo fixo da clínica (despesas ÷ horas do mês) pelos atendimentos de cada origem.
    </div>
  </div>`;
}
function mesAnoCurto(s){const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];const[y,m]=s.split('-');return meses[+m-1]+'/'+y;}
async function salvarHoras(){
  META.horasMes=+document.getElementById('hc_horas').value||176;
  if(MODO_NUVEM){
    const { data:{ user } } = await sb.auth.getUser();
    await sb.from('configuracoes').upsert({user_id:user.id,chave:'horas_mes',valores:{horas:META.horasMes}},{onConflict:'user_id,chave'});
  }
  go('horaclinica');
}

  if(!mesesDisp.includes(mesRef)) mesesDisp.unshift(mesRef);

  const contaCard=(c)=>{

  pg.innerHTML=`
    <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">

      <div class="kpi" style="animation-delay:70ms"><div class="label">Total a receber (em aberto)</div><div class="val" style="color:var(--green)">${BRL(aReceber)}</div><div class="meta">parcelas futuras</div></div>

    </div>

    <div class="panel" style="margin-bottom:18px">
      <div class="toolbar"><div><h3>Próximos vencimentos</h3><div class="ph-sub">Parcelas que vencem no mês selecionado</div></div>
        <div style="display:flex;align-items:center;gap:10px">
          <select onchange="setContasMes(this.value)" style="padding:8px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;background:var(--paper);color:var(--ink)">${mesOpts}</select>
          <button class="btn" onclick="abrirContaForm()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nova conta</button>

        ${prox.map(x=>{const vencido=x.parc.vencimento<hoje;return `<tr>
          <td style="${vencido?'color:var(--red);font-weight:600':''}">${fmtDate(x.parc.vencimento)}${vencido?' ⚠':''}</td>
          <td>${x.conta.descricao}</td><td class="ctr">${x.parc.n}/${x.conta.numParcelas}</td>
          <td class="ctr">${x.conta.tipo==='pagar'?'<span style="color:var(--red)">Pagar</span>':'<span style="color:var(--green)">Receber</span>'}</td>

      </tbody></table>
      <div style="margin-top:10px;font-size:12px;color:var(--grey)">Total do mês: <b>${BRL(prox.reduce((s,x)=>s+x.conta.valorParcela,0))}</b> em ${prox.length} parcela(s)</div>`

          <button class="${CONTAS_FILTRO==='receber'?'active':''}" onclick="setContasFiltro('receber')">A receber</button>
        </div>

      ${lista.length?lista.map(contaCard).join(''):'<div style="color:var(--grey);font-size:13px;padding:14px 0">Nenhuma conta cadastrada. Clique em "Nova conta".</div>'}

}
