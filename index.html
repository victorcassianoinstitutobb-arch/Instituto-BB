<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instituto Bruna Braga · Sistema de Gestão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  /* DARK (padrão) — grafite quente, menos preto puro, mais suave à vista */
  --black:#1E1B18; --ink:#F2EEE6; --gold:#D8B468; --gold-l:#EAD49A; --gold-d:#C09A4C;
  --ivory:#1A1815; --ivory2:#252119; --cream:#221F1A; --paper:#252220;
  --grey:#B0A899; --grey-l:#332E27; --line:#383229;
  --sage:#93A48F; --sage-bg:#202519;
  --green:#74B98C; --green-bg:#1B2A20; --red:#D9928A; --red-bg:#2E2019;
  --amber:#DAB163; --amber-bg:#2E2517;
  --shadow:0 1px 3px rgba(0,0,0,.25), 0 8px 28px rgba(0,0,0,.28);
  --shadow-sm:0 1px 2px rgba(0,0,0,.2);
  --radius:18px; --radius-sm:12px;
}
body.light{
  /* CLARO — off-white quente, dourado suave, sage; descansado e elegante */
  --black:#2B2620; --ink:#33302A; --gold:#B8923F; --gold-l:#D9BE7E; --gold-d:#8F6E2C;
  --ivory:#FBF9F5; --ivory2:#F1ECE3; --cream:#F6F2EA; --paper:#FFFFFF;
  --grey:#8A8175; --grey-l:#EDE8DF; --line:#E7E0D4;
  --sage:#6F8270; --sage-bg:#EDF1EC;
  --green:#4E7C5C; --green-bg:#EAF1EC; --red:#B5685F; --red-bg:#F6EBE9;
  --amber:#B0852F; --amber-bg:#F7EFDD;
  --shadow:0 1px 3px rgba(58,53,46,.05), 0 6px 20px rgba(58,53,46,.07);
  --shadow-sm:0 1px 2px rgba(58,53,46,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
/* ===== PALETAS — transformam destaque + fundos + superfícies (dark e light) ===== */
/* OURO (padrão, mantém o original) */
body.pal-ouro{ --gold:#D8B468; --gold-l:#EAD49A; --gold-d:#C09A4C; }
body.light.pal-ouro{ --gold:#B8923F; --gold-l:#D9BE7E; --gold-d:#8F6E2C; }
/* ROSÉ — fundo ameixa, destaque rosado */
body.pal-rose{ --gold:#E59CB0; --gold-l:#F3C4D2; --gold-d:#C9788F; --ivory:#1C1518; --ivory2:#271C20; --cream:#241A1E; --paper:#291D22; --line:#3D2C33; --black:#1C1518; }
body.light.pal-rose{ --gold:#C25E7C; --gold-l:#E3A2B6; --gold-d:#9E4862; --ivory:#FCF6F8; --ivory2:#F4E8ED; --cream:#FAF1F4; --paper:#FFFFFF; --line:#EBDCE2; }
/* ESMERALDA — fundo verde-escuro, destaque esmeralda */
body.pal-esmeralda{ --gold:#6FCFA0; --gold-l:#A6E4C6; --gold-d:#4DA97D; --ivory:#131915; --ivory2:#1C261F; --cream:#18211C; --paper:#1C2620; --line:#2C3A31; --black:#131915; }
body.light.pal-esmeralda{ --gold:#2F9468; --gold-l:#73C19E; --gold-d:#1F6E4B; --ivory:#F4FAF6; --ivory2:#E7F2EB; --cream:#EFF7F2; --paper:#FFFFFF; --line:#DBEAE0; }
/* SAFIRA — fundo azul-noite, destaque azul */
body.pal-safira{ --gold:#74AEEA; --gold-l:#A9CDF2; --gold-d:#4E89CC; --ivory:#131720; --ivory2:#1B2230; --cream:#171D2A; --paper:#1B2230; --line:#2A3550; --black:#131720; }
body.light.pal-safira{ --gold:#3A72BC; --gold-l:#7CA6DA; --gold-d:#27548F; --ivory:#F5F8FC; --ivory2:#E8EFF6; --cream:#EFF4FA; --paper:#FFFFFF; --line:#DCE6F1; }
/* AMETISTA — fundo violeta-escuro, destaque lilás */
body.pal-ametista{ --gold:#B596E4; --gold-l:#D3BFF0; --gold-d:#8E6BC8; --ivory:#171320; --ivory2:#211B30; --cream:#1C172A; --paper:#211B30; --line:#332A4E; --black:#171320; }
body.light.pal-ametista{ --gold:#7E54BC; --gold-l:#B18ADA; --gold-d:#5C3A92; --ivory:#F8F5FC; --ivory2:#EEE8F6; --cream:#F3EFFA; --paper:#FFFFFF; --line:#E5DCF1; }
/* RUBI — fundo bordô, destaque vermelho-rubi */
body.pal-rubi{ --gold:#E68A93; --gold-l:#F2B7BD; --gold-d:#C8636E; --ivory:#1E1416; --ivory2:#2B1B1E; --cream:#27191B; --paper:#2B1B1E; --line:#412A2E; --black:#1E1416; }
body.light.pal-rubi{ --gold:#B5404F; --gold-l:#D5818C; --gold-d:#8F2C3A; --ivory:#FDF5F6; --ivory2:#F6E7E9; --cream:#FBF0F1; --paper:#FFFFFF; --line:#EFD9DC; }
/* BRONZE — fundo terroso, destaque cobre */
body.pal-bronze{ --gold:#DBA06E; --gold-l:#EDC4A0; --gold-d:#BC7E4A; --ivory:#1C1611; --ivory2:#271E16; --cream:#241B14; --paper:#271E16; --line:#3C2E22; --black:#1C1611; }
body.light.pal-bronze{ --gold:#A5683A; --gold-l:#CC9A6C; --gold-d:#824D24; --ivory:#FBF7F2; --ivory2:#F2E9DE; --cream:#F8F1E8; --paper:#FFFFFF; --line:#EBDFD0; }
/* GRAFITE — fundo neutro frio, destaque prata-azulado */
body.pal-grafite{ --gold:#9FB0C4; --gold-l:#C6D2E0; --gold-d:#7C8DA2; --ivory:#14171A; --ivory2:#1D2227; --cream:#191D21; --paper:#1D2227; --line:#2E363F; --black:#14171A; }
body.light.pal-grafite{ --gold:#566373; --gold-l:#909BA9; --gold-d:#3B4654; --ivory:#F6F8FA; --ivory2:#EAEEF2; --cream:#F0F3F6; --paper:#FFFFFF; --line:#DEE4EA; }
/* TURQUESA — fundo petróleo, destaque turquesa */
body.pal-turquesa{ --gold:#5FCBD2; --gold-l:#9DE0E5; --gold-d:#3FA7AE; --ivory:#101A1B; --ivory2:#172627; --cream:#142122; --paper:#172627; --line:#243B3D; --black:#101A1B; }
body.light.pal-turquesa{ --gold:#1F8F97; --gold-l:#69BEC4; --gold-d:#136A70; --ivory:#F2FAFA; --ivory2:#E3F2F3; --cream:#EBF7F7; --paper:#FFFFFF; --line:#D5EAEB; }
/* CORAL — fundo terracota escuro, destaque coral vivo */
body.pal-coral{ --gold:#EF9870; --gold-l:#F7C0A2; --gold-d:#D0744A; --ivory:#1D1411; --ivory2:#291C16; --cream:#251914; --paper:#291C16; --line:#3F2C22; --black:#1D1411; }
body.light.pal-coral{ --gold:#C95A2E; --gold-l:#E48E63; --gold-d:#A0421C; --ivory:#FDF6F2; --ivory2:#F6E8DF; --cream:#FBF0E9; --paper:#FFFFFF; --line:#F0DCD0; }
body{font-family:'Inter',system-ui,sans-serif;background:var(--ivory);color:var(--ink);
  -webkit-font-smoothing:antialiased;line-height:1.55;transition:background .25s,color .25s}
.serif{font-family:'Cormorant Garamond',Georgia,serif}

/* ---------- App shell ---------- */
.app{display:flex;min-height:100vh}
.sidebar{width:248px;background:var(--black);color:var(--ivory);flex-shrink:0;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden}
.brand{padding:28px 24px 20px;border-bottom:1px solid rgba(201,162,75,.22);flex-shrink:0}
.brand .mark{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:700;
  color:var(--gold);line-height:1.05;letter-spacing:.3px}
.brand .sub{font-size:10px;letter-spacing:2.4px;color:var(--gold-l);margin-top:6px;text-transform:uppercase}
.nav{padding:16px 14px;display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto;overflow-x:hidden;min-height:0}
.nav::-webkit-scrollbar{width:6px}
.nav::-webkit-scrollbar-thumb{background:rgba(201,162,75,.3);border-radius:3px}
.nav::-webkit-scrollbar-track{background:transparent}
.nav button{display:flex;align-items:center;gap:13px;width:100%;padding:11px 14px;
  background:none;border:none;color:#CFC6B6;font-family:inherit;font-size:14px;
  border-radius:11px;cursor:pointer;transition:.18s;text-align:left}
.nav button svg{width:18px;height:18px;stroke-width:1.7;flex-shrink:0}
.nav button:hover{background:rgba(212,175,90,.14);color:#FFF8EC}
.nav button.active{background:var(--gold);color:var(--black);font-weight:600}
.nav .nav-label{font-size:10px;letter-spacing:1.8px;color:#6E6657;text-transform:uppercase;
  padding:14px 14px 6px}
.side-foot{padding:18px 22px;border-top:1px solid rgba(201,162,75,.18);font-size:11px;color:#7A7164;flex-shrink:0}
.side-foot b{color:var(--gold-l);font-weight:500}

/* ---------- Main ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:20px 36px;background:var(--paper);border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:20}
.topbar .title{font-family:'Cormorant Garamond',serif;font-size:27px;font-weight:600;color:var(--ink)}
.topbar .crumb{font-size:11px;letter-spacing:1.5px;color:var(--grey);text-transform:uppercase;margin-bottom:1px}
.period{display:flex;align-items:center;gap:10px}
.period select{font-family:inherit;font-size:13px;padding:9px 16px;border:1px solid var(--line);
  background:var(--cream);border-radius:10px;color:var(--ink);cursor:pointer;font-weight:500}
.content{padding:30px 36px 48px;max-width:1280px;width:100%}
.page{display:none;animation:fade .4s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ---------- KPI cards ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:26px}
.kpi{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px 22px;position:relative;overflow:hidden;box-shadow:var(--shadow);
  opacity:0;animation:rise .5s ease forwards}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold)}
.kpi.green::before{background:var(--green)} .kpi.ink::before{background:var(--ink)}
.kpi .label{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--grey);font-weight:500}
.kpi .val{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:600;line-height:1.1;margin:8px 0 4px}
.kpi.green .val{color:var(--green)} .kpi.neg .val{color:var(--red)}
.kpi .meta{font-size:12px;color:var(--grey);display:flex;align-items:center;gap:6px}
.kpi .meta .tag{font-weight:600}
.kpi .meta .tag.up{color:var(--green)} .kpi .meta .tag.down{color:var(--red)}
.kpi .meta .tag.gold{color:var(--gold-d)}

/* ---------- Panels ---------- */
.row{display:grid;gap:18px;margin-bottom:18px}
.row.two{grid-template-columns:1.15fr .85fr}
.row.two-eq{grid-template-columns:1fr 1fr}
.panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  padding:22px 24px;box-shadow:var(--shadow)}
.panel h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;margin-bottom:2px}
.panel .ph-sub{font-size:12px;color:var(--grey);margin-bottom:18px}
.panel-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.panel-head .ph-sub{margin-bottom:0}

/* ---------- Metas (progress) ---------- */
.meta-row{margin-bottom:16px}
.meta-row:last-child{margin-bottom:0}
.meta-row .mr-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.meta-row .mr-name{font-size:13px;font-weight:500;color:var(--ink)}
.meta-row .mr-vals{font-size:12px;color:var(--grey)}
.meta-row .mr-vals b{color:var(--ink);font-weight:600}
.bar{height:9px;background:var(--grey-l);border-radius:6px;overflow:hidden;position:relative}
.bar i{position:absolute;left:0;top:0;bottom:0;border-radius:6px;background:var(--gold);
  width:0;transition:width 1s cubic-bezier(.22,1,.36,1)}
.bar i.hit{background:var(--green)} .bar i.low{background:var(--red)}
.mr-pct{font-size:12px;font-weight:600;margin-left:8px}

/* ---------- DRE ---------- */
.dre-line{display:flex;justify-content:space-between;align-items:center;padding:11px 0;
  border-bottom:1px solid var(--grey-l);font-size:14px}
.dre-line:last-child{border-bottom:none}
.dre-line.total{border-top:2px solid var(--gold);margin-top:4px;font-weight:600;font-size:15px}
.dre-line .amt{font-variant-numeric:tabular-nums;font-weight:600}
.dre-line .amt.neg{color:var(--red)} .dre-line .amt.pos{color:var(--green)}

/* ---------- Charts ---------- */
.chart-wrap{position:relative;width:100%;height:260px}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:14px;font-size:12px;color:var(--grey)}
.legend span{display:flex;align-items:center;gap:6px}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

/* ---------- Tables ---------- */
table.data{width:100%;border-collapse:collapse;font-size:13px}
table.data th{text-align:left;font-size:10.5px;letter-spacing:1px;text-transform:uppercase;
  color:var(--grey);font-weight:600;padding:10px 12px;border-bottom:1px solid var(--line)}
table.data th.num,table.data td.num{text-align:right;font-variant-numeric:tabular-nums}
table.data th.ctr,table.data td.ctr{text-align:center}
table.data td{padding:11px 12px;border-bottom:1px solid var(--grey-l)}
table.data tr:last-child td{border-bottom:none}
table.data tbody tr{transition:.12s}
table.data tbody tr:hover{background:var(--cream)}
.pill{display:inline-block;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:600}
.pill.ok{background:var(--green-bg);color:var(--green)}
.pill.warn{background:var(--amber-bg);color:var(--amber)}
.pill.pend{background:var(--red-bg);color:var(--red)}
.minibar{height:6px;border-radius:4px;background:var(--gold);display:inline-block;vertical-align:middle}

/* ---------- Add row form ---------- */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.btn{font-family:inherit;font-size:13px;font-weight:500;padding:10px 18px;border-radius:10px;
  border:1px solid var(--gold-d);background:var(--gold);color:var(--black);cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;transition:.16s}
.btn:hover{background:var(--gold-d);color:var(--ivory)}
.btn.ghost{background:none;color:var(--ink);border-color:var(--line)}
.btn.ghost:hover{background:var(--cream);color:var(--ink)}
.btn svg{width:15px;height:15px;stroke-width:2}
.form-row{display:none;background:var(--cream);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:16px;margin-bottom:16px;gap:10px;flex-wrap:wrap;align-items:flex-end}
.form-row.open{display:flex;animation:fade .25s}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--grey);font-weight:600}
.field input,.field select{font-family:inherit;font-size:13px;padding:8px 11px;border:1px solid var(--line);
  border-radius:8px;background:var(--paper);color:var(--ink);min-width:120px}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,162,75,.15)}

.health{display:flex;align-items:center;gap:14px;background:var(--cream);border-radius:var(--radius-sm);
  padding:16px 20px;margin-bottom:18px;border:1px solid var(--line)}
.health .big{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:var(--green)}
.health .txt{font-size:13px;color:var(--grey)}
.health .txt b{color:var(--ink);font-weight:600}

@media(max-width:1080px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.row.two,.row.two-eq{grid-template-columns:1fr}.trend-grid{grid-template-columns:repeat(2,1fr)!important}}
@media(max-width:760px){
  /* sidebar vira menu deslizante */
  .sidebar{position:fixed;top:0;left:0;height:100vh;width:270px;max-width:84vw;z-index:100;
    transform:translateX(-100%);transition:transform .26s ease;box-shadow:0 0 40px rgba(0,0,0,.5)}
  body.menu-open .sidebar{transform:translateX(0)}
  #menuBtn{display:inline-flex!important}
  .content{padding:18px 14px 40px}
  .topbar{padding:14px 14px;flex-wrap:wrap;gap:12px}
  .topbar .title{font-size:21px}
  .period{flex-wrap:wrap;gap:8px;width:100%}
  .period select{flex:1;min-width:120px}
  /* tudo em coluna única */
  .kpi-grid,.trend-grid{grid-template-columns:1fr!important;gap:14px}
  .row.two,.row.two-eq,.row.three{grid-template-columns:1fr!important}
  /* tabelas com rolagem horizontal */
  .data{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
  .panel{padding:18px 16px}
  /* formulários em grade adaptam */
  .form-row{flex-direction:column;align-items:stretch}
  .form-row .field{width:100%}
  /* grids internos de formulários (lançamento, captação, atendimento) */
  [style*="grid-template-columns:repeat(4,1fr)"]{grid-template-columns:1fr 1fr!important}
  /* KPIs e cards com fonte um pouco menor */
  .kpi .val,.tcard .tc-val{font-size:26px}
  h3{font-size:17px}
}
@media(max-width:430px){
  [style*="grid-template-columns:repeat(4,1fr)"]{grid-template-columns:1fr!important}
  .topbar .title{font-size:19px}
  .kpi .val,.tcard .tc-val{font-size:24px}
}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
/* ---------- CRM trend cards ---------- */
.trend-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:22px}
.tcard{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  padding:20px 22px 16px;box-shadow:var(--shadow);opacity:0;animation:rise .5s ease forwards;position:relative;overflow:hidden}
.tcard .tc-head{display:flex;align-items:center;gap:10px;color:var(--grey);font-size:13px;font-weight:500;margin-bottom:10px}
.tcard .tc-ic{width:34px;height:34px;border-radius:9px;background:var(--cream);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tcard .tc-ic svg{width:17px;height:17px;stroke:var(--gold-d);stroke-width:1.8;fill:none}
.tcard .tc-val{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;line-height:1;margin-bottom:4px}
.tcard .tc-sub{font-size:12px;color:var(--grey);margin-bottom:10px}
.tcard .tc-spark{height:48px;margin:6px -4px 10px;position:relative}
.tcard .tag-cmp{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;
  padding:4px 11px;border-radius:20px}
.tag-cmp.up{background:var(--green-bg);color:var(--green)}
.tag-cmp.down{background:var(--red-bg);color:var(--red)}
.tag-cmp svg{width:12px;height:12px;stroke-width:2.5}

/* ---------- internal tabs ---------- */
.itabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:20px}
.itabs button{font-family:inherit;font-size:14px;font-weight:500;color:var(--grey);background:none;
  border:none;padding:11px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.16s}
.itabs button:hover{color:var(--ink)}
.itabs button.active{color:var(--gold-d);border-bottom-color:var(--gold)}
.itab-pane{display:none}.itab-pane.active{display:block;animation:fade .3s}

/* ---------- ranking ---------- */
.rank-list{display:flex;flex-direction:column;gap:2px}
.rank-row{display:flex;align-items:center;gap:13px;padding:10px 8px;border-radius:10px;transition:.12s}
.rank-row:hover{background:var(--cream)}
.rank-pos{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;background:var(--grey-l);color:var(--grey)}
.rank-row:nth-child(1) .rank-pos{background:var(--gold);color:var(--black)}
.rank-row:nth-child(2) .rank-pos{background:var(--gold-l);color:var(--gold-d)}
.rank-row:nth-child(3) .rank-pos{background:var(--ivory2);color:var(--gold-d)}
.rank-name{flex:1;font-size:13.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-val{font-size:13px;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums}
.rank-sub{font-size:11px;color:var(--grey)}

/* ---------- sidebar groups (collapsible) ---------- */
.nav-group>.ng-head{display:flex;align-items:center;gap:13px;width:100%;padding:11px 14px;background:none;

<script>
/* ============================================================
   Instituto Bruna Braga — Sistema de Gestão (protótipo web)
   Dados de exemplo. Estrutura pronta para conectar ao Supabase:
   troque os arrays DATA.* por consultas e mantenha calc()/render*.
   ============================================================ */

const BRL = n => 'R$ ' + Math.round(n).toLocaleString('pt-BR');
const BRL2 = n => n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const PCT = n => (n*100).toFixed(1).replace('.',',') + '%';
const PCT0 = n => Math.round(n*100) + '%';
// percentual que não vira "0%" quando há valor pequeno mas real
const PCTsmart = n => {
  const v = n*100;
  if(v===0) return '0%';
  if(v>0 && v<1) return (v<0.1 ? '<0,1%' : v.toFixed(1).replace('.',',')+'%');
  if(v>=1 && v<10) return v.toFixed(1).replace('.',',')+'%';
  return Math.round(v)+'%';
};

// ---- modal genérico ----
function abrirModal(html){ const c=document.getElementById('modalCard'); if(!c)return; c.innerHTML=html; document.getElementById('modalOverlay').style.display='flex'; }
function fecharModal(){ const o=document.getElementById('modalOverlay'); if(o)o.style.display='none'; }

// ---- drill-down: pacientes atendidos num bucket (dia/semana/mês do gráfico) ----
function verAtendimentosDoBucket(s){
  const datas = s.datas || [];
  const ats = DATA.atendimentos.filter(a=>a.agenda==='Compareceu' && datas.indexOf(a.data)>=0);
  // agrupa por paciente
  const porPac={};
  ats.forEach(a=>{ (porPac[a.paciente]=porPac[a.paciente]||[]).push(a); });
  const nomes=Object.keys(porPac).sort();
  const total=ats.reduce((sum,a)=>sum+a.valor,0);
  const linhas=nomes.map((nome,i)=>{
    const lista=porPac[nome];
    const valPac=lista.reduce((sum,a)=>sum+a.valor,0);
    const procs=lista.map(a=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid var(--line)">
      <span>${a.proc||'—'} <span style="color:var(--grey);font-size:11px">${fmtDate(a.data)}</span></span>
      <span style="color:var(--ink)">${BRL(a.valor)}</span></div>`).join('');
    return `<div style="border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden">
      <div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'" style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;cursor:pointer;background:var(--cream)">
        <span style="font-weight:600">${nome} <span style="color:var(--grey);font-size:12px;font-weight:400">· ${lista.length} proc.</span></span>
        <span><b>${BRL(valPac)}</b> <span style="color:var(--grey);font-size:11px">›</span></span>
      </div>
      <div style="display:none;padding:6px 14px 10px">${procs}</div>
    </div>`;
  }).join('');
  abrirModal(`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div><div style="font-family:var(--serif,'Cormorant Garamond',serif);font-size:22px">Atendimentos · ${s.chave}</div>
      <div style="font-size:12.5px;color:var(--grey)">${ats.length} atendimento(s) · ${nomes.length} paciente(s) · receita ${BRL(total)}</div></div>
      <button class="btn ghost" style="padding:5px 12px;font-size:13px" onclick="fecharModal()">✕</button>
    </div>
    <div style="font-size:12px;color:var(--grey);margin-bottom:12px">Clique num paciente para ver os procedimentos.</div>
    ${linhas||'<div style="color:var(--grey);font-size:13px;padding:10px 0">Nenhum atendimento neste período.</div>'}
  `);
}

let META = {
  faturamento:0, ticket:0, comparecimento:0, ocupacao:0,
  conversao:0, imposto:0.06, horasMes:176, duracaoMedia:1.0,
  comissaoPercent:0.30, comissaoBase:'bruto', profissionalPadrao:'Dra. Bruna Braga'
};
// Metas da clínica, organizadas POR MÊS. Cada meta:
//   {id, nome, tipo, alvo, filtroTipo:'todos'|'procedimento'|'canal', filtroValor}
// O "realizado" é calculado pelo app a partir de calc() — o usuário não digita.
// METAS_POR_MES = { '2026-06': [meta, ...], '2026-05': [...] }
let METAS_POR_MES = {};
let METAS_LIVRES = [];          // metas do mês atualmente selecionado na tela (ponteiro)
let metaMesSel = null;          // 'AAAA-MM' do mês sendo visto/editado nas Configurações
// retorna a chave de mês atual (AAAA-MM)
function mesHoje(){ return new Date().toISOString().slice(0,7); }
// lê o seletor de período do topo (ex: "Maio 2026") e converte para 'AAAA-MM'.
// retorna null quando é "Acumulado" (ou não há mês reconhecível).
function mesSelecionadoTopo(){
  const el=document.getElementById('periodSel'); if(!el) return mesHoje();
  const txt=(el.value||el.options[el.selectedIndex]&&el.options[el.selectedIndex].text||'').trim();
  const meses={'janeiro':'01','fevereiro':'02','março':'03','marco':'03','abril':'04','maio':'05','junho':'06','julho':'07','agosto':'08','setembro':'09','outubro':'10','novembro':'11','dezembro':'12'};
  const m=txt.toLowerCase().match(/([a-zç]+)\s+(\d{4})/);
  if(m && meses[m[1]]) return m[2]+'-'+meses[m[1]];
  return null; // "Acumulado" ou desconhecido
}
// intervalo [ini,fim] do período selecionado no topo. Mês → aquele mês; Acumulado → ano todo.
function periodoSelecionadoIntervalo(){
  const el=document.getElementById('periodSel');
  const txt = el ? ((el.value||(el.options[el.selectedIndex]&&el.options[el.selectedIndex].text)||'').trim()) : '';
  // "Acumulado 2026" → ano inteiro
  const mAcum = txt.toLowerCase().match(/acumulado\s+(\d{4})/);
  if(mAcum){ const y=mAcum[1]; return {ini:y+'-01-01', fim:y+'-12-31', acumulado:true}; }
  const ym = mesSelecionadoTopo();
  if(ym){ return {ini:ym+'-01', fim:ym+'-31', acumulado:false}; }
  // sem seletor reconhecível → não filtra (mostra tudo)
  return null;
}
// metas de um mês específico (array; cria vazio se não existir)
function metasDoMes(ym){ if(!METAS_POR_MES[ym]) METAS_POR_MES[ym]=[]; return METAS_POR_MES[ym]; }
// rótulo amigável do mês (ex: "Junho 2026")
function rotuloMes(ym){
  const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const [a,m]=ym.split('-'); return meses[+m-1]+' '+a;
}
// mês imediatamente anterior
function mesAnterior(ym){ const [a,m]=ym.split('-').map(Number); const d=new Date(a,m-1,1); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,7); }
// preenche o seletor de período do topo dinamicamente (mês atual no topo + meses anteriores + acumulado)
function preencherSeletorMes(){
  const el=document.getElementById('periodSel'); if(!el) return;
  const anterior = el.value || ''; // preserva escolha do usuário se possível
  const hoje=mesHoje();            // 'AAAA-MM' do mês atual real
  const anoAtual=hoje.slice(0,4);
  // reúne os meses que têm algum dado, + o mês atual, + últimos 12 meses
  const comDados=new Set();
  try{
    (DATA.atendimentos||[]).forEach(a=>{ if(a.data) comDados.add(a.data.slice(0,7)); });
    (CAIXA||[]).forEach(l=>{ if(l.data) comDados.add(l.data.slice(0,7)); });
  }catch(e){}
  const set=new Set([hoje]);
  // últimos 12 meses a partir de hoje
  let cur=hoje;
  for(let i=0;i<12;i++){ set.add(cur); cur=mesAnterior(cur); }
  comDados.forEach(m=>set.add(m));
  // ordena do mais recente para o mais antigo
  const meses=[...set].sort((a,b)=>b.localeCompare(a));
  // monta as opções: cada mês + "Acumulado <ano>" para os anos presentes
  const anos=[...new Set(meses.map(m=>m.slice(0,4)))].sort((a,b)=>b.localeCompare(a));
  let html='';
  meses.forEach(m=>{ html+=`<option value="${rotuloMes(m)}">${rotuloMes(m)}${m===hoje?' (atual)':''}</option>`; });
  anos.forEach(y=>{ html+=`<option value="Acumulado ${y}">Acumulado ${y}</option>`; });
  el.innerHTML=html;
  // seleciona: o que o usuário tinha, senão o mês atual
  const alvo = anterior || (rotuloMes(hoje));
  [...el.options].forEach(o=>{ if(o.value===alvo) o.selected=true; });
  // se o alvo não existir (ex: primeiro load), cai no mês atual
  if(!el.value) el.selectedIndex=0;
}
// tipos de indicador disponíveis para uma meta
const META_TIPOS = {
  faturamento:   {label:'Faturamento',        unidade:'R$', fmt:v=>BRL(v),  filtravel:['procedimento','canal']},
  atendimentos:  {label:'Nº de atendimentos', unidade:'',   fmt:v=>Math.round(v)+'',  filtravel:['procedimento','canal']},
  ticket:        {label:'Ticket médio',       unidade:'R$', fmt:v=>BRL(v),  filtravel:[]},
  leads:         {label:'Leads captados',     unidade:'',   fmt:v=>Math.round(v)+'',  filtravel:['canal']},
  comparecimento:{label:'Comparecimento (%)', unidade:'%',  fmt:v=>PCT0(v), filtravel:[], pct:true},
  conversao:     {label:'Conversão de leads (%)',unidade:'%',fmt:v=>PCT0(v), filtravel:[], pct:true},
  ocupacao:      {label:'Ocupação (%)',       unidade:'%',  fmt:v=>PCT0(v), filtravel:[], pct:true},
  lucro:         {label:'Lucro do período',   unidade:'R$', fmt:v=>BRL(v),  filtravel:[]}
};
// calcula o valor REALIZADO de uma meta a partir do resultado de calc()
function valorMetaLivre(m, k){
  const ft=m.filtroTipo||'todos';
  const fv=m.filtroValor;
  switch(m.tipo){
    case 'faturamento':
      if(ft==='procedimento'){ const p=(k.porProc||[]).find(x=>x.proc===fv); return p?p.receita:0; }
      if(ft==='canal'){ const c=(k.porCanal||[]).find(x=>x.canal===fv); return c?c.receita:0; }
      return k.faturamento;
    case 'atendimentos':
      if(ft==='procedimento'){ const p=(k.porProc||[]).find(x=>x.proc===fv); return p?p.qtd:0; }
      if(ft==='canal'){ const c=(k.porCanal||[]).find(x=>x.canal===fv); return c?(c.qtd||c.atend||0):0; }
      return k.nAtend;
    case 'ticket':        return k.ticket;
    case 'leads':
      if(ft==='canal'){ return contaLeadsCanal(fv); }
      return k.nLeads;
    case 'comparecimento':return k.txComp;
    case 'conversao':     return k.txConv;
    case 'ocupacao':      return k.txOcup;
    case 'lucro':         return k.lucro;
    default: return 0;
  }
}
function contaLeadsCanal(canal){
  // leads por canal a partir da captação (plataforma) — soma o campo leads
  try{ return (CAPTACAO||[]).filter(c=>c.plataforma===canal).reduce((s,c)=>s+(+c.leads||0),0); }
  catch(e){ return 0; }
}
// calcula os indicadores necessários para as metas, restritos a um mês (AAAA-MM)
function kDoMes(ym){
  const ini=ym+'-01';
  const fim=ym+'-31';
  const comp=DATA.atendimentos.filter(a=>a.agenda==='Compareceu' && a.data>=ini && a.data<=fim);
  const faturamento=comp.reduce((s,a)=>s+(+a.valor||0),0);
  const custo=comp.reduce((s,a)=>s+(+a.custo||0),0);
  const nAtend=comp.length;
  const ticket=nAtend?faturamento/nAtend:0;
  const totAgenda=DATA.atendimentos.filter(a=>a.data>=ini&&a.data<=fim).length;
  const txComp=totAgenda?nAtend/totAgenda:0;
  // contagem de procedimentos reais (lista de cada atendimento)
  const _cont={};
  comp.forEach(a=>{ const lista=procedimentosDe(a); if(lista.length){ lista.forEach(p=>{ if(p.proc)_cont[p.proc]=(_cont[p.proc]||0)+1; }); } else if(a.proc){ _cont[a.proc]=(_cont[a.proc]||0)+1; } });
  const porProc=(PROCS||[]).map(p=>({proc:p,
    qtd:_cont[p]||0,
    receita:comp.filter(a=>a.proc===p).reduce((s,a)=>s+a.valor,0)}));
  const porCanal=(CANAIS||[]).map(c=>({canal:c,
    qtd:comp.filter(a=>a.canal===c).length,
    receita:comp.filter(a=>a.canal===c).reduce((s,a)=>s+a.valor,0)}));
  // leads e conversão do mês a partir da captação
  const capt=(CAPTACAO||[]).filter(c=>c.data>=ini && c.data<=fim);
  const nLeads=capt.reduce((s,c)=>s+(+c.leads||0),0);
  const nAgend=capt.reduce((s,c)=>s+(+c.agendadas||0),0);
  const txConv=nLeads?nAgend/nLeads:0;
  const imposto=faturamento*(META.imposto||0);
  const lucro=faturamento-custo-imposto;
  const horas=nAtend*(META.duracaoMedia||1);
  const txOcup=META.horasMes?horas/META.horasMes:0;
  return {faturamento,ticket,nAtend,txComp,txConv,txOcup,nLeads,lucro,porProc,porCanal,_ym:ym};
}

let META_MES = null; // AAAA-MM de referência das metas
function metaMesRef(){
  if(META_MES) return META_MES;
  const datas=DATA.atendimentos.map(a=>a.data).filter(Boolean).sort();
  return datas.length? datas[datas.length-1].slice(0,7) : new Date().toISOString().slice(0,7);
}
function setMetaMes(v){ META_MES=v; go('comissoes'); }

// filtra registros pelo mês de referência (e opcionalmente por semana do mês)
function filtroPeriodoMeta(data, periodo){
  const mesRef=metaMesRef();
  if(data.slice(0,7)!==mesRef) return false;
  return true; // mensal: todo o mês; semanal é tratado na agregação por semana
}

function realizadoMeta(meta){
  const tipo = meta.tipo;
  const mesRef=metaMesRef();
  if(meta.escopo==='geral'){
    if(tipo==='faturamento') return DATA.atendimentos.filter(a=>a.agenda==='Compareceu'&&a.data.slice(0,7)===mesRef).reduce((s,a)=>s+a.valor,0);
    if(tipo==='leads') return CAPTACAO.filter(c=>c.data.slice(0,7)===mesRef).reduce((s,c)=>s+(c.leads||0),0);
    if(tipo==='agendamentos') return DATA.atendimentos.filter(a=>a.agenda==='Compareceu'&&a.data.slice(0,7)===mesRef).length;
    return 0;
  }
  const nome = funcNome(meta.funcId);
  const at = DATA.atendimentos.filter(a=>a.func===nome && a.agenda==='Compareceu' && a.data.slice(0,7)===mesRef);
  if(tipo==='faturamento') return at.reduce((s,a)=>s+a.valor,0);
  if(tipo==='agendamentos') return at.length;
  if(tipo==='leads') return CAPTACAO.filter(c=>c.data.slice(0,7)===mesRef).reduce((s,c)=>s+(c.leads||0),0);
  return 0;
}

// para metas semanais: retorna o realizado de cada semana do mês de referência
function realizadoPorSemana(meta){
  const mesRef=metaMesRef();
  const tipo=meta.tipo;
  const semanas=[1,2,3,4,5];
  const nome= meta.escopo==='individual'? funcNome(meta.funcId): null;
  return semanas.map(sem=>{
    const filtraSemana=(data)=>{
      if(data.slice(0,7)!==mesRef) return false;
      const dia=parseInt(data.slice(8,10),10);
      return Math.ceil(dia/7)===sem;
    };
    let val=0;
    if(tipo==='faturamento'||tipo==='agendamentos'){
      let at=DATA.atendimentos.filter(a=>a.agenda==='Compareceu'&&filtraSemana(a.data));
      if(nome) at=at.filter(a=>a.func===nome);
      val= tipo==='faturamento'? at.reduce((s,a)=>s+a.valor,0): at.length;
    } else if(tipo==='leads'){
      val=CAPTACAO.filter(c=>filtraSemana(c.data)).reduce((s,c)=>s+(c.leads||0),0);
    }
    return {sem, val};
  }).filter(s=>true);
}

// dada uma meta, retorna a faixa mais alta atingida (ou null) e o bônus em R$
function avaliarMeta(meta){
  const real = realizadoMeta(meta);
  // faixas em ordem crescente de alvo; pega a mais alta cujo alvo foi atingido
  const ordenadas = [...meta.faixas].sort((a,b)=>a.alvo-b.alvo);
  let atingida = null;
  ordenadas.forEach(f=>{ if(real>=f.alvo) atingida=f; });
  let bonus = 0;
  if(atingida){
    bonus = atingida.bonus.tipo==='fixo'
      ? atingida.bonus.valor
      : real * (atingida.bonus.valor/100);
  }
  // próxima faixa (para mostrar "falta X para...")
  const proxima = ordenadas.find(f=>real<f.alvo) || null;
  return {real, atingida, bonus, proxima, ordenadas};
}
function bonusLabel(b){
  return b.tipo==='fixo' ? BRL(b.valor) : b.valor+'% do atingido';
}

/* ===== Procedimentos de pele (profissional com repasse) ===== */
// Cada um: {id, nome, valor (venda), custo (estimado), repasse (% que vai para a profissional, 0..1)}
// Lucro = valor - custo. Repasse à profissional = lucro * repasse. Fica p/ Instituto = lucro - repasse.
let PROCS_PELE = [];
// é um atendimento "de pele"? (feito por uma funcionária marcada como profissional de pele)
function funcEhPele(nome){
  const f=(FUNCIONARIOS||[]).find(x=>x.nome===nome);
  return !!(f && f.pele);
}
// dados do procedimento de pele pelo nome
function procPeleDe(nome){ return (PROCS_PELE||[]).find(p=>p.nome===nome); }
// calcula o rateio de um atendimento de pele (a partir do valor real do atendimento)
// retorna {lucro, repasse, instituto}. Se não achar custo cadastrado, custo=0.
function rateioPele(a){
  const valor=+a.valor||0;
  // custo: soma dos custos cadastrados dos procedimentos do atendimento (ou 0)
  let custo=0, repPct=0, achou=false;
  procedimentosDe(a).forEach(p=>{
    const pp=procPeleDe(p.proc);
    if(pp){ custo+=(+pp.custo||0); repPct=(+pp.repasse||0); achou=true; }
  });
  if(!achou){ const pp=procPeleDe(a.proc); if(pp){ custo=+pp.custo||0; repPct=+pp.repasse||0; } }
  const lucro=Math.max(0,valor-custo);
  const repasse=lucro*repPct;
  const instituto=lucro-repasse;
  return {valor,custo,lucro,repasse,instituto,repPct};
}

/* ===== Estoque ===== */
// Produtos = cadastro fixo (sem saldo perpétuo). O saldo é MENSAL:
//   ESTOQUE_MES[ym][produtoId] = saldo inicial lançado para aquele mês
// O consumo do mês é calculado a partir dos atendimentos (procedimentos que abatem produto).
// Saldo atual do mês = saldo inicial − consumido no mês.
let ESTOQUE = [];          // [{id, produto, unidade, minimo, custoUnit}]
// ESTOQUE_MES[ym][pid] pode ser:
//   - número (formato antigo): saldo inicial direto
//   - {sobra, compra} (novo): sobra do mês anterior + compras do mês
let ESTOQUE_MES = {};
let EST_SEQ = 1;
let EST_MOV = [];
let MOV_SEQ = 1;
const UNIDADES = ['un','ml','frasco','caixa','ampola','seringa','kit'];
// helpers que entendem os dois formatos
function regMes(pid, ym){ const r=(ESTOQUE_MES[ym]||{})[pid]; if(r==null) return null; return (typeof r==='object')?r:{sobra:0, compra:+r||0}; }
function sobraLancada(pid, ym){ const r=regMes(pid,ym); return r?(+r.sobra||0):0; }
function compraMes(pid, ym){ const r=regMes(pid,ym); return r?(+r.compra||0):0; }
// saldo inicial = sobra do mês anterior (lançada) + compras do mês
function saldoInicialMes(pid, ym){ const r=regMes(pid,ym); return r?((+r.sobra||0)+(+r.compra||0)):0; }
// consumo de um produto num mês — calculado DIRETO dos procedimentos dos atendimentos
// comparecidos do mês (fonte real). Assim não depende de baixaAplicada estar gravado.
function consumoMes(pid, ym){
  let t=0;
  DATA.atendimentos.forEach(a=>{
    if((a.data||'').slice(0,7)!==ym) return;
    if(a.agenda!=='Compareceu') return;
    const procs = procedimentosDe(a);
    if(procs.length){
      procs.forEach(p=>{ if(p.modo==='produto' && String(p.produtoId)===String(pid) && p.qtd>0) t+=+p.qtd||0; });
    } else if(a.baixaAplicada && typeof a.baixaAplicada==='object' && a.baixaAplicada[pid]){
      t+=+a.baixaAplicada[pid]||0;
    }
  });
  return t;
}
// saldo atual de um produto num mês = inicial − consumido
function saldoAtualMes(pid, ym){ return saldoInicialMes(pid,ym) - consumoMes(pid,ym); }
// grava um componente (sobra ou compra) preservando o outro
function setRegMes(pid, ym, campo, val){
  if(!ESTOQUE_MES[ym]) ESTOQUE_MES[ym]={};
  const atual=regMes(pid,ym)||{sobra:0,compra:0};
  atual[campo]=+val||0;
  ESTOQUE_MES[ym][pid]=atual;
}

/* ---------- calc engine ---------- */
function calc(){
  // filtra os dados pelo período selecionado no topo (mês ou acumulado do ano)
  const _per = (typeof periodoSelecionadoIntervalo==='function') ? periodoSelecionadoIntervalo() : null;
  const _dentro = (d)=> !_per || (d && d>=_per.ini && d<=_per.fim);

  const ld = DATA.leads.filter(l=>_dentro(l.data));
  const cs = DATA.custos.filter(c=>_dentro(c.data));
  const compareceu = at.filter(a=>a.agenda==='Compareceu');
  const faturamento = compareceu.reduce((s,a)=>s+a.valor,0); // bruto total (tudo que entrou)
  // ---- separação Bruna x Pele (profissional com repasse) ----
  const atendPele = compareceu.filter(a=>funcEhPele(a.func));
  const atendBruna = compareceu.filter(a=>!funcEhPele(a.func));
  const fatBruna = atendBruna.reduce((s,a)=>s+a.valor,0);
  const fatPeleBruto = atendPele.reduce((s,a)=>s+a.valor,0);
  let repassePele=0, fatPeleInstituto=0, custoPele=0;
  atendPele.forEach(a=>{ const r=rateioPele(a); repassePele+=r.repasse; fatPeleInstituto+=r.instituto; custoPele+=r.custo; });
  // faturamento que de fato fica para o Instituto = Bruna (cheio) + parte do Instituto na pele
  const fatInstituto = fatBruna + fatPeleInstituto;
  // ---- agrupamento POR PROFISSIONAL PARCEIRO (generaliza "pele" p/ qualquer parceiro com repasse) ----
  // cada parceiro: { nome, qtd, receita (bruta), custo, repasse (a pagar), instituto (fica p/ clínica) }
  const _parcMap={};
  atendPele.forEach(a=>{
    const nome=a.func||'—';
    const r=rateioPele(a);
    if(!_parcMap[nome]) _parcMap[nome]={nome, qtd:0, receita:0, custo:0, repasse:0, instituto:0};
    const p=_parcMap[nome];
    p.qtd+=1; p.receita+=r.valor; p.custo+=r.custo; p.repasse+=r.repasse; p.instituto+=r.instituto;
  });
  const parceiros = Object.values(_parcMap).sort((a,b)=>b.receita-a.receita);
  const repasseTotal = repassePele; // total a repassar a todos os parceiros no período
  // ---- custo dos parceiros por TIPO (fixado vs material), conforme cadastro do procedimento ----
  // custoFixadoParc: soma dos custos cadastrados dos procedimentos do tipo 'fixado'
  // algumProcMaterial: se algum procedimento de parceiro no período é do tipo 'material'

  // ---- custo REAL de material (a partir do consumo × custo unitário do estoque) ----
  const custoUnitDe = pid => { const e=(ESTOQUE||[]).find(x=>x.id==pid); return e?(+e.custoUnit||0):0; };
  const custoMaterialAtend = a => {
    let c=0; procedimentosDe(a).forEach(p=>{ if(p.modo==='produto' && p.produtoId && p.qtd>0) c+=p.qtd*custoUnitDe(p.produtoId); });
    return c;
  };
  const custoMatBruna = atendBruna.reduce((s,a)=>s+custoMaterialAtend(a),0);
  const custoMatPele  = atendPele.reduce((s,a)=>s+custoMaterialAtend(a),0);
  const custoMaterial = custoMatBruna + custoMatPele;
  const pagantes = compareceu.filter(a=>a.valor>0).length;
  const ticket = pagantes ? faturamento/pagantes : 0;
  const custoInsumo = compareceu.reduce((s,a)=>s+a.custo,0);
  // DESPESAS REAIS = lançamentos de despesa do Livro-Caixa no período (fonte de verdade).
  // (DATA.custos fica vazio no modo nuvem; as despesas reais vivem no CAIXA.)
  const despesasCaixa = (typeof CAIXA!=='undefined' && Array.isArray(CAIXA))
    ? CAIXA.filter(l=>l.tipo==='despesa' && _dentro(l.data)).reduce((s,l)=>s+(+l.valor||0),0)
    : 0;
  // soma também eventuais custos antigos (DATA.custos) caso existam (modo local de teste)
  const custoTotal = despesasCaixa + cs.reduce((s,c)=>s+c.valor,0);
  const imposto = faturamento*META.imposto;

  const nAtend = compareceu.length;

  const txComp = totAgenda ? nAtend/totAgenda : 0;
  const noShows = at.filter(a=>a.agenda==='No-show').length;
  // ---- leads / conversão / CAC a partir da CAPTAÇÃO real (tela de Captação de Leads) ----
  // filtra a captação pelo mesmo período do cálculo
  const captPer = (typeof CAPTACAO!=='undefined' && Array.isArray(CAPTACAO)) ? CAPTACAO.filter(c=>_dentro(c.data)) : [];
  const totLeadsCapt = captPer.reduce((s,c)=>s+(+c.leads||0),0);
  const totAgendCapt = captPer.reduce((s,c)=>s+(+c.agendadas||0),0);
  const investMkt = captPer.reduce((s,c)=>s+(+c.gasto||0),0); // gasto real no período
  const txConv = totLeadsCapt ? totAgendCapt/totLeadsCapt : 0; // % de leads que agendaram
  // CAC = investimento / pacientes que vieram (atendimentos comparecidos no período)
  const cac = nAtend ? investMkt/nAtend : 0;

  const horasUsadas = nAtend*META.duracaoMedia;
  const txOcup = META.horasMes ? horasUsadas/META.horasMes : 0;
  const porCanal = CANAIS.map(c=>{

    };
  }).map(x=>({...x,conv:x.leads?x.fechados/x.leads:0}));
  // ---- contagem de procedimentos reais (a partir da lista de cada atendimento) ----
  // conta quantas VEZES cada procedimento foi feito, somando os procedimentos de todos
  // os atendimentos comparecidos. Receita NÃO é atribuída por procedimento (valor é do atendimento).

    else if(a.proc){ contProc[a.proc]=(contProc[a.proc]||0)+1; }

  const porProc = Object.keys(contProc).map(p=>({proc:p, qtd:contProc[p], receita:0, share:0}))

  const cats = [...new Set(cs.map(c=>c.cat))];

    .sort((a,b)=>b.valor-a.valor);
  const confOK = DATA.conformidade.filter(c=>c.status==='OK').length;

  // ---- série diária (gráfico de tendência) ----
  const dias = [...new Set(at.map(a=>a.data))].sort();
  const serieReceita = dias.map(d=>({
    dia:d,

  }));
  // ---- comparação vs período anterior ----
  // quando há um mês selecionado, compara com o mês imediatamente anterior (dados reais)
  let prev;
  const _ymSel = (typeof mesSelecionadoTopo==='function') ? mesSelecionadoTopo() : null;
  if(_per && !_per.acumulado && _ymSel){

    prev = {faturamento:aAnt.reduce((s,a)=>s+a.valor,0), nAtend:aAnt.length, leads:cAnt.reduce((s,c)=>s+(+c.leads||0),0), comandas:aAnt.filter(a=>a.valor>0).length};

  const comissaoPorProc = porProc.map(x=>({proc:x.proc, qtd:x.qtd, base:0, comissao:0}))

  // ---- base de pacientes (consolida atendimentos por pessoa) ----

  // ---- recebimentos por modalidade (+ parcelas no crédito) ----

  const docOk = DOCS.filter(d=>d.status==='Arquivado'||d.status==='Vigente').length;

  // ---- evolução mensal: visão multi-mês, sempre sobre TODOS os atendimentos ----
  const mesesNomes=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  // despesas reais (Livro-Caixa) por mês — fonte de verdade
  if(typeof CAIXA!=='undefined' && Array.isArray(CAIXA)){
    CAIXA.filter(l=>l.tipo==='despesa').forEach(l=>{
      const ym=(l.data||'').slice(0,7); if(!ym) return;

  DATA.custos.forEach(c=>{

  // ---- procedimentos: crescimento vs mês anterior (sobe/desce) ----

  let procVar=[];

  const _mesVazio = _totalAtendMes===0; // sinaliza mês sem movimento ainda

  // ---- RESULTADO OPERACIONAL (competência) ----
  // O número de gestão: o que a clínica realmente ganhou no mês.

  const resultadoOper = faturamento - custoTotal - repasseTotal;

async function carregarTudo(){
  try {
    const [func, cart, cat, lanc, atend, capt, met, conf, docs] = await Promise.all([
      sb.from('funcionarios').select('*').order('criado_em'),
      sb.from('carteiras').select('*').order('criado_em'),
      sb.from('categorias').select('*').order('criado_em'),
      sb.from('lancamentos').select('*').order('data'),
      sb.from('atendimentos').select('*').order('data'),
      sb.from('captacao').select('*').order('data'),
      sb.from('metas').select('*').order('criado_em'),
      sb.from('conformidade').select('*').order('criado_em'),
      sb.from('documentos').select('*').order('criado_em'),
    ]);
    // MODO NUVEM: o estado do app é exatamente o que está no banco (vazio = vazio).
    // Os dados de exemplo NÃO são usados aqui — só existem no modo local de teste.
    FUNCIONARIOS = (func.data||[]).map(f=>({id:f.id,nome:f.nome,funcao:f.funcao,tipo:f.tipo,atende:f.atende,registro:f.registro,contato:f.contato,admissao:f.admissao,ativo:f.ativo,pele:!!f.pele}));
    CARTEIRAS = (cart.data||[]).map(c=>({id:c.id,nome:c.nome,saldoInicial:+c.saldo_inicial}));
    CAT_RECEITA = (cat.data||[]).filter(c=>c.tipo==='receita').map(c=>c.nome);
    CAT_DESPESA = (cat.data||[]).filter(c=>c.tipo==='despesa').map(c=>c.nome);
    CAIXA = (lanc.data||[]).map(l=>({id:l.id,data:l.data,tipo:l.tipo,categoria:l.categoria,desc:l.descricao,valor:+l.valor,carteira:l.carteira_id,carteiraDest:l.carteira_dest,itens:Array.isArray(l.itens)?l.itens:[],fechAcao:l.fech_acao||null}));
    CAIXA.forEach(l=>{ if(l.itens&&l.itens.length) registrarItens(l.itens); });
    DATA.atendimentos = (atend.data||[]).map(a=>({id:a.id,data:a.data,paciente:a.paciente,proc:a.procedimento,func:a.funcionario,canal:a.canal,valor:+a.valor,custo:+a.custo,pag:a.pagamento,agenda:a.agenda,recebimento:a.recebimento||'',parcelas:+a.parcelas||1,pagamentos:Array.isArray(a.pagamentos)?a.pagamentos:null,procedimentos:Array.isArray(a.procedimentos)?a.procedimentos:null,baixaAplicada:(a.baixa_aplicada&&typeof a.baixa_aplicada==='object')?a.baixa_aplicada:{}}));
    CAPTACAO = (capt.data||[]).map(c=>({id:c.id,data:c.data,plataforma:c.plataforma,seguidores:c.seguidores,leads:c.leads,agendadas:c.agendadas,investido:+c.investido,gasto:+c.gasto,campanhas:c.campanhas}));
    METAS = (met.data||[]).map(m=>({id:m.id,funcId:m.func_id,escopo:m.escopo,tipo:m.tipo,periodo:m.periodo,faixas:m.faixas}));
    DATA.conformidade = (conf.data||[]).map(c=>({id:c.id,item:c.item,resp:c.responsavel,status:c.status}));
    // contas a pagar/receber + estoque
    const [contasR, estR, movR, matR] = await Promise.all([
      sb.from('contas').select('*').order('criado_em'),
      sb.from('estoque').select('*').order('produto'),
      sb.from('estoque_mov').select('*').order('data'),
      sb.from('material_parceiros').select('*').order('data'),
    ]);
    CONTAS = (contasR.data||[]).map(c=>({id:c.id,tipo:c.tipo,descricao:c.descricao,categoria:c.categoria,natureza:c.natureza,valorParcela:+c.valor_parcela,numParcelas:c.num_parcelas,carteira:c.carteira_id,parcelas:c.parcelas||[]}));
    ESTOQUE = (estR.data||[]).map(e=>({id:e.id,produto:e.produto,unidade:e.unidade,minimo:+e.minimo,custoUnit:+e.custo_unit}));
    EST_MOV = (movR.data||[]).map(m=>({id:m.id,produtoId:m.produto_id,data:m.data,tipo:m.tipo,quantidade:+m.quantidade,obs:m.obs}));
    MATERIAL_PARC = (matR && matR.data ? matR.data : []).map(m=>({id:m.id,data:m.data,profissional:m.profissional,descricao:m.descricao,valor:+m.valor}));
    // leads e custos antigos (exemplo) não são usados na nuvem — zera para o painel refletir a realidade
    DATA.leads = [];
    DATA.custos = [];
    while(DOCS.length)DOCS.pop(); (docs.data||[]).forEach(d=>DOCS.push({id:d.id,nome:d.nome,cat:d.categoria,data:d.data,validade:d.validade,status:d.status,ref:d.referencia}));
    // zera o período anterior (não há histórico real ainda)
    DATA.periodoAnterior = {faturamento:0,nAtend:0,leads:0,comandas:0};
    // configurações (listas customizáveis) — só sobrescreve se houver no banco
    const cfg = await sb.from('configuracoes').select('*');
    if (cfg.data) cfg.data.forEach(row=>{
      if(CONFIG_LISTAS[row.chave] && Array.isArray(row.valores)) CONFIG_LISTAS[row.chave].set(row.valores);
      if(row.chave==='metas_gerais' && row.valores && typeof row.valores==='object'){
        META.faturamento=row.valores.faturamento||0; META.ticket=row.valores.ticket||0;
        META.comparecimento=row.valores.comparecimento||0; META.conversao=row.valores.conversao||0; META.ocupacao=row.valores.ocupacao||0;
      }
      if(row.chave==='horas_mes' && row.valores && row.valores.horas){ META.horasMes=row.valores.horas; }
      if(row.chave==='metas_livres' && Array.isArray(row.valores) && row.valores.length){
        // formato ANTIGO (array único) → migra para o mês atual
        METAS_POR_MES[mesHoje()] = row.valores;
      }
      if(row.chave==='metas_por_mes' && row.valores && typeof row.valores==='object' && !Array.isArray(row.valores)){
        METAS_POR_MES = row.valores;
      }
      if(row.chave==='estoque_mes' && row.valores && typeof row.valores==='object' && !Array.isArray(row.valores)){
        ESTOQUE_MES = row.valores;
      }
      if(row.chave==='procs_pele' && Array.isArray(row.valores)){ PROCS_PELE = row.valores; }
      if(row.chave==='historico' && Array.isArray(row.valores)){ HISTORICO=row.valores; }
    });
    // ponteiro do mês atual
    METAS_LIVRES = metasDoMes(mesHoje());
    window.__lastCalc=null;
  } catch(e){ console.error('Erro ao carregar dados:', e); }
}

/* ---- helpers de persistência (chamados pelas funções de salvar) ---- */
async function sbInsert(tabela, registro){
  if(!MODO_NUVEM) return null;
  const { data:{ user } } = await sb.auth.getUser();
  const { data, error } = await sb.from(tabela).insert({...registro, user_id:user.id}).select().single();
  if(error){ console.error('insert '+tabela, error); alert('Erro ao salvar: '+error.message); return null; }
  return data;
}
async function sbUpdate(tabela, id, registro){
  if(!MODO_NUVEM) return null;
  const { error } = await sb.from(tabela).update(registro).eq('id', id);
  if(error){ console.error('update '+tabela, error); alert('Erro ao atualizar: '+error.message); }
}
async function sbDelete(tabela, id){
  if(!MODO_NUVEM) return;
  const { error } = await sb.from(tabela).delete().eq('id', id);
  if(error){ console.error('delete '+tabela, error); alert('Erro ao excluir: '+error.message); }
}

function metasBlock(k){
  const ym = mesSelecionadoTopo() || mesHoje();
  const lista=(metasDoMes(ym)||[]).filter(m=>m.alvo>0 && (m.nome||'').trim());
  if(!lista.length){
    return `<div style="color:var(--grey);font-size:13px;line-height:1.6;padding:6px 0">
      Nenhuma meta definida para ${rotuloMes(ym)}.<br>
      Crie as metas deste mês em <b>Controle → Configurações → Metas da clínica</b> (selecione ${rotuloMes(ym)} no seletor de mês das metas).
    </div>`;
  }
  const kMes=kDoMes(ym); // realizado do mês selecionado, para casar com as metas do mês
  return lista.map(m=>{
    const T=META_TIPOS[m.tipo]||META_TIPOS.faturamento;
    const r=valorMetaLivre(m,kMes);
    const alvo=m.alvo||0;
    const p=alvo?r/alvo:0, w=Math.min(p,1)*100;
    const cls=p>=1?'hit':(p<0.7?'low':'');
    const col=p>=1?'var(--green)':p<0.7?'var(--red)':'var(--gold-d)';
    const suf = (m.filtroTipo && m.filtroTipo!=='todos' && m.filtroValor) ? ` <span style="color:var(--grey);font-size:11px;font-weight:400">· ${m.filtroValor}</span>` : '';
    return `<div class="meta-row"><div class="mr-top"><span class="mr-name">${m.nome}${suf}</span>
      <span class="mr-vals"><b>${T.fmt(r)}</b> / ${T.fmt(alvo)}<span class="mr-pct" style="color:${col}">${PCT0(p)}</span></span></div>
      <div class="bar"><i class="${cls}" data-w="${w}"></i></div></div>`;
  }).join('');
}

  spark('spk3',k.serieReceita.map(s=>s.valor>0?1:0).map((_,i)=>k.serieReceita[i].atend),'#B98F38');

  // tendência de visitas (barras)
  charts.tend=new Chart(document.getElementById('chTend'),{type:'bar',

      backgroundColor:'#C9A24B',borderRadius:5,maxBarThickness:30}]},

      tooltip:{callbacks:{label:c=>` ${c.parsed.y} atendimento(s)`}}},
      scales:{y:{grid:{color:grid},ticks:{color:tick,stepSize:1}},x:{grid:{display:false},ticks:{color:tick,font:{size:10}}}}}});

  // receita por canal (tab)

  charts.proc2=new Chart(document.getElementById('chProc2'),{type:'bar',

    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>` ${c.parsed.x} ${c.parsed.x===1?'vez':'vezes'}`}}},
      scales:{x:{grid:{color:grid},ticks:{color:tick,stepSize:1}},y:{grid:{display:false},ticks:{color:tick,font:{size:11}}}}}});

  // doughnut proc + custo (reuse)
  drawCharts(k);
}

function drawCharts(k){

    document.querySelectorAll('.chart-wrap').forEach(w=>{w.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--grey);font-size:13px;text-align:center;padding:0 20px">Os gráficos aparecem ao abrir o arquivo no navegador com internet.</div>';});
    return;
  }
  const grid='#EEE8DC', tick='#8A8175';
  // doughnut: Faturamento por profissional (Bruna + cada parceiro, dinâmico)
  const rosca = [
    {nome:'Dra. Bruna', valor:k.fatBruna||0},
    ...(k.parceiros||[]).map(p=>({nome:p.nome, valor:p.receita}))
  ].filter(x=>x.valor>0);
  const PAL_PROF=['#C9A24B','#9A7B2E','#6FBF9A','#6FA8DC','#B08FD8','#DE8A93','#D69A6A','#5FC2C9','#E8956B','#A8AEB8'];
  const totalRosca = rosca.reduce((s,x)=>s+x.valor,0)||1;
  if(document.getElementById('chProc'))charts.proc=new Chart(document.getElementById('chProc'),{type:'doughnut',
    data:{labels:rosca.map(p=>p.nome),datasets:[{data:rosca.map(p=>p.valor),backgroundColor:rosca.map((_,i)=>PAL_PROF[i%PAL_PROF.length]),borderColor:'#fff',borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>` ${c.label}: ${BRL(c.parsed)} (${PCTsmart(c.parsed/totalRosca)})`}}}}});
  if(document.getElementById('leg1'))document.getElementById('leg1').innerHTML=rosca.map((p,i)=>
    `<span><i style="background:${PAL_PROF[i%PAL_PROF.length]}"></i>${p.nome} ${PCTsmart(p.valor/totalRosca)}</span>`).join('');
  // bar canal
  const can=k.porCanal;
  if(document.getElementById('chCanal')){charts.canal=new Chart(document.getElementById('chCanal'),{type:'bar',
    data:{labels:can.map(c=>c.canal),datasets:[{data:can.map(c=>c.receita),backgroundColor:GOLD,borderRadius:6,maxBarThickness:46}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>' '+BRL(c.parsed.y)}}},
      scales:{y:{grid:{color:grid},ticks:{color:tick,callback:v=>'R$ '+(v/1000)+'k'}},x:{grid:{display:false},ticks:{color:tick,font:{size:10}}}}}});}
  // evolução: Faturamento x Despesas x Lucro (últimos meses)
  const ev=(k.evolucao||[]).slice(-6);
  if(document.getElementById('chCusto'))charts.custo=new Chart(document.getElementById('chCusto'),{type:'bar',
    data:{labels:ev.map(m=>m.mes),datasets:[
      {label:'Faturamento',data:ev.map(m=>m.fat),backgroundColor:'#C9A24B',borderRadius:5,maxBarThickness:26},
      {label:'Despesas',data:ev.map(m=>(m.desp||0)+(m.repasse||0)),backgroundColor:'#9A7B2E',borderRadius:5,maxBarThickness:26},
      {label:'Lucro',data:ev.map(m=>m.lucro),backgroundColor:'#3b7a57',borderRadius:5,maxBarThickness:26}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{boxWidth:12,font:{size:11},color:tick}},
      tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${BRL(c.parsed.y)}`}}},
      scales:{y:{grid:{color:grid},ticks:{color:tick,callback:v=>'R$ '+(v/1000)+'k'}},x:{grid:{display:false},ticks:{color:tick,font:{size:11}}}}}});
}

/* ============================ ATENDIMENTOS ============================ */
// Formas de recebimento (modalidade de como o dinheiro entrou)
const RECEBIMENTOS = ['Pix CPF','Pix CNPJ','Crédito CPF','Crédito CNPJ','Dinheiro'];
const ehCredito = r => (r||'').indexOf('Crédito')===0;
// rótulo de uma forma isolada (ex: "Crédito CPF 10x")
function formaLabel(forma, parcelas){
  if(!forma) return '—';
  return ehCredito(forma) && parcelas>1 ? `${forma} ${parcelas}x` : forma;
}
// normaliza os pagamentos de um atendimento numa lista [{forma,valor,parcelas}]
// aceita tanto o formato novo (a.pagamentos) quanto o antigo (a.recebimento/a.parcelas)
function pagamentosDe(a){
  if(Array.isArray(a.pagamentos) && a.pagamentos.length){
    return a.pagamentos.map(p=>({forma:p.forma||'',valor:+p.valor||0,parcelas:ehCredito(p.forma)?(+p.parcelas||1):1}));
  }
  if(a.recebimento) return [{forma:a.recebimento,valor:+a.valor||0,parcelas:ehCredito(a.recebimento)?(+a.parcelas||1):1}];
  return [];
}
// rótulo curto para a tabela: uma forma → "Crédito CPF 10x"; várias → "Dividido (2)"
function recebLabel(a){
  const ps=pagamentosDe(a);
  if(!ps.length) return '—';
  if(ps.length===1) return formaLabel(ps[0].forma, ps[0].parcelas);
  return `Dividido (${ps.length})`;
}

function abrirAtendForm(tipo){ editarAtend(0, tipo||'bruna'); }
function editarAtend(id, tipo){
  const a = (id && id!=='0')? DATA.atendimentos.find(x=>x.id==id) : {id:0,data:new Date().toISOString().slice(0,10),paciente:'',func:'',proc:'',canal:'',valor:'',pag:'Pago',agenda:'Compareceu'};
  // tipo: 'bruna' (não-parceiras) | 'parceiro' (parceiras). Em edição, deduz do registro.
  const tp = tipo || (funcEhPele(a.func)?'parceiro':'bruna');
  const fs='padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-family:inherit;background:var(--paper);color:var(--ink)';
  const funcDisp=FUNCIONARIOS.filter(f=>f.atende&&f.ativo).filter(f=> tp==='parceiro' ? f.pele : !f.pele);
  // se for parceiro e só houver uma, pré-seleciona
  const funcAuto = (tp==='parceiro' && funcDisp.length===1 && !a.func) ? funcDisp[0].nome : a.func;
  const canalOpts=CANAIS.map(c=>`<option ${c===a.canal?'selected':''}>${c}</option>`).join('');
  const agOpts=['Compareceu','Agendado','No-show','Reagendado'].map(s=>`<option ${s===a.agenda?'selected':''}>${s}</option>`).join('');
  const pagOpts=['Pago','Parcial','Pendente'].map(s=>`<option ${s===a.pag?'selected':''}>${s}</option>`).join('');
  // estado de trabalho dos pagamentos
  const ps=pagamentosDe(a);
  __atendPagamentos = ps.length ? ps.map(p=>({forma:p.forma,valor:p.valor,parcelas:p.parcelas})) : [];
  __atendPagDividido = __atendPagamentos.length>1;
  // estado de trabalho dos procedimentos (lista)
  __atendProcs = procedimentosDe(a);
  // ATENDIMENTO DE PARCEIRO NOVO: já adiciona uma linha com o 1º procedimento de repasse
  // disponível para a profissional (vínculo dela OU sem vínculo), para o repasse calcular sozinho.
  if(tp==='parceiro' && (!id||id==='0') && !__atendProcs.length){
    const fSel=funcAuto||'';
    const dispo=(PROCS_PELE||[]).filter(p=>p.nome && (fSel ? (p.func===fSel || !p.func) : true));
    if(dispo.length){ __atendProcs=[{proc:dispo[0].nome, modo:'sessao', qtd:0, produtoId:''}]; }
  }
  document.getElementById('atendFormBox').innerHTML=`
    <div style="background:var(--cream);border:1px solid var(--gold-l);border-radius:14px;padding:18px;margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <span style="font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:700;color:#0E0D0C;background:var(--gold);padding:3px 10px;border-radius:7px">${tp==='parceiro'?'Atendimento de parceiro':'Atendimento Dra. Bruna'}</span>
        ${tp==='parceiro'?'<span style="font-size:12px;color:var(--grey)">o repasse é calculado automaticamente pelos procedimentos com repasse cadastrados</span>':''}
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px">
        <div class="field"><label>Data do atendimento</label><input id="naData" type="date" value="${a.data}" style="${fs};width:100%"></div>
        <div class="field"><label>Paciente</label><input id="naPac" value="${a.paciente}" placeholder="Nome" style="${fs};width:100%"></div>

/* ---- procedimentos do atendimento (lista; cada um ml ou sessão) ---- */
let __atendProcs = [];
// normaliza os procedimentos de um atendimento (novo formato a.procedimentos OU antigo a.proc único)
// modo: 'produto' (abate do estoque) | 'sessao' (só registro)
function procedimentosDe(a){
  if(Array.isArray(a.procedimentos) && a.procedimentos.length){
    return a.procedimentos.map(p=>{
      // compat: registros antigos usavam unidade:'ml'/'sessao'
      const modo = (p.modo==='produto'||p.modo==='sessao') ? p.modo : (p.unidade==='sessao'?'sessao':'produto');
      return {proc:p.proc||'', modo, qtd:+p.qtd||+p.ml||0, produtoId:p.produtoId||''};
    });
  }
  if(a.proc) return [{proc:a.proc, modo:'sessao', qtd:0, produtoId:''}];
  return [];
}
function addAtendProc(){
  const e=(ESTOQUE||[])[0];
  __atendProcs.push({proc:(PROCS[0]||''), modo:'produto', qtd:0, produtoId:e?e.id:''});
  renderAtendProcs();
}
function removeAtendProc(i){ __atendProcs.splice(i,1); renderAtendProcs(); }
function updAtendProc(i,campo,val){
  if(!__atendProcs[i])return;
  __atendProcs[i][campo] = (campo==='qtd') ? (+val||0) : val;
  // se escolheu um procedimento de pele, ele não consome estoque (vira 'sessao')
  if(campo==='proc'){
    const ehPele=(PROCS_PELE||[]).some(p=>p.nome===val);
    if(ehPele){ __atendProcs[i].modo='sessao'; __atendProcs[i].qtd=0; __atendProcs[i].produtoId=''; }
    renderAtendProcs();
  }
  if(campo==='modo'||campo==='produtoId') renderAtendProcs();
}
// unidade (texto) de um produto do estoque
function unidadeProduto(pid){ const e=(ESTOQUE||[]).find(x=>x.id==pid); return e?(e.unidade||'un'):''; }
function renderAtendProcs(){
  const box=document.getElementById('naProcsBox'); if(!box) return;
  const fsi='padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;background:var(--paper);color:var(--ink);font-size:13px';
  if(!__atendProcs.length){
    box.innerHTML=`<div style="font-size:12.5px;color:var(--grey);font-style:italic;padding:6px 2px">Clique em "+ adicionar procedimento" para incluir o que foi feito neste atendimento.</div>`;
    return;
  }
  const temProdutos=(ESTOQUE||[]).length>0;
  // a profissional selecionada é parceira? então mostra os procedimentos com repasse DELA
  const funcSel=(document.getElementById('naFunc')&&document.getElementById('naFunc').value)||'';
  const ehPeleSel=funcEhPele(funcSel);
  // procedimentos com repasse vinculados à profissional selecionada (ou todos com repasse, se nenhuma selecionada)
  const procsRepasseDela=(PROCS_PELE||[]).filter(p=>p.nome && (funcSel ? (p.func===funcSel || !p.func) : true));
  const nomesRepasseDela=procsRepasseDela.map(p=>p.nome);
  const nomesPeleTodos=(PROCS_PELE||[]).map(p=>p.nome).filter(Boolean);
  box.innerHTML=__atendProcs.map((p,i)=>{
    // se parceira selecionada: mostra só os procedimentos com repasse dela. Senão: procedimentos normais.
    let po;
    if(ehPeleSel){
      const opts = nomesRepasseDela.length
        ? `<optgroup label="Procedimentos com repasse de ${funcSel}">${nomesRepasseDela.map(x=>`<option ${x===p.proc?'selected':''}>${x}</option>`).join('')}</optgroup>`
        : `<optgroup label="(nenhum procedimento vinculado a ${funcSel})"><option value="">— cadastre em Configurações —</option></optgroup>`;
      po = opts;
    } else {
      po = `<optgroup label="Procedimentos">${PROCS.concat('Avaliação').map(x=>`<option ${x===p.proc?'selected':''}>${x}</option>`).join('')}</optgroup>`;
    }
    const ehProduto = p.modo!=='sessao';
    const ymA=(document.getElementById('naData')&&document.getElementById('naData').value||'').slice(0,7)||mesHoje();
    const prodOpts=(ESTOQUE||[]).map(e=>`<option value="${e.id}" ${e.id==p.produtoId?'selected':''}>${e.produto} (${saldoAtualMes(e.id,ymA)} ${e.unidade||'un'})</option>`).join('');
    const uni = ehProduto ? (unidadeProduto(p.produtoId)||'un') : '';
    const ehProcPele = nomesPeleTodos.includes(p.proc);
    const consumoUI = ehProcPele
      ? `<div class="field" style="margin:0;grid-column:span 2"><div style="font-size:12px;color:var(--gold-d);padding-top:18px">✦ Procedimento com repasse — calculado automaticamente</div></div>`
      : ehProduto
      ? (temProdutos
          ? `<div class="field" style="margin:0"><label>Qtd (${uni})</label><input type="number" step="any" value="${p.qtd||''}" oninput="updAtendProc(${i},'qtd',this.value)" style="${fsi};width:100%"></div>
             <div class="field" style="margin:0"><label>Abater de</label><select onchange="updAtendProc(${i},'produtoId',this.value)" style="${fsi};width:100%">${prodOpts}</select></div>`
          : `<div class="field" style="margin:0;grid-column:span 2"><div style="font-size:12px;color:var(--amber);padding-top:18px">Nenhum produto no estoque — cadastre em Estoque para abater.</div></div>`)
      : `<div class="field" style="margin:0;grid-column:span 2"><div style="font-size:12px;color:var(--grey);padding-top:18px">Sessão — não consome estoque</div></div>`;
    const tipoUI = ehProcPele
      ? `<div class="field" style="margin:0"><label>Tipo</label><input value="Repasse" disabled style="${fsi};width:100%;opacity:.7"></div>`
      : `<div class="field" style="margin:0"><label>Tipo</label><select onchange="updAtendProc(${i},'modo',this.value)" style="${fsi};width:100%"><option value="produto" ${ehProduto?'selected':''}>Consome produto</option><option value="sessao" ${!ehProduto?'selected':''}>Sessão</option></select></div>`;
    return `<div style="display:grid;grid-template-columns:1.6fr 1.1fr 1fr 1.2fr auto;gap:8px;align-items:end;margin-bottom:8px">
      <div class="field" style="margin:0"><label>Procedimento</label><select onchange="updAtendProc(${i},'proc',this.value)" style="${fsi};width:100%">${po}</select></div>
      ${tipoUI}
      ${consumoUI}
      <button type="button" class="btn ghost" style="padding:7px 9px;font-size:12px" onclick="removeAtendProc(${i})" title="Remover">×</button>
    </div>`;
  }).join('');
  if(typeof atualizaRepassePreview==='function') atualizaRepassePreview();
}
/* ---- pagamentos do atendimento (uma ou várias formas) ---- */
let __atendPagamentos = [];
let __atendPagDividido = false;
function toggleDividirPag(){
  if(!__atendPagDividido){
    // entra no modo dividido: garante ao menos a forma atual + uma nova linha
    if(!__atendPagamentos.length) __atendPagamentos=[{forma:RECEBIMENTOS[0],valor:0,parcelas:1}];
    if(__atendPagamentos.length<2) __atendPagamentos.push({forma:'',valor:0,parcelas:1});
    __atendPagDividido=true;
  } else {
    // volta ao modo único: mantém só a primeira forma (com o valor total)
    __atendPagamentos = __atendPagamentos.length ? [__atendPagamentos[0]] : [];
    __atendPagDividido=false;
  }
  document.getElementById('naDividirBtn').textContent = __atendPagDividido?'↺ pagamento único':'+ dividir pagamento';
  renderPagamentos();
}
function addPagamento(){ __atendPagamentos.push({forma:'',valor:0,parcelas:1}); renderPagamentos(); }
function removePagamento(i){ __atendPagamentos.splice(i,1); if(__atendPagamentos.length<2)__atendPagDividido=false; document.getElementById('naDividirBtn').textContent=__atendPagDividido?'↺ pagamento único':'+ dividir pagamento'; renderPagamentos(); }
function updPagamento(i,campo,val){
  __atendPagamentos[i][campo] = campo==='valor' ? (+val||0) : (campo==='parcelas'?(+val||1):val);
  if(campo==='forma'){ if(!ehCredito(val)) __atendPagamentos[i].parcelas=1; renderPagamentos(); }
  else atualizaAvisoPag();
}
function atendValorMudou(){
  // no modo único, espelha o valor total na única forma
  if(!__atendPagDividido && __atendPagamentos.length===1){
    __atendPagamentos[0].valor = +(document.getElementById('naValor')||{}).value||0;
  }
  atualizaAvisoPag();
  atualizaRepassePreview();
}
// preview em tempo real do rateio (repasse) no formulário de atendimento de parceiro
function atualizaRepassePreview(){
  const box=document.getElementById('naRepassePreview'); if(!box) return;
  const funcSel=(document.getElementById('naFunc')&&document.getElementById('naFunc').value)||'';

  const temProcRepasse=(__atendProcs||[]).some(p=>(PROCS_PELE||[]).some(x=>x.nome===p.proc));

    <span style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--gold-d);font-weight:700">Rateio automático</span>
    <span style="font-size:13px;color:var(--grey)">Valor <b style="color:var(--ink)">${BRL(r.valor)}</b></span>
    <span style="font-size:13px;color:var(--grey)">− Custo <b style="color:var(--red)">${BRL(r.custo)}</b></span>
    <span style="font-size:13px;color:var(--grey)">= Lucro <b style="color:var(--ink)">${BRL(r.lucro)}</b></span>
    <span style="font-size:13px;color:var(--grey)">→ Repasse a ${funcSel.split(' ')[0]}: <b style="color:var(--amber)">${BRL(r.repasse)}</b></span>
    <span style="font-size:13px;color:var(--grey)">Fica p/ Instituto: <b style="color:var(--green,#3b7a57)">${BRL(r.instituto)}</b></span>
  </div>`;
}
function valorTotalAtend(){ return +(document.getElementById('naValor')||{}).value||0; }
function atualizaAvisoPag(){
  const av=document.getElementById('naPagAviso'); if(!av) return;
  if(!__atendPagDividido){ av.innerHTML=''; return; }
  const soma=__atendPagamentos.reduce((s,p)=>s+(+p.valor||0),0);
  const total=valorTotalAtend();
  if(Math.abs(soma-total)<0.5){ av.innerHTML=`<span style="color:var(--green)">✓ Soma das formas: ${BRL(soma)} — confere com o valor total.</span>`; }
  else { const dif=total-soma;
    av.innerHTML=`<span style="color:var(--amber)">⚠ Soma das formas ${BRL(soma)} ≠ valor total ${BRL(total)} (faltam ${BRL(dif)}). Você pode salvar mesmo assim.</span>`; }
}
function renderPagamentos(){
  const box=document.getElementById('naPagBox'); if(!box) return;
  const fs='padding:7px 9px;border:1px solid var(--line);border-radius:8px;font-family:inherit;background:var(--paper);color:var(--ink);font-size:13px';
  const formaSel=(sel)=>`<option value="">—</option>`+RECEBIMENTOS.map(r=>`<option ${r===sel?'selected':''}>${r}</option>`).join('');
  const parcSel=(sel)=>Array.from({length:18},(_,i)=>i+1).map(n=>`<option value="${n}" ${(+sel||1)===n?'selected':''}>${n}x</option>`).join('');
  if(!__atendPagDividido){
    // modo único: 1 forma + (parcelas se crédito). Valor vem do campo Valor total.
    const p=__atendPagamentos[0]||{forma:'',valor:0,parcelas:1};
    if(!__atendPagamentos.length) __atendPagamentos=[p];
    const mostraParc=ehCredito(p.forma);
    box.innerHTML=`<div style="display:grid;grid-template-columns:2fr 1fr;gap:10px">
      <div class="field" style="margin:0"><label>Como recebeu</label><select onchange="updPagamento(0,'forma',this.value)" style="${fs};width:100%">${formaSel(p.forma)}</select></div>
      <div class="field" style="margin:0;${mostraParc?'':'visibility:hidden'}"><label>Parcelas</label><select onchange="updPagamento(0,'parcelas',this.value)" style="${fs};width:100%">${parcSel(p.parcelas)}</select></div>
    </div>`;
    atualizaAvisoPag();
    return;
  }
  // modo dividido: várias linhas com valor por forma
  box.innerHTML=__atendPagamentos.map((p,i)=>{
    const mostraParc=ehCredito(p.forma);
    return `<div style="display:grid;grid-template-columns:1.6fr 1fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px">
      <div class="field" style="margin:0"><label>Como recebeu</label><select onchange="updPagamento(${i},'forma',this.value)" style="${fs};width:100%">${formaSel(p.forma)}</select></div>
      <div class="field" style="margin:0"><label>Valor (R$)</label><input type="number" value="${p.valor||''}" oninput="updPagamento(${i},'valor',this.value)" style="${fs};width:100%"></div>
      <div class="field" style="margin:0;${mostraParc?'':'visibility:hidden'}"><label>Parcelas</label><select onchange="updPagamento(${i},'parcelas',this.value)" style="${fs};width:100%">${parcSel(p.parcelas)}</select></div>
      <button type="button" class="btn ghost" style="padding:7px 9px;font-size:12px" onclick="removePagamento(${i})" title="Remover">×</button>
    </div>`;
  }).join('') + `<button type="button" class="btn ghost" style="padding:4px 10px;font-size:12px;margin-top:2px" onclick="addPagamento()">+ adicionar forma</button>`;
  atualizaAvisoPag();
}
async function salvarAtend(id){
  const v=i=>document.getElementById(i).value;
  const valor=+v('naValor')||0;
  // monta a lista de pagamentos
  let pagamentos;
  if(__atendPagDividido){
    pagamentos=(__atendPagamentos||[]).filter(p=>p.forma && p.valor>0)
      .map(p=>({forma:p.forma,valor:+p.valor||0,parcelas:ehCredito(p.forma)?(+p.parcelas||1):1}));
  } else {
    const p=__atendPagamentos[0];
    pagamentos = (p && p.forma) ? [{forma:p.forma,valor:valor,parcelas:ehCredito(p.forma)?(+p.parcelas||1):1}] : [];
  }
  // campos de compatibilidade: forma "principal" = a de maior valor
  const principal = pagamentos.slice().sort((a,b)=>b.valor-a.valor)[0] || {forma:'',parcelas:1};
  // procedimentos do atendimento
  const procs=(__atendProcs||[]).filter(p=>p.proc).map(p=>({
    proc:p.proc, modo:p.modo==='sessao'?'sessao':'produto',
    qtd: p.modo==='sessao'?0:(+p.qtd||0),
    produtoId: p.modo==='sessao'?'':(p.produtoId||'')
  }));
  const procResumo = procs.length ? (procs.length>1 ? procs[0].proc+' +'+(procs.length-1) : procs[0].proc) : 'Avaliação';
  // consumo de estoque deste atendimento: soma a qtd por produto (procedimentos que consomem
  // produto, status Compareceu). É gravado em baixaAplicada; o saldo do mês é calculado a
  // partir disso (saldo inicial do mês − soma dos consumos), então NÃO mexemos em saldo aqui.
  const agenda=v('naAg');
  const baixaNova={};
  if(agenda==='Compareceu'){
    procs.forEach(p=>{ if(p.modo==='produto' && p.produtoId && p.qtd>0){ baixaNova[p.produtoId]=(baixaNova[p.produtoId]||0)+p.qtd; } });
  }
  const ehEdicao = id && id!=='0';
  const atendAntigo = ehEdicao ? DATA.atendimentos.find(x=>x.id==id) : null;
  const reg={data:v('naData')||new Date().toISOString().slice(0,10),
    paciente:v('naPac')||'Sem nome',func:v('naFunc')||'',
    proc:procResumo,canal:v('naCanal'),valor,custo:Math.round(valor*0.3),
    pag:v('naPag')||'Pago',agenda,
    recebimento:principal.forma,parcelas:principal.parcelas,pagamentos,procedimentos:procs,
    baixaAplicada:baixaNova}; // consumo deste atendimento, por produto
  if(MODO_NUVEM){
    const reg2={data:reg.data,paciente:reg.paciente,procedimento:reg.proc,funcionario:reg.func,canal:reg.canal,valor:reg.valor,custo:reg.custo,pagamento:reg.pag,agenda:reg.agenda,recebimento:reg.recebimento,parcelas:reg.parcelas,pagamentos:reg.pagamentos,procedimentos:reg.procedimentos,baixa_aplicada:reg.baixaAplicada};
    if(ehEdicao) await sbUpdate('atendimentos',id,reg2); else await sbInsert('atendimentos',reg2);
    window.__atendDia=reg.data; await carregarTudo(); go('atendimentos'); return;
  }
  // ---- modo local ----
  if(ehEdicao){ Object.assign(atendAntigo,reg); }
  else { DATA.atendimentos.unshift({id:Date.now(),...reg}); }
  window.__atendDia=reg.data; go('atendimentos');
}
async function excluirAtend(id){
  // o consumo é derivado dos atendimentos: ao excluir, ele simplesmente deixa de contar.
  if(MODO_NUVEM){ await sbDelete('atendimentos',id); await carregarTudo(); }
  else { DATA.atendimentos=DATA.atendimentos.filter(a=>a.id!=id); }
  go('atendimentos');
}

/* ============================ LEADS ============================ */
function renderLeads(pg){
  const grao=window.__captGrao||'dia';
  // cada mês é independente: mostra só a captação do mês selecionado no topo
  const _perCapt = (typeof periodoSelecionadoIntervalo==='function') ? periodoSelecionadoIntervalo() : null;
  const _dentroCapt = (d)=> !_perCapt || (d && d>=_perCapt.ini && d<=_perCapt.fim);
  const CAPT_MES = CAPTACAO.filter(c=>_dentroCapt(c.data));
  // agrega captação por plataforma no período selecionado
  const porPlat={};
  CAPT_MES.forEach(c=>{
    if(!porPlat[c.plataforma]) porPlat[c.plataforma]={plataforma:c.plataforma,seguidores:0,leads:0,agendadas:0,investido:0,gasto:0,campanhas:0};
    const p=porPlat[c.plataforma];
    p.seguidores+=c.seguidores||0; p.leads+=c.leads||0; p.agendadas+=c.agendadas||0;
    p.investido=Math.max(p.investido,c.investido||0); p.gasto+=c.gasto||0; p.campanhas=Math.max(p.campanhas,c.campanhas||0);
  });
  const plats=Object.values(porPlat);
  const totLeads=plats.reduce((s,p)=>s+p.leads,0);
  const totAgend=plats.reduce((s,p)=>s+p.agendadas,0);
  const totSeg=plats.reduce((s,p)=>s+p.seguidores,0);
  const totGasto=plats.reduce((s,p)=>s+p.gasto,0);
  const convGeral=totLeads?totAgend/totLeads:0;
  const cpl=totLeads&&totGasto?totGasto/totLeads:0;

  // tabela de lançamentos (linha a linha, editável)
  const linhas=[...CAPT_MES].sort((a,b)=>b.data.localeCompare(a.data)).map(c=>{
    const conv=c.leads?(c.agendadas/c.leads):0;
    return `<tr>
      <td>${fmtDate(c.data)}</td>
      <td>${c.plataforma}</td>
      <td class="ctr">${c.seguidores||'—'}</td>
      <td class="ctr">${c.leads||'—'}</td>
